                            </div>
                        </div>

                        <div style={{display:'flex',gap:'8px'}}>
                            <button type="button" onClick={resetForm}
                                style={{flex:1,padding:'13px',background:'#F0F0F0',color:'#616161',borderRadius:'13px',border:'none',fontWeight:700,fontSize:'14px',cursor:'pointer'}}>취소</button>
                            <button type="submit"
                                className={`submit-btn ${color==='green'?'submit-btn-green':'submit-btn-blue'}`} style={{flex:1}}>{editingId?'✅ 수정 완료':'✅ 등록 완료'}</button>
                        </div>
                    </form>
                </div>
            )}

            {/* ── 고객 목록 ── */}
            {viewMode==='customers' && (
                <div style={{padding:'0 12px 120px'}}>
                    {searchTerm && displayRecords.length>0 && (
                        <div className="customer-card" style={{marginBottom:'10px'}}>
                            <div style={{padding:'12px 14px'}}>
                                <p style={{fontSize:'13px',fontWeight:800,color:'#111'}}>"<span style={{color:color==='green'?'#22C55E':'#3B82F6'}}>{searchTerm}</span>" 검색결과 <span style={{fontSize:'12px',fontWeight:600,color:'#9E9E9E',marginLeft:'4px'}}>{displayRecords.length}건</span></p>
                                {(()=>{
                                    const cs = getCustomerStats().find(c=>matchChosung(c.name,searchTerm));
                                    if (!cs) return null;
                                    return (<div style={{display:'flex',gap:'6px',marginTop:'6px',flexWrap:'wrap'}}>
                                        <span style={{background:'#DCFCE7',color:'#15803D',padding:'3px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:700}}>연간 {cs.yearlyVisits}회</span>
                                        <span style={{background:'#DBEAFE',color:'#1D4ED8',padding:'3px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:700}}>총 {cs.visitCount}회</span>
                                        <span style={{background:'#F3E8FF',color:'#7E22CE',padding:'3px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:700}}>누적 {cs.totalAmount.toLocaleString()}원</span>
                                    </div>);
                                })()}
                            </div>
                        </div>
                    )}
                    {displayRecords.length===0 && (
                        <div className="customer-card">
                            <div className="empty-state">
                                <div style={{fontSize:'48px',marginBottom:'8px'}}>{sport==='tennis'?'🎾':'🏸'}</div>
                                {searchTerm ? <p>"{searchTerm}" 검색 결과가 없습니다.</p>
                                    : <><p>등록된 작업이 없습니다.</p><p style={{fontSize:'12px',marginTop:'4px',color:'#9E9E9E'}}>위에서 ➕ 새 작업 버튼을 눌러 시작하세요.</p></>}
                            </div>
                        </div>
                    )}
                    {(()=>{
                        if (searchTerm) {
                            return displayRecords.map(r=>{
                                const visitCount = records.filter(x=>x.name===r.name).length;
                                return <RecordCard key={r.fbKey||r.id} r={r} visitCount={visitCount} records={records} color={color} statColor={statColor} handleEdit={handleEdit} handleDelete={handleDelete}/>;
                            });
                        }
                        const grouped = {};
                        const nameOrder = [];
                        [...displayRecords].sort((a,b)=>b.date.localeCompare(a.date)).forEach(r=>{
                            if (!grouped[r.name]) { grouped[r.name]=[]; nameOrder.push(r.name); }
                            grouped[r.name].push(r);
                        });
                        const uniqueNames = [...new Set(nameOrder)];
                        return uniqueNames.map(name=>{
                            const recs = grouped[name];
                            // 날짜 내림차순 정렬 → 가장 최근이 [0]
                            const sorted = [...recs].sort((a,b)=>b.date.localeCompare(a.date));
                            const latest = sorted[0];
                            const history = sorted.slice(1);
                            const visitCount = recs.length;
                            const isOpen = expandedCustomers[name];
                            const daysSince = latest.date ? Math.floor((new Date()-new Date(latest.date))/(1000*60*60*24)) : 0;
                            const isVIP = visitCount >= 5;
                            const needsReplace = daysSince >= 60;
                            return (
                                <div key={name} className="customer-card">
                                    {/* ── 카드 헤더 ── */}
                                    <div className={`customer-card-header ${color}`}>
                                        <div>
                                            <div className="customer-name-row">
                                                <div className="customer-name">{latest.name}</div>
                                                {isVIP && <span className="vip-star">⭐</span>}
                                            </div>
                                            <div className="customer-badges">
                                                <span className="badge">👤 {visitCount}회 방문</span>
                                                {latest.couponCode && <span className="badge">🎫 쿠폰</span>}
                                                {latest.isHybrid && <span className="badge">하이브리드</span>}
                                                {needsReplace && <span className="replace-alert">🔔 교체 알림</span>}
                                            </div>
                                        </div>
                                        <div className="card-actions">
                                            <span className="card-date">{latest.date}</span>
                                            <button onClick={()=>handleEdit(latest)} className="card-action-btn">✏️</button>
                                            <button onClick={()=>handleDelete(latest)} className="card-action-btn">🗑️</button>
                                        </div>
                                    </div>

                                    {/* ── 최근 작업 내용 (항상 표시) ── */}
                                    <div className="customer-card-body">
                                        <div className="card-row">
                                            <span className="card-label">라켓</span>
                                            <span className="card-val">{latest.racket}</span>
                                            <span style={{fontSize:'11px',color:'#bbb',fontWeight:600,flexShrink:0}}>{latest.pattern}</span>
                                        </div>
                                        <div className="card-row">
                                            <span className="card-label">스트링</span>
                                            <div style={{flex:1}}>
                                                <span className="card-val">{latest.stringType}</span>
                                                {latest.isHybrid&&latest.hybridString2&&<span style={{fontSize:'11px',color:'#7C3AED',fontWeight:600}}> + {latest.hybridString2}</span>}
                                                <span style={{fontSize:'11px',color:'#bbb',marginLeft:'4px'}}>{parseInt(latest.stringPrice||0).toLocaleString()}원</span>
                                            </div>
                                        </div>
                                        {latest.tension && <div className="card-row"><span className="card-label">텐션</span><span className="tension-badge">⚡ {latest.tension} lbs</span></div>}
                                        <div className="card-row" style={{marginBottom:0}}>
                                            <span className="card-label">공임</span>
                                            <span className="card-val" style={{color:'#616161'}}>{parseInt(latest.labor||0).toLocaleString()}원</span>
                                            <span style={{fontSize:'11px',color:'#bbb',marginLeft:'12px'}}>수량</span>
                                            <span className="card-val" style={{color:'#616161',marginLeft:'4px'}}>{latest.quantity}개</span>
                                        </div>
                                        {latest.extraWorks&&latest.extraWorks.length>0 && (
                                            <div className="extra-works-box" style={{marginTop:'8px'}}>
                                                <div className="extra-works-label">🛠️ 추가작업</div>
                                                <div>{latest.extraWorks.map((w,i)=>(<span key={i} className="extra-chip">{w.name} {parseInt(w.price||0).toLocaleString()}원</span>))}</div>

                            <span className="section-count">{Object.keys(customStrings).length}개</span>
                        </div>
                        {Object.keys(customStrings).length===0 && <div className="empty-state">등록된 스트링이 없습니다.<br/>위 버튼으로 추가해주세요.</div>}
                        {Object.entries(customStrings).sort((a,b)=>a[0].localeCompare(b[0],'ko')).map(([name,price])=>(
                            <div key={name} style={{borderBottom:'1px solid #F5F5F5'}}>
                                {editingStringKey===name ? (
                                    <div style={{padding:'10px 14px',background:'#F0F9FF'}}>
                                        <input type="text" value={editStringName} onChange={e=>setEditStringName(e.target.value)}
                                            className="form-input" style={{marginBottom:'8px'}} placeholder="스트링 이름"/>
                                        <div style={{display:'flex',gap:'8px'}}>
                                            <input type="number" value={editStringPrice} onChange={e=>setEditStringPrice(e.target.value)}
                                                className="form-input" style={{flex:1,marginBottom:0}} placeholder="가격 (원)"/>
                                            <button onClick={handleSaveEditString}
                                                style={{padding:'11px 16px',background:'#3B82F6',color:'#fff',borderRadius:'11px',border:'none',fontWeight:700,fontSize:'13px',cursor:'pointer'}}>저장</button>
                                            <button onClick={()=>setEditingStringKey(null)}
                                                style={{padding:'11px 12px',background:'#E0E0E0',color:'#616161',borderRadius:'11px',border:'none',fontWeight:700,fontSize:'13px',cursor:'pointer'}}>취소</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div style={{display:'flex',alignItems:'center',padding:'13px 16px'}}>
                                        <div style={{flex:1}}>
                                            <div style={{fontSize:'14px',fontWeight:700,color:'#111'}}>{name}</div>
                                            <div style={{fontSize:'12px',color:'#9E9E9E',marginTop:'2px',fontWeight:600}}>{price.toLocaleString()}원</div>
                                        </div>
                                        <div style={{display:'flex',gap:'4px'}}>
                                            <button onClick={()=>{setEditingStringKey(name);setEditStringName(name);setEditStringPrice(price.toString());}}
                                                style={{width:'36px',height:'36px',background:'#EFF6FF',border:'none',borderRadius:'9px',cursor:'pointer',fontSize:'15px'}}>✏️</button>
                                            <button onClick={()=>handleDeleteString(name)}
                                                style={{width:'36px',height:'36px',background:'#FFF1F2',border:'none',borderRadius:'9px',cursor:'pointer',fontSize:'15px'}}>🗑️</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            )}
            {/* ══ 하단 고정 메뉴바 ══ */}
            <div className="bottom-nav">
                <button className="nav-item" onClick={()=>{setViewMode('customers');setShowForm(false);}}>
                    <div className="nav-icon" style={(viewMode==='customers'&&!showForm)?{background:'linear-gradient(135deg,#15803D,#22C55E)',boxShadow:'0 4px 12px rgba(34,197,94,0.4)'}:{background:'#F5F5F5'}}>🏠</div>
                    <span className="nav-label" style={(viewMode==='customers'&&!showForm)?{color:'#16A34A'}:{}}>홈</span>
                </button>
                <button className="nav-item" onClick={()=>{setViewMode('customers');setShowForm(false);}}>
                    <div className="nav-icon" style={{background:'#F5F5F5'}}>👥</div>
                    <span className="nav-label">고객</span>
                </button>
                <button className="nav-center-btn" style={{background:'none',border:'none'}}
                    onClick={()=>{if(showForm&&editingId){resetForm();}else{setShowForm(!showForm);}if(!showForm){setEditingId(null);setFormData(makeEmptyForm());setExtraWorks([]);setShowExtraSection(false);setAppliedCoupon(null);setCouponInput('');setCouponMsg('');setViewMode('customers');}}}>
                    <div className={`nav-center-inner ${showForm?'cancel':''}`}>{showForm?'✕':'＋'}</div>
                    <span className="nav-center-label">{showForm?'취소':'등록'}</span>
                </button>
                <button className="nav-item" onClick={()=>{setViewMode('monthly');setShowForm(false);}}>
                    <div className="nav-icon" style={(viewMode==='monthly'||viewMode==='yearly')?{background:'linear-gradient(135deg,#EA580C,#F97316)',boxShadow:'0 4px 12px rgba(249,115,22,0.4)'}:{background:'#F5F5F5'}}>📊</div>
                    <span className="nav-label" style={(viewMode==='monthly'||viewMode==='yearly')?{color:'#EA580C'}:{}}>통계</span>
                </button>
                <button className="nav-item" onClick={()=>{setViewMode('coupons');setShowForm(false);}}>
                    <div className="nav-icon" style={(viewMode==='coupons'||viewMode==='strings')?{background:'linear-gradient(135deg,#be185d,#EC4899)',boxShadow:'0 4px 12px rgba(236,72,153,0.4)'}:{background:'#F5F5F5'}}>⚙️</div>
                    <span className="nav-label" style={(viewMode==='coupons'||viewMode==='strings')?{color:'#be185d'}:{}}>설정</span>
                </button>
            </div>
        </div>
    );
};

// ══════════════════════════════════════════════
// 🏆 최상위 앱
// ══════════════════════════════════════════════
const App = () => {
    const [user, setUser] = useState(null);
    const [authLoading, setAuthLoading] = useState(true);
    const [sport, setSport] = useState('tennis');

    useEffect(() => {
        const unsub = auth.onAuthStateChanged(u => {
            setUser(u);
            setAuthLoading(false);
        });
        return () => unsub();
    }, []);

    const handleLogout = async () => {
        await auth.signOut();
    };

    if (authLoading) return (
        <div style={{minHeight:'100vh',background:'#111',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{textAlign:'center'}}>
                <div className="spinner" style={{margin:'0 auto 16px'}}></div>
                <p style={{color:'#616161',fontSize:'13px',fontWeight:600}}>로딩 중...</p>
            </div>
        </div>
    );

    if (!user) return <LoginScreen />;

    const isAdmin = user.email === ADMIN_EMAIL;

    return (
        <div style={{minHeight:'100vh',background:'#F5F5F5'}}>
            <div className="app-header">
                <div className="header-top">
                    <div className="header-brand">
                        <div className="header-logo">N</div>
                        <div>
                            <div className="header-title">NIJI STRING PRO</div>
                            <div className="header-subtitle">{user.email}{isAdmin && <span style={{marginLeft:'6px',fontSize:'9px',background:'#F59E0B',color:'#fff',padding:'1px 6px',borderRadius:'10px',fontWeight:900}}>ADMIN</span>}</div>
                        </div>
                    </div>
                    <button onClick={handleLogout} className="logout-btn">로그아웃</button>
                </div>
                <div className="sport-tabs">
                    <button onClick={()=>setSport('tennis')} className={`sport-tab ${sport==='tennis'?'active-green':''}`}>🎾 테니스</button>
                    <button onClick={()=>setSport('badminton')} className={`sport-tab ${sport==='badminton'?'active-blue':''}`}>🏸 배드민턴</button>
                </div>
            </div>
            <StringingApp key={`${user.uid}-${sport}`} sport={sport} uid={user.uid} isAdmin={isAdmin} />
        </div>
    );
};

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
