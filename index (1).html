


<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스트링 작업 관리</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        input, select, textarea { font-size: 16px !important; }
        button { min-height: 40px; touch-action: manipulation; }
        * { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ── 초성 검색 유틸 ──────────────────────────────
        const getChosung = (str) => {
          const list = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
          return [...str].map(c => { const code = c.charCodeAt(0) - 44032; return (code > -1 && code < 11172) ? list[Math.floor(code/588)] : c; }).join('');
        };
        const matchChosung = (str, search) => {
          if (!search) return true;
          return str.toLowerCase().includes(search.toLowerCase()) || getChosung(str).includes(search);
        };

        // ── KST 오늘 날짜 ────────────────────────────────
        const getTodayKST = () => {
          const d = new Date();
          const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
          return kst.toISOString().split('T')[0];
        };

        // ── 스포츠별 설정 ────────────────────────────────
        const SPORTS_CONFIG = {
          tennis: {
            label: '🎾 테니스',
            color: 'green',
            racketLabel: '라켓명',
            racketPlaceholder: '헤드 스피드 MP 300g',
            patterns: ['오픈', '덴스'],
            defaultLabors: ['12000', '15000'],
            defaultStrings: {},
            initialData: [
              { date: '2026-01-02', name: '김병수', racket: '헤드 스피드 MP 300g', pattern: '오픈', stringType: '요넥스 폴리투어프로', stringPrice: '11000', labor: '12000', quantity: 2, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-01-04', name: '최치영', racket: '헤드 레디컬 프로 310g', pattern: '오픈', stringType: '자가 스트링', stringPrice: '0', labor: '12000', quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-01-06', name: '김수산', racket: '윌슨 블레이드 98 305g 16/19', pattern: '오픈', stringType: '자가 스트링', stringPrice: '0', labor: '12000', quantity: 2, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-01-07', name: '김삼기', racket: '던롭 다이아클러스터 10.0 골드 250g 16/18', pattern: '오픈', stringType: '투나 프리미엄 폴리', stringPrice: '5000', labor: '12000', quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-01-14', name: '최관표', racket: '던롭 26 FX500 300g 16/19', pattern: '오픈', stringType: '쿠폰', stringPrice: '10000', labor: '12000', quantity: 2, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-01-14', name: '홍기현', racket: '바볼랏 퓨어 에어로 300g', pattern: '오픈', stringType: '투나 프리미엄 폴리', stringPrice: '5000', labor: '12000', quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-01-16', name: '제임스', racket: '윌슨 2023 쉬프트 99 v1.0 300g', pattern: '오픈', stringType: '자가 스트링', stringPrice: '0', labor: '12000', quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-01-18', name: '윤은철', racket: '요넥스 이죤 100 300g', pattern: '오픈', stringType: '럭실론 4G', stringPrice: '21000', labor: '12000', quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-01-27', name: '홍미선', racket: '바볼랏 2023 퓨어 에어로 TEAM 285g', pattern: '오픈', stringType: '헤드 링스투어', stringPrice: '13000', labor: '12000', quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-01-28', name: '홍미선', racket: '바볼랏 2021 퓨어 드라이브 라이트 100 270g', pattern: '오픈', stringType: '헤드 링스투어', stringPrice: '13000', labor: '12000', quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-01-31', name: '홍미선', racket: '바볼랏 2021 퓨어 드라이브 라이트 100 270g', pattern: '오픈', stringType: '헤드 링스투어', stringPrice: '13000', labor: '12000', quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-02-01', name: '김용선', racket: '헤드 익스트림 MP 300g', pattern: '오픈', stringType: '자가 스트링', stringPrice: '0', labor: '0', quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-02-01', name: '최길희', racket: '윌슨 2022 블레이드 98 PRO v8.0 98sqin / 305g', pattern: '오픈', stringType: '자가 스트링', stringPrice: '0', labor: '0', quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-02-04', name: '이민홍', racket: '헤드 레디컬 MP 300g', pattern: '오픈', stringType: '바볼랏 RPM블라스트', stringPrice: '13000', labor: '12000', quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-02-04', name: '황두영', racket: '헤드 레디컬 프로 200 315g', pattern: '오픈', stringType: '럭실론 4G', stringPrice: '21000', labor: '12000', quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-02-04', name: '황두영', racket: '헤드 레디컬 MP 300g', pattern: '오픈', stringType: '럭실론 4G', stringPrice: '21000', labor: '12000', quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-02-05', name: '김삼기', racket: '바볼랏 퓨어드라이브 100 300g', pattern: '오픈', stringType: '투나 프리미엄 폴리', stringPrice: '5000', labor: '12000', quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-02-08', name: '김민정', racket: '헤드 2025 그래비티 팀 270g', pattern: '오픈', stringType: '바볼랏 RPM블라스트', stringPrice: '13000', labor: '12000', quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '' },
              { date: '2026-02-08', name: '김민정', racket: '헤드 2025 그래비티 팀 270g', pattern: '오픈', stringType: '범퍼 값', stringPrice: '15000', labor: '5000', quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '' },
            ],
          },
          badminton: {
            label: '🏸 배드민턴',
            color: 'blue',
            racketLabel: '라켓명',
            racketPlaceholder: '요넥스 아스트록스 88S',
            patterns: ['오픈', '덴스'],
            defaultLabors: ['10000', '12000', '8000'],
            defaultStrings: {},
            initialData: [],
          },
        };

        // ── 스트링 관리 앱 (스포츠별 공용) ──────────────
        const StringingApp = ({ sport }) => {
          const config = SPORTS_CONFIG[sport];
          const color = config.color;

          const [records, setRecords] = useState([]);
          const [customStrings, setCustomStrings] = useState({...config.defaultStrings});
          const [showForm, setShowForm] = useState(false);
          const [editingId, setEditingId] = useState(null);
          const [searchTerm, setSearchTerm] = useState('');
          const [viewMode, setViewMode] = useState('customers');
          const [showAddString, setShowAddString] = useState(false);
          const [newStringName, setNewStringName] = useState('');
          const [newStringPrice, setNewStringPrice] = useState('');
          const [showStringDropdown, setShowStringDropdown] = useState(false);
          const [showHybridDropdown, setShowHybridDropdown] = useState(false);
          const [showNameDropdown, setShowNameDropdown] = useState(false);
          const [showRacketDropdown, setShowRacketDropdown] = useState(false);
          const [showAddModal, setShowAddModal] = useState(false);
          const [modalStringName, setModalStringName] = useState('');
          const [modalStringPrice, setModalStringPrice] = useState('');
          const [editingStringKey, setEditingStringKey] = useState(null);
          const [editStringName, setEditStringName] = useState('');
          const [editStringPrice, setEditStringPrice] = useState('');
          const [coupons, setCoupons] = useState([]);
          const [couponForm, setCouponForm] = useState({code:'', discount:'', expiry:'', note:''});
          const [showCouponForm, setShowCouponForm] = useState(false);
          const [appliedCoupon, setAppliedCoupon] = useState(null);
          const [couponInput, setCouponInput] = useState('');
          const [couponMsg, setCouponMsg] = useState('');

          // ── 추가작업 관련 state ───────────────────────
          const DEFAULT_EXTRA_ITEMS = ['스텐실 작업', '범퍼 교체', '오버그립', '그립테이프', '진동방지구', '기타'];
          const extraItemsKey = 'stringing-extra-items-' + sport;
          const [savedExtraItems, setSavedExtraItems] = useState([]);
          const [extraWorks, setExtraWorks] = useState([]); // [{name, price}]
          const [showExtraSection, setShowExtraSection] = useState(false);
          const [showExtraDropdown, setShowExtraDropdown] = useState(null); // index
          const [showAddExtraItemModal, setShowAddExtraItemModal] = useState(false);
          const [newExtraItemName, setNewExtraItemName] = useState('');
          const [newExtraItemPrice, setNewExtraItemPrice] = useState('');

          const stringPrices = {...config.defaultStrings, ...customStrings};

          const emptyForm = () => ({
            date: getTodayKST(),
            name: '', racket: '',
            pattern: config.patterns[0],
            stringType: '', stringPrice: '',
            labor: config.defaultLabors[0],
            quantity: 1,
            tension: '', tensionH: '', tensionV: '',
            isHybrid: false, hybridString2: '', hybridPrice2: '',
          });

          const [formData, setFormData] = useState(emptyForm());

          // localStorage 키 (스포츠별 분리)
          const storageKey = 'stringing-records-' + sport;
          const stringsKey = 'stringing-all-strings-v2-' + sport;
          const couponKey = 'stringing-coupons-' + sport;

          useEffect(() => {
            try {
              const saved = localStorage.getItem(storageKey);
              if (saved) {
                setRecords(JSON.parse(saved));
              } else {
                const data = config.initialData.map((r, i) => ({
                  ...r,
                  id: Date.now() + i,
                  total: (parseFloat(r.stringPrice) + parseFloat(r.labor)) * parseInt(r.quantity),
                  createdAt: new Date(r.date).getTime() + i,
                }));
                setRecords(data);
                localStorage.setItem(storageKey, JSON.stringify(data));
              }
              const savedStrings = localStorage.getItem(stringsKey);
              if (savedStrings) {
                setCustomStrings(JSON.parse(savedStrings));
              } else {
                // 최초: 기본 스트링으로 초기화 (배드민턴은 빈 객체)
                setCustomStrings({...config.defaultStrings});
              }
              const savedCoupons = localStorage.getItem(couponKey);
              if (savedCoupons) setCoupons(JSON.parse(savedCoupons));
              const savedExtras = localStorage.getItem(extraItemsKey);
              if (savedExtras) setSavedExtraItems(JSON.parse(savedExtras));
              else setSavedExtraItems(DEFAULT_EXTRA_ITEMS.map(n=>({name:n, price:''})));
            } catch(e) {
              console.log('데이터 로드 오류:', e);
            }
            setFormData(emptyForm());
            setAppliedCoupon(null);
            setCouponInput('');
            setCouponMsg('');
            setExtraWorks([]);
            setShowExtraSection(false);
          }, [sport]);

          // records 저장
          const saveRecords = (newRecords) => {
            setRecords(newRecords);
            try {
              localStorage.setItem(storageKey, JSON.stringify(newRecords));
            } catch(e) {
              alert('저장 실패: 데이터 용량이 초과됐습니다.');
            }
          };

          // coupons 저장
          const saveCoupons = (arr) => {
            setCoupons(arr);
            try { localStorage.setItem(couponKey, JSON.stringify(arr)); } catch(e) {}
          };

          // strings 저장
          const saveCustomStrings = (newStrings) => {
            setCustomStrings(newStrings);
            try { localStorage.setItem(stringsKey, JSON.stringify(newStrings)); } catch(e) {}
          };

          const saveExtraItems = (items) => {
            setSavedExtraItems(items);
            try { localStorage.setItem(extraItemsKey, JSON.stringify(items)); } catch(e) {}
          };

          // ── 계산 ─────────────────────────────────────
          const calculateExtraTotal = () => extraWorks.reduce((sum, w) => sum + (parseFloat(w.price)||0), 0);

          const calculateTotal = (fd = formData) => {
            let sp = parseFloat(fd.stringPrice) || 0;
            const labor = parseFloat(fd.labor) || 0;
            const qty = parseInt(fd.quantity) || 1;
            const hybrid = fd.isHybrid ? 2000 : 0;
            if (fd.isHybrid && fd.hybridPrice2) sp = (sp + (parseFloat(fd.hybridPrice2) || 0)) / 2;
            return (sp + labor + hybrid) * qty + calculateExtraTotal();
          };

          // ── CRUD ─────────────────────────────────────
          const handleSubmit = (e) => {
            e.preventDefault();
            const finalTotal = calculateTotalWithCoupon();
            const recId = editingId || Date.now();
            const rec = {
              id: recId,
              ...formData,
              extraWorks: extraWorks.filter(w => w.name.trim()),
              total: finalTotal,
              couponCode: appliedCoupon ? appliedCoupon.code : '',
              couponDiscount: appliedCoupon ? appliedCoupon.discount : 0,
              createdAt: editingId ? records.find(r=>r.id===editingId)?.createdAt : Date.now()
            };
            saveRecords(editingId ? records.map(r=>r.id===editingId?rec:r) : [...records, rec]);
            // 쿠폰 사용 처리
            if (appliedCoupon && !editingId) {
              const updated = coupons.map(c => c.code === appliedCoupon.code
                ? {...c, used: true, usedDate: getTodayKST(), usedFor: formData.name}
                : c);
              saveCoupons(updated);
            }
            setAppliedCoupon(null); setCouponInput(''); setCouponMsg('');
            resetForm();
          };

          const resetForm = () => {
            const name = formData.name;
            setFormData({ ...emptyForm(), name });
            setShowForm(false);
            setEditingId(null);
            setExtraWorks([]);
            setShowExtraSection(false);
          };

          const handleEdit = (rec) => {
            setFormData({ date:rec.date, name:rec.name, racket:rec.racket, pattern:rec.pattern, stringType:rec.stringType, stringPrice:rec.stringPrice, labor:rec.labor, quantity:rec.quantity, tension:rec.tension||'', tensionH:rec.tensionH||'', tensionV:rec.tensionV||'', isHybrid:rec.isHybrid||false, hybridString2:rec.hybridString2||'', hybridPrice2:rec.hybridPrice2||'' });
            const ew = rec.extraWorks || [];
            setExtraWorks(ew);
            setShowExtraSection(ew.length > 0);
            setEditingId(rec.id);
            setShowForm(true);
          };

          const handleDelete = (id) => {
            if (window.confirm('정말 삭제하시겠습니까?')) {
              saveRecords(records.filter(r=>r.id!==id));
            }
          };

          // ── 드롭다운 핸들러 ───────────────────────────
          const handleStringSelect = (name, isSecond=false) => {
            const price = (stringPrices[name] || 0).toString();
            if (isSecond) { setFormData({...formData, hybridString2:name, hybridPrice2:price}); setShowHybridDropdown(false); }
            else { setFormData({...formData, stringType:name, stringPrice:price}); setShowStringDropdown(false); }
          };

          const handleNameSelect = (name) => {
            const last = [...records].filter(r=>r.name===name).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
            if (last) setFormData({ date:getTodayKST(), name, racket:last.racket, pattern:last.pattern, stringType:last.stringType, stringPrice:last.stringPrice, labor:last.labor, quantity:last.quantity, isHybrid:last.isHybrid||false, hybridString2:last.hybridString2||'', hybridPrice2:last.hybridPrice2||'' });
            else setFormData({...formData, name});
            setShowNameDropdown(false);
          };

          const handleNameChange = (name) => {
            setFormData({...formData, name});
            const matches = getUniqueNames(name);
            if (name.length > 0 && matches.length === 1 && /^[ㄱ-ㅎ]+$/.test(name)) { handleNameSelect(matches[0]); return; }
            setShowNameDropdown(name.length > 0 && matches.length > 0);
          };

          const handleRacketChange = (racket) => {
            setFormData({...formData, racket});
            setShowRacketDropdown(racket.length > 0);
          };

          const handleStringChange = (val, isSecond=false) => {
            // 직접 타이핑 시 가격은 건드리지 않음 (선택 시에만 가격 자동입력)
            if (isSecond) {
              setFormData(prev => ({...prev, hybridString2:val}));
              setShowHybridDropdown(val.length > 0);
            } else {
              setFormData(prev => ({...prev, stringType:val}));
              setShowStringDropdown(val.length > 0);
            }
          };

          const handleAddCustomString = () => {
            if (newStringName.trim() && newStringPrice !== '') {
              saveCustomStrings({...customStrings, [newStringName.trim()]: parseFloat(newStringPrice) || 0});
              setNewStringName('');
              setNewStringPrice('');
              setShowAddString(false);
              setShowStringDropdown(false);
              setShowHybridDropdown(false);
            }
          };

          const handleAddModal = () => {
            if (modalStringName.trim() && modalStringPrice !== '') {
              saveCustomStrings({...customStrings, [modalStringName.trim()]: parseFloat(modalStringPrice) || 0});
              setModalStringName('');
              setModalStringPrice('');
              setShowAddModal(false);
            }
          };

          // 쿠폰 적용 (폼에서)
          const handleApplyCoupon = () => {
            const code = couponInput.trim().toUpperCase();
            const today = getTodayKST();
            const found = coupons.find(c => c.code.toUpperCase() === code);
            if (!found) { setCouponMsg('❌ 쿠폰번호를 찾을 수 없습니다.'); setAppliedCoupon(null); return; }
            if (found.used) { setCouponMsg('❌ 이미 사용된 쿠폰입니다.'); setAppliedCoupon(null); return; }
            if (found.expiry && found.expiry < today) { setCouponMsg('❌ 만료된 쿠폰입니다.'); setAppliedCoupon(null); return; }
            setAppliedCoupon(found);
            setCouponMsg('✅ 쿠폰이 적용되었습니다! ' + parseInt(found.discount).toLocaleString() + '원 할인');
          };

          const calculateTotalWithCoupon = () => {
            const base = calculateTotal();
            if (!appliedCoupon) return base;
            return Math.max(0, base - parseFloat(appliedCoupon.discount));
          };

          const handleEditString = (key, name, price) => {
            setEditingStringKey(key);
            setEditStringName(name);
            setEditStringPrice(price.toString());
          };

          const handleSaveEditString = () => {
            if (!editStringName.trim() || editStringPrice === '') return;
            const updated = {...customStrings};
            if (editStringName.trim() !== editingStringKey) delete updated[editingStringKey];
            updated[editStringName.trim()] = parseFloat(editStringPrice) || 0;
            saveCustomStrings(updated);
            setEditingStringKey(null);
          };

          const handleDeleteString = (key) => {
            if (window.confirm(`'${key}' 스트링을 삭제할까요?`)) {
              const updated = {...customStrings};
              delete updated[key];
              saveCustomStrings(updated);
            }
          };

          // ── 필터 헬퍼 ─────────────────────────────────
          const getUniqueNames = (term='') => [...new Set(records.map(r=>r.name))].filter(n=>matchChosung(n, term||formData.name));
          const getUniqueRackets = () => [...new Set(records.map(r=>r.racket))].filter(r=>matchChosung(r, formData.racket));
          const getFilteredStrings = (term) => Object.keys(stringPrices).filter(s=>matchChosung(s,term)).sort();

          // ── 통계 ─────────────────────────────────────
          const getCustomerStats = () => {
            const map = {};
            records.forEach(r => {
              if (!map[r.name]) map[r.name] = {name:r.name, visits:[], totalAmount:0};
              map[r.name].visits.push(r);
              map[r.name].totalAmount += r.total;
            });
            return Object.values(map).map(c => ({
              ...c,
              visitCount: c.visits.length,
              lastVisit: [...c.visits].sort((a,b)=>new Date(b.date)-new Date(a.date))[0],
              yearlyVisits: c.visits.filter(v=>new Date(v.date)>=new Date(new Date().setFullYear(new Date().getFullYear()-1))).length,
            })).sort((a,b)=>new Date(b.lastVisit.date)-new Date(a.lastVisit.date));
          };

          const getMonthlyStats = () => {
            const map = {};
            records.forEach(r => {
              const m = r.date.substring(0,7);
              if (!map[m]) map[m] = {month:m, total:0, stringTotal:0, laborTotal:0, extraTotal:0, count:0};
              map[m].total += r.total;
              map[m].count++;
              const qty = parseInt(r.quantity) || 1;
              let sp = parseFloat(r.stringPrice) || 0;
              if (r.isHybrid && r.hybridPrice2) sp = (sp + (parseFloat(r.hybridPrice2)||0)) / 2;
              const hybrid = r.isHybrid ? 2000 : 0;

              const extra = (r.extraWorks||[]).reduce((s,w)=>s+(parseFloat(w.price)||0),0);
              map[m].extraTotal += extra;
            });
            return Object.values(map).sort((a,b)=>b.month.localeCompare(a.month));

              map[y].total += r.total;
              map[y].count++;
              const qty = parseInt(r.quantity) || 1;
              let sp = parseFloat(r.stringPrice) || 0;
              if (r.isHybrid && r.hybridPrice2) sp = (sp + (parseFloat(r.hybridPrice2)||0)) / 2;
              const hybrid = r.isHybrid ? 2000 : 0;
              map[y].stringTotal += (sp + hybrid) * qty;
              map[y].laborTotal += (parseFloat(r.labor)||0) * qty;
              const extra = (r.extraWorks||[]).reduce((s,w)=>s+(parseFloat(w.price)||0),0);
              map[y].extraTotal += extra;
            });
            return Object.values(map).sort((a,b)=>b.year.localeCompare(a.year));

                        <div className="flex justify-between items-center px-4 py-3 bg-gray-50 border-b border-gray-200">
                          <div>
                            <p className="text-lg font-bold text-gray-800">{stat.year}년</p>
                            <p className="text-xs text-gray-400">총 {stat.count}건 · 월평균 {Math.round(stat.total/12).toLocaleString()}원</p>
                          </div>
                          <p className="text-xl font-bold text-purple-600">{stat.total.toLocaleString()}원</p>
                        </div>
                        {/* 항목별 */}
                        <div className="divide-y divide-gray-100">
                          <div className="flex justify-between items-center px-4 py-2.5">
                            <span className="text-xs text-gray-500">🎯 스트링비 합계</span>
                            <span className="text-base font-bold text-orange-600">{stat.stringTotal.toLocaleString()}원</span>
                          </div>
                          <div className="flex justify-between items-center px-4 py-2.5">
                            <span className="text-xs text-gray-500">🔧 공임비 합계</span>
                            <span className="text-base font-bold text-blue-600">{stat.laborTotal.toLocaleString()}원</span>
                          </div>
                          <div className="flex justify-between items-center px-4 py-2.5">
                            <span className="text-xs text-gray-500">🛠️ 추가작업비 합계</span>
                            <span className="text-base font-bold text-indigo-600">{(stat.extraTotal||0).toLocaleString()}원</span>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        };

        // ── 최상위 앱 (스포츠 탭 전환) ──────────────────
        const App = () => {
          const [sport, setSport] = useState('tennis');
          return (
            <div className="min-h-screen bg-gray-100">
              {/* 스포츠 탭 헤더 */}
              <div className={`${sport==='tennis' ? 'bg-green-600' : 'bg-blue-600'} text-white px-4 pt-4 pb-0 shadow-md`}>
                <h1 className="text-lg font-bold mb-3">🏆 스트링 작업 관리</h1>
                <div className="flex">
                  <button
                    onClick={()=>setSport('tennis')}
                    className={`flex-1 py-2 text-sm font-bold rounded-t-xl transition-colors ${sport==='tennis' ? 'bg-white text-green-600' : 'bg-green-700 text-green-100'}`}>
                    🎾 테니스
                  </button>
                  <button
                    onClick={()=>setSport('badminton')}
                    className={`flex-1 py-2 text-sm font-bold rounded-t-xl transition-colors ${sport==='badminton' ? 'bg-white text-blue-600' : 'bg-blue-700 text-blue-100'}`}>
                    🏸 배드민턴
                  </button>
                </div>
              </div>

              {/* 콘텐츠 */}
              <div className="p-3 max-w-2xl mx-auto">
                <StringingApp key={sport} sport={sport} />
              </div>
            </div>
          );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
