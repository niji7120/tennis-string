<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스트링 작업 관리</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f3f4f6; }
        input, select, textarea { font-size: 16px !important; }
        button { min-height: 40px; touch-action: manipulation; }
        * { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ── [중요] IndexedDB 설정 (용량 문제 해결용 창고) ──
        const dbName = "NijiStringDB_v18";
        const initDB = () => {
            return new Promise((resolve) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains("records")) db.createObjectStore("records", { keyPath: "id" });
                    if (!db.objectStoreNames.contains("settings")) db.createObjectStore("settings", { keyPath: "key" });
                    if (!db.objectStoreNames.contains("coupons")) db.createObjectStore("coupons", { keyPath: "id" });
                };
                request.onsuccess = (e) => resolve(e.target.result);
            });
        };

        const dbSave = async (storeName, data) => {
            const db = await initDB();
            const tx = db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).put(data);
        };

        const dbGetAll = async (storeName) => {
            const db = await initDB();
            return new Promise((resolve) => {
                const tx = db.transaction(storeName, "readonly");
                const request = tx.objectStore(storeName).getAll();
                request.onsuccess = () => resolve(request.result);
            });
        };

        const dbDelete = async (storeName, id) => {
            const db = await initDB();
            const tx = db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).delete(id);
        };

        // ── 기존 유틸리티 (보내주신 것과 동일) ──
        const getChosung = (str) => {
          const list = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
          return [...str].map(c => { const code = c.charCodeAt(0) - 44032; return (code > -1 && code < 11172) ? list[Math.floor(code/588)] : c; }).join('');
        };
        const matchChosung = (str, search) => {
          if (!search) return true;
          return str.toLowerCase().includes(search.toLowerCase()) || getChosung(str).includes(search);
        };

        const SPORTS_CONFIG = {
          tennis: { label: '🎾 테니스', color: 'green', racketLabel: '라켓명', racketPlaceholder: '헤드 스피드 MP 300g', patterns: ['오픈', '덴스'], defaultLabors: ['12000', '15000'], defaultStrings: {}, initialData: [] },
          badminton: { label: '🏸 배드민턴', color: 'blue', racketLabel: '라켓명', racketPlaceholder: '요넥스 아스트록스 88S', patterns: ['오픈', '덴스'], defaultLabors: ['10000', '12000', '8000'], defaultStrings: {}, initialData: [] }
        };

        const StringingApp = ({ sport }) => {
          const config = SPORTS_CONFIG[sport];
          const color = config.color;

          // ── 기존 상태값들 그대로 유지 ──
          const [records, setRecords] = useState([]);
          const [customStrings, setCustomStrings] = useState({});
          const [showForm, setShowForm] = useState(false);
          const [editingId, setEditingId] = useState(null);
          const [searchTerm, setSearchTerm] = useState('');
          const [viewMode, setViewMode] = useState('customers');
          const [showAddModal, setShowAddModal] = useState(false);
          const [modalStringName, setModalStringName] = useState('');
          const [modalStringPrice, setModalStringPrice] = useState('');
          const [showStringDropdown, setShowStringDropdown] = useState(false);
          const [showHybridDropdown, setShowHybridDropdown] = useState(false);
          const [showNameDropdown, setShowNameDropdown] = useState(false);
          const [showRacketDropdown, setShowRacketDropdown] = useState(false);
          const [coupons, setCoupons] = useState([]);
          const [couponForm, setCouponForm] = useState({code:'', discount:'', expiry:'', note:''});
          const [showCouponForm, setShowCouponForm] = useState(false);
          const [appliedCoupon, setAppliedCoupon] = useState(null);
          const [couponInput, setCouponInput] = useState('');
          const [couponMsg, setCouponMsg] = useState('');
          const [editingStringKey, setEditingStringKey] = useState(null);
          const [editStringName, setEditStringName] = useState('');
          const [editStringPrice, setEditStringPrice] = useState('');

          const stringPrices = {...config.defaultStrings, ...customStrings};

          const emptyForm = () => ({
            date: new Date().toISOString().split('T')[0],
            name: '', racket: '', pattern: config.patterns[0],
            stringType: '', stringPrice: '', labor: config.defaultLabors[0],
            quantity: 1, isHybrid: false, hybridString2: '', hybridPrice2: '',
          });

          const [formData, setFormData] = useState(emptyForm());

          // ── [핵심] 데이터 로드 로직 (LocalStorage 대신 DB 사용) ──
          useEffect(() => {
            const loadData = async () => {
              const allRecs = await dbGetAll("records");
              setRecords(allRecs.filter(r => r.sport === sport));
              
              const allStrings = await dbGetAll("settings");
              const savedStrings = allStrings.find(s => s.key === `strings_${sport}`);
              if (savedStrings) setCustomStrings(savedStrings.value);

              const allCoupons = await dbGetAll("coupons");
              setCoupons(allCoupons.filter(c => c.sport === sport));
            };
            loadData();
            setFormData(emptyForm());
            setAppliedCoupon(null);
            setCouponInput('');
            setCouponMsg('');
          }, [sport]);

          // ── 기존 함수들 (DB 저장방식으로 변경) ──
          const handleSubmit = async (e) => {
            e.preventDefault();
            const finalTotal = calculateTotalWithCoupon();
            const recId = editingId || Date.now();
            const rec = {
              id: recId, ...formData, sport, total: finalTotal,
              couponCode: appliedCoupon ? appliedCoupon.code : '',
              couponDiscount: appliedCoupon ? appliedCoupon.discount : 0,
              createdAt: editingId ? records.find(r=>r.id===editingId)?.createdAt : Date.now()
            };
            await dbSave("records", rec);
            setRecords(editingId ? records.map(r=>r.id===editingId?rec:r) : [rec, ...records]);

            if (appliedCoupon && !editingId) {
              const updated = coupons.map(c => c.code === appliedCoupon.code ? {...c, used: true, usedDate: new Date().toISOString().split('T')[0], usedFor: formData.name} : c);
              const targetCoupon = updated.find(c => c.code === appliedCoupon.code);
              await dbSave("coupons", targetCoupon);
              setCoupons(updated);
            }
            setShowForm(false); setEditingId(null); setAppliedCoupon(null); setCouponInput('');
          };

          const handleDelete = async (id) => {
            if (window.confirm('정말 삭제하시겠습니까?')) {
              await dbDelete("records", id);
              setRecords(records.filter(r=>r.id!==id));
            }
          };

          const handleSaveCustomStrings = async (newStrings) => {
            setCustomStrings(newStrings);
            await dbSave("settings", { key: `strings_${sport}`, value: newStrings });
          };

          // (그 외 기존 드롭다운/계산 로직은 보내주신 파일과 동일하게 유지...)
          const calculateTotal = (fd = formData) => {
            let sp = parseFloat(fd.stringPrice) || 0;
            const labor = parseFloat(fd.labor) || 0;
            const qty = parseInt(fd.quantity) || 1;
            const hybrid = fd.isHybrid ? 2000 : 0;
            if (fd.isHybrid && fd.hybridPrice2) sp = (sp + (parseFloat(fd.hybridPrice2) || 0)) / 2;
            return (sp + labor + hybrid) * qty;
          };

          const calculateTotalWithCoupon = () => {
            const base = calculateTotal();
            return appliedCoupon ? Math.max(0, base - parseFloat(appliedCoupon.discount)) : base;
          };

          const handleStringSelect = (name, isSecond=false) => {
            const price = (stringPrices[name] || 0).toString();
            if (isSecond) { setFormData({...formData, hybridString2:name, hybridPrice2:price}); setShowHybridDropdown(false); }
            else { setFormData({...formData, stringType:name, stringPrice:price}); setShowStringDropdown(false); }
          };

          const handleNameSelect = (name) => {
            const last = [...records].filter(r=>r.name===name).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
            if (last) setFormData({ ...last, id: undefined, date: new Date().toISOString().split('T')[0] });
            else setFormData({...formData, name});
            setShowNameDropdown(false);
          };

          // ── UI 렌더링 (보내주신 디자인 그대로) ──
          const activeBtnClass = color==='green' ? 'bg-green-500 text-white' : 'bg-blue-500 text-white';
          const ringClass = color==='green' ? 'focus:ring-green-500' : 'focus:ring-blue-500';
          const statColor = color==='green' ? 'text-green-600' : 'text-blue-600';

          const sortedRecords = [...records].sort((a,b) => b.date.localeCompare(a.date) || (b.createdAt - a.createdAt));
          const displayRecords = searchTerm ? sortedRecords.filter(r => matchChosung(r.name, searchTerm)) : sortedRecords;

          return (
            <div className="pb-10">
              {/* [기존 상단 탭] */}
              <div className="grid grid-cols-5 gap-1 mb-3">
                {['customers', 'coupons', 'strings', 'monthly', 'yearly'].map(mode => (
                    <button key={mode} onClick={()=>setViewMode(mode)}
                        className={`py-2 rounded-lg font-medium text-[10px] transition-colors ${viewMode===mode ? activeBtnClass : 'bg-gray-200 text-gray-700'}`}>
                        {mode === 'customers' ? '👥 고객' : mode === 'coupons' ? '🎫 쿠폰' : mode === 'strings' ? '🎯 스트링' : mode === 'monthly' ? '📅 월별' : '📈 연도별'}
                    </button>
                ))}
              </div>

              {/* [고객 관리 뷰] */}
              {viewMode === 'customers' && (
                <div className="space-y-3">
                  <div className="flex gap-2">
                    <input type="text" placeholder="고객 검색..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}
                      className={`flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 ${ringClass}`}/>
                    <button onClick={()=>setShowForm(!showForm)} className={`px-4 py-2 rounded-lg font-medium text-sm whitespace-nowrap ${showForm ? 'bg-gray-400 text-white' : activeBtnClass}`}>
                      {showForm ? '✕ 취소' : '➕ 등록'}
                    </button>
                  </div>

                  {showForm && (
                    <div className="bg-white rounded-xl shadow-lg p-4 border-2 border-blue-100">
                      <form onSubmit={handleSubmit} className="space-y-3 text-sm">
                        <div className="grid grid-cols-2 gap-3">
                            <input type="date" value={formData.date} onChange={e=>setFormData({...formData, date:e.target.value})} className="p-2 border rounded-lg w-full"/>
                            <div className="relative">
                                <input type="text" placeholder="고객명" value={formData.name} onFocus={()=>setShowNameDropdown(true)} onBlur={()=>setTimeout(()=>setShowNameDropdown(false),200)} onChange={e=>setFormData({...formData, name:e.target.value})} className="p-2 border rounded-lg w-full"/>
                                {showNameDropdown && (
                                    <div className="absolute z-30 bg-white border w-full rounded-lg shadow-xl max-h-40 overflow-y-auto">
                                        {[...new Set(records.map(r=>r.name))].filter(n=>matchChosung(n, formData.name)).map(n=>(
                                            <div key={n} onMouseDown={()=>handleNameSelect(n)} className="p-3 border-b hover:bg-gray-100">{n}</div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                        <input type="text" placeholder="라켓명" value={formData.racket} onChange={e=>setFormData({...formData, racket:e.target.value})} className="p-2 border rounded-lg w-full"/>
                        <div className="grid grid-cols-2 gap-3">
                            <div className="relative">
                                <input type="text" placeholder="스트링" value={formData.stringType} onFocus={()=>setShowStringDropdown(true)} onBlur={()=>setTimeout(()=>setShowStringDropdown(false),200)} onChange={e=>setFormData({...formData, stringType:e.target.value})} className="p-2 border rounded-lg w-full"/>
                                {showStringDropdown && (
                                    <div className="absolute z-30 bg-white border w-full rounded-lg shadow-xl">
                                        {Object.keys(stringPrices).map(s=>(
                                            <div key={s} onMouseDown={()=>handleStringSelect(s)} className="p-3 border-b hover:bg-gray-100 flex justify-between"><span>{s}</span><span className="text-xs text-gray-400">{stringPrices[s]}원</span></div>
                                        ))}
                                        <div onMouseDown={()=>setShowAddModal(true)} className="p-3 text-blue-500 font-bold">+ 새 스트링 추가</div>
                                    </div>
                                )}
                            </div>
                            <input type="number" placeholder="스트링 가격" value={formData.stringPrice} onChange={e=>setFormData({...formData, stringPrice:e.target.value})} className="p-2 border rounded-lg w-full"/>
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                            <select value={formData.labor} onChange={e=>setFormData({...formData, labor:e.target.value})} className="p-2 border rounded-lg w-full">
                                {config.defaultLabors.map(l=><option key={l} value={l}>{l}원</option>)}
                                <option value="0">0원</option>
                            </select>
                            <input type="number" value={formData.quantity} onChange={e=>setFormData({...formData, quantity:e.target.value})} className="p-2 border rounded-lg w-full"/>
                        </div>
                        <div className="bg-gray-50 p-3 rounded-lg text-center font-bold text-lg">
                            합계: {calculateTotalWithCoupon().toLocaleString()}원
                        </div>
                        <button type="submit" className={`w-full py-3 rounded-lg text-white font-bold ${activeBtnClass}`}>저장하기</button>
                      </form>
                    </div>
                  )}

                  {displayRecords.map(r => (
                    <div key={r.id} className="bg-white rounded-xl shadow p-3 border border-gray-100 relative">
                      <div className="flex justify-between items-start">
                        <div>
                          <span className="text-xs text-gray-400">{r.date}</span>
                          <h3 className="font-bold text-gray-800">{r.name}</h3>
                        </div>
                        <div className="text-right">
                          <p className={`font-bold ${statColor}`}>{r.total.toLocaleString()}원</p>
                          <div className="flex gap-1 justify-end mt-1">
                            <button onClick={()=>{setEditingId(r.id); setFormData(r); setShowForm(true);}} className="text-xs text-blue-500">✏️</button>
                            <button onClick={()=>handleDelete(r.id)} className="text-xs text-red-400">🗑️</button>
                          </div>
                        </div>
                      </div>
                      <div className="mt-2 text-xs text-gray-600 border-t pt-2">
                        <p>라켓: {r.racket}</p>
                        <p>스트링: {r.stringType} ({r.quantity}자루)</p>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* [기타 통계 및 관리 뷰 (기존 파일 로직 유지)] */}
              {viewMode === 'strings' && (
                  <div className="bg-white p-4 rounded-xl shadow">
                      <h2 className="font-bold mb-4">🎯 스트링 관리</h2>
                      {Object.entries(customStrings).map(([name, price])=>(
                          <div key={name} className="flex justify-between p-2 border-b">
                              <span>{name} ({price}원)</span>
                              <button onClick={async ()=>{
                                  const updated = {...customStrings}; delete updated[name];
                                  await handleSaveCustomStrings(updated);
                              }} className="text-red-400 text-xs">삭제</button>
                          </div>
                      ))}
                      <button onClick={()=>setShowAddModal(true)} className="w-full mt-4 p-2 bg-yellow-500 text-white rounded-lg">+ 새 스트링 추가</button>
                  </div>
              )}

              {/* [추가 모달] */}
              {showAddModal && (
                  <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                      <div className="bg-white p-6 rounded-2xl w-full max-w-xs">
                          <h3 className="font-bold mb-4">새 스트링 추가</h3>
                          <input type="text" placeholder="이름" value={modalStringName} onChange={e=>setModalStringName(e.target.value)} className="w-full p-2 border rounded mb-2"/>
                          <input type="number" placeholder="가격" value={modalStringPrice} onChange={e=>setModalStringPrice(e.target.value)} className="w-full p-2 border rounded mb-4"/>
                          <div className="flex gap-2">
                              <button onClick={()=>setShowAddModal(false)} className="flex-1 p-2 bg-gray-200 rounded">취소</button>
                              <button onClick={async ()=>{
                                  const updated = {...customStrings, [modalStringName]: parseInt(modalStringPrice)};
                                  await handleSaveCustomStrings(updated);
                                  setShowAddModal(false); setModalStringName(''); setModalStringPrice('');
                              }} className="flex-1 p-2 bg-blue-500 text-white rounded">추가</button>
                          </div>
                      </div>
                  </div>
              )}
            </div>
          );
        };

        const App = () => {
          const [sport, setSport] = useState('tennis');
          return (
            <div className="min-h-screen bg-gray-100 pb-10">
              <div className={`${sport==='tennis' ? 'bg-green-600' : 'bg-blue-600'} text-white px-4 pt-4 pb-0 shadow-md`}>
                <h1 className="text-lg font-bold mb-3 italic">NIJI STRING <span className="text-xs font-normal opacity-70">v18-PRO</span></h1>
                <div className="flex">
                  <button onClick={()=>setSport('tennis')} className={`flex-1 py-2 text-sm font-bold rounded-t-xl ${sport==='tennis' ? 'bg-white text-green-600' : 'bg-green-700 text-green-100'}`}>🎾 테니스</button>
                  <button onClick={()=>setSport('badminton')} className={`flex-1 py-2 text-sm font-bold rounded-t-xl ${sport==='badminton' ? 'bg-white text-blue-600' : 'bg-blue-700 text-blue-100'}`}>🏸 배드민턴</button>
                </div>
              </div>
              <div className="p-3 max-w-md mx-auto"><StringingApp key={sport} sport={sport} /></div>
            </div>
          );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
