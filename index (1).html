<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Niji String - 스트링 작업 관리</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background-color: #f3f4f6; -webkit-font-smoothing: antialiased; }
        input, select, textarea { font-size: 16px !important; }
        button { min-height: 44px; touch-action: manipulation; }
        .safe-area { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ── 데이터베이스 관리 (용량 제한 없는 IndexedDB 사용) ──
        const dbName = "NijiStringDB";
        const initDB = () => {
            return new Promise((resolve) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains("records")) db.createObjectStore("records", { keyPath: "id" });
                    if (!db.objectStoreNames.contains("settings")) db.createObjectStore("settings", { keyPath: "key" });
                };
                request.onsuccess = (e) => resolve(e.target.result);
            });
        };

        const saveData = async (storeName, data) => {
            const db = await initDB();
            const tx = db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).put(data);
        };

        const getAllData = async (storeName) => {
            const db = await initDB();
            return new Promise((resolve) => {
                const tx = db.transaction(storeName, "readonly");
                const request = tx.objectStore(storeName).getAll();
                request.onsuccess = () => resolve(request.result);
            });
        };

        const deleteData = async (storeName, id) => {
            const db = await initDB();
            const tx = db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).delete(id);
        };

        // ── 초성 검색 유틸 ──
        const getChosung = (str) => {
            const list = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
            return [...str].map(c => { 
                const code = c.charCodeAt(0) - 44032; 
                return (code > -1 && code < 11172) ? list[Math.floor(code/588)] : c; 
            }).join('');
        };

        const StringingApp = ({ sport }) => {
            const [records, setRecords] = useState([]);
            const [customStrings, setCustomStrings] = useState({});
            const [showForm, setShowForm] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                name: '', racket: '', stringType: '', stringPrice: '', labor: '12000', quantity: 1, memo: ''
            });

            useEffect(() => {
                const load = async () => {
                    const allRecs = await getAllData("records");
                    setRecords(allRecs.filter(r => r.sport === sport).sort((a,b) => b.id - a.id));
                    const settings = await getAllData("settings");
                    const savedStrings = settings.find(s => s.key === `strings_${sport}`);
                    if (savedStrings) setCustomStrings(savedStrings.value);
                };
                load();
            }, [sport]);

            const handleSave = async (e) => {
                e.preventDefault();
                const total = (Number(formData.stringPrice || 0) + Number(formData.labor || 0)) * formData.quantity;
                const newRecord = { ...formData, id: Date.now(), sport, total };
                await saveData("records", newRecord);
                setRecords([newRecord, ...records]);
                setShowForm(false);
                setFormData({ ...formData, name: '', racket: '', memo: '' });
            };

            const filteredRecords = records.filter(r => {
                const target = r.name.toLowerCase();
                const query = searchTerm.toLowerCase();
                return target.includes(query) || getChosung(target).includes(query);
            });

            return (
                <div className="space-y-4 safe-area">
                    {/* 상단 검색 및 등록 버튼 */}
                    <div className="flex gap-2">
                        <div className="relative flex-1">
                            <input 
                                type="text" 
                                placeholder="고객명 또는 초성 검색..." 
                                className="w-full p-3 pl-10 border rounded-xl bg-white shadow-sm"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                            <i data-lucide="search" className="absolute left-3 top-3.5 text-gray-400 w-5 h-5"></i>
                        </div>
                        <button 
                            onClick={() => setShowForm(true)}
                            className="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-1 shadow-lg"
                        >
                            <i data-lucide="plus" className="w-5 h-5"></i> 등록
                        </button>
                    </div>

                    {/* 작업 기록 리스트 (기존 스타일) */}
                    <div className="grid gap-3">
                        {filteredRecords.length === 0 && (
                            <div className="text-center py-10 text-gray-400">기록이 없습니다.</div>
                        )}
                        {filteredRecords.map(r => (
                            <div key={r.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 relative">
                                <div className="flex justify-between items-start mb-2">
                                    <div>
                                        <span className="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">{r.date}</span>
                                        <h3 className="text-lg font-bold text-gray-800 mt-1">{r.name}</h3>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-blue-600 font-bold">{r.total?.toLocaleString()}원</p>
                                        <p className="text-[10px] text-gray-400">{r.quantity}자루</p>
                                    </div>
                                </div>
                                <div className="text-sm text-gray-600 space-y-1 border-t pt-2">
                                    <p><span className="text-gray-400">라켓:</span> {r.racket}</p>
                                    <p><span className="text-gray-400">스트링:</span> {r.stringType}</p>
                                    {r.memo && <p className="text-gray-400 text-xs italic mt-1">" {r.memo} "</p>}
                                </div>
                                <button 
                                    onClick={async () => { if(confirm('삭제하시겠습니까?')) { await deleteData("records", r.id); setRecords(records.filter(x => x.id !== r.id)); }}}
                                    className="absolute bottom-4 right-4 text-red-300"
                                >
                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                </button>
                            </div>
                        ))}
                    </div>

                    {/* 등록 모달 (기존 입력 스타일 유지) */}
                    {showForm && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
                            <div className="bg-white w-full max-w-lg rounded-t-3xl sm:rounded-3xl p-6 overflow-y-auto max-h-[90vh]">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold text-gray-800">새 작업 등록</h2>
                                    <button onClick={() => setShowForm(false)} className="text-gray-400 p-2"><i data-lucide="x" className="w-6 h-6"></i></button>
                                </div>
                                
                                <form onSubmit={handleSave} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-xs text-gray-500 mb-1">날짜</label>
                                            <input type="date" required className="w-full p-3 border rounded-xl bg-gray-50" value={formData.date} onChange={e=>setFormData({...formData, date:e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="block text-xs text-gray-500 mb-1">고객명</label>
                                            <input type="text" required placeholder="이름" className="w-full p-3 border rounded-xl bg-gray-50" value={formData.name} onChange={e=>setFormData({...formData, name:e.target.value})} />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs text-gray-500 mb-1">라켓 정보</label>
                                        <input type="text" required placeholder="라켓 모델명" className="w-full p-3 border rounded-xl bg-gray-50" value={formData.racket} onChange={e=>setFormData({...formData, racket:e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-xs text-gray-500 mb-1">줄 값</label>
                                            <input type="number" placeholder="0" className="w-full p-3 border rounded-xl bg-gray-50" value={formData.stringPrice} onChange={e=>setFormData({...formData, stringPrice:e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="block text-xs text-gray-500 mb-1">공임비</label>
                                            <input type="number" placeholder="12000" className="w-full p-3 border rounded-xl bg-gray-50" value={formData.labor} onChange={e=>setFormData({...formData, labor:e.target.value})} />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs text-gray-500 mb-1">메모</label>
                                        <textarea placeholder="특이사항 (텐션 등)" className="w-full p-3 border rounded-xl bg-gray-50 h-20" value={formData.memo} onChange={e=>setFormData({...formData, memo:e.target.value})} />
                                    </div>

                                    <div className="pt-4 border-t flex gap-3">
                                        <div className="flex items-center gap-3 bg-gray-100 px-4 rounded-xl">
                                            <button type="button" onClick={() => setFormData({...formData, quantity: Math.max(1, formData.quantity-1)})} className="text-xl font-bold px-2">-</button>
                                            <span className="font-bold">{formData.quantity}자루</span>
                                            <button type="button" onClick={() => setFormData({...formData, quantity: formData.quantity+1})} className="text-xl font-bold px-2">+</button>
                                        </div>
                                        <button type="submit" className="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">
                                            저장하기 ({( (Number(formData.stringPrice || 0) + Number(formData.labor || 0)) * formData.quantity).toLocaleString()}원)
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [sport, setSport] = useState('tennis');
            
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [sport]);

            return (
                <div className="min-h-screen">
                    {/* 상단 탭 헤더 (기존 디자인 스타일) */}
                    <div className={`${sport === 'tennis' ? 'bg-green-600' : 'bg-blue-600'} p-5 text-white shadow-lg`}>
                        <div className="flex justify-between items-center mb-6">
                            <h1 className="text-xl font-black italic tracking-tighter">NIJI STRING <span className="text-[10px] not-italic font-normal opacity-70">v2.0</span></h1>
                            <div className="flex gap-2">
                                <i data-lucide="bell" className="w-5 h-5 opacity-70"></i>
                                <i data-lucide="settings" className="w-5 h-5 opacity-70"></i>
                            </div>
                        </div>
                        <div className="flex bg-black/20 rounded-2xl p-1.5 backdrop-blur-sm">
                            <button 
                                onClick={() => setSport('tennis')} 
                                className={`flex-1 py-2.5 rounded-xl font-bold transition-all ${sport === 'tennis' ? 'bg-white text-green-600 shadow-md' : 'text-white/60'}`}
                            >
                                테니스
                            </button>
                            <button 
                                onClick={() => setSport('badminton')} 
                                className={`flex-1 py-2.5 rounded-xl font-bold transition-all ${sport === 'badminton' ? 'bg-white text-blue-600 shadow-md' : 'text-white/60'}`}
                            >
                                배드민턴
                            </button>
                        </div>
                    </div>
                    
                    <div className="p-4 max-w-md mx-auto mt-2">
                        <StringingApp key={sport} sport={sport} />
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
