const getChosung = (str) => {
    const list = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
    return [...str].map(c => { const code = c.charCodeAt(0) - 44032; return (code > -1 && code < 11172) ? list[Math.floor(code/588)] : c; }).join('');
};
const matchChosung = (str, search) => {
    if (!search) return true;
    return str.toLowerCase().includes(search.toLowerCase()) || getChosung(str).includes(search);
};

// ── KST 오늘 날짜 ──────────────────────────────────
const getTodayKST = () => {
    const d = new Date();
    const kst = new Date(d.getTime() + 9*60*60*1000);
    return kst.toISOString().split('T')[0];
};

const LoginScreen = () => {
    const [email, setEmail] = useState('');
    const [password, setPassword] = useState('');
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');
    const [mode, setMode] = useState('login');
    const [resetSent, setResetSent] = useState(false);

    const handleSubmit = async () => {
        if (!email.trim() || (!password && mode !== 'reset')) { setError('이메일과 비밀번호를 입력하세요.'); return; }
        setLoading(true); setError('');
        try {
            if (mode === 'login') {
                await auth.signInWithEmailAndPassword(email.trim(), password);
            } else if (mode === 'register') {
                if (password.length < 6) { setError('비밀번호는 6자리 이상이어야 합니다.'); setLoading(false); return; }
                await auth.createUserWithEmailAndPassword(email.trim(), password);
            } else {
                await auth.sendPasswordResetEmail(email.trim());
                setResetSent(true);
            }
        } catch(e) {
            const msg = {
                'auth/user-not-found': '등록되지 않은 이메일입니다.',
                'auth/wrong-password': '비밀번호가 틀렸습니다.',
                'auth/email-already-in-use': '이미 사용 중인 이메일입니다.',
                'auth/invalid-email': '이메일 형식이 올바르지 않습니다.',
                'auth/too-many-requests': '요청이 너무 많습니다. 잠시 후 다시 시도하세요.',
                'auth/invalid-credential': '이메일 또는 비밀번호가 올바르지 않습니다.',
            }[e.code] || '오류: ' + e.message;
            setError(msg);
        }
        setLoading(false);
    };

    if (resetSent) return (
        <div className="min-h-screen bg-gradient-to-br from-green-50 to-green-100 flex items-center justify-center p-4">
            <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm text-center">
                <div className="text-5xl mb-4">📧</div>
                <h2 className="text-lg font-bold text-gray-800 mb-2">이메일을 확인하세요</h2>
                <p className="text-sm text-gray-500 mb-6">{email}로 비밀번호 재설정 링크를 보냈습니다.</p>
                <button onClick={()=>{setMode('login');setResetSent(false);}} className="w-full py-3 bg-green-500 text-white rounded-xl font-medium">로그인으로 돌아가기</button>
            </div>
        </div>
    );

    return (
        <div className="min-h-screen bg-gradient-to-br from-green-50 to-green-100 flex items-center justify-center p-4">
            <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
                <div className="text-center mb-6">
                    <div className="text-5xl mb-2">🏆</div>
                    <h1 className="text-xl font-bold text-gray-800">니지스트링</h1>
                    <p className="text-sm text-gray-400 mt-1">스트링 작업 관리 시스템</p>
                </div>
                <div className="flex bg-gray-100 rounded-xl p-1 mb-5">
                    <button onClick={()=>{setMode('login');setError('');}} className={`flex-1 py-2 rounded-lg text-sm font-medium transition-all ${mode==='login'?'bg-white text-green-600 shadow':'text-gray-500'}`}>로그인</button>
                    <button onClick={()=>{setMode('register');setError('');}} className={`flex-1 py-2 rounded-lg text-sm font-medium transition-all ${mode==='register'?'bg-white text-green-600 shadow':'text-gray-500'}`}>회원가입</button>
                </div>
                <div className="space-y-3">
                    <div>
                        <label className="block text-xs font-medium text-gray-600 mb-1">이메일</label>
                        <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
                            onKeyDown={e=>e.key==='Enter'&&handleSubmit()}
                            placeholder="이메일 입력"
                            className="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-400"/>
                    </div>
                    {mode !== 'reset' && (
                        <div>
                            <label className="block text-xs font-medium text-gray-600 mb-1">비밀번호</label>
                            <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
                                onKeyDown={e=>e.key==='Enter'&&handleSubmit()}
                                placeholder={mode==='register'?'6자리 이상':'비밀번호 입력'}
                                className="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-400"/>
                        </div>
                    )}
                    {error && <div className="bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-sm text-red-600">{error}</div>}
                    <button onClick={handleSubmit} disabled={loading}
                        className="w-full py-3 bg-green-500 text-white rounded-xl font-bold text-base disabled:opacity-50 mt-2">
                        {loading ? '처리 중...' : mode==='login'?'로그인':mode==='register'?'회원가입':'재설정 메일 발송'}
                    </button>
                    {mode === 'login' && (
                        <button onClick={()=>{setMode('reset');setError('');}} className="w-full py-2 text-sm text-gray-400 hover:text-gray-600">비밀번호를 잊으셨나요?</button>
                    )}
                    {mode === 'reset' && (
                        <button onClick={()=>{setMode('login');setError('');}} className="w-full py-2 text-sm text-gray-400">← 로그인으로 돌아가기</button>
                    )}
                </div>
            </div>
        </div>
    );
};

const StringingApp = ({ sport, uid }) => {
    const config = SPORTS_CONFIG[sport];
    const color = config.color;
    const DEFAULT_EXTRA_ITEMS = ['스텐실 작업','범퍼 교체','오버그립','그립테이프','진동방지구','기타'];

    // ── State ──────────────────────────────────
    const [records, setRecords] = useState([]);
    const [customStrings, setCustomStrings] = useState({});
    const [coupons, setCoupons] = useState([]);
    const [savedExtraItems, setSavedExtraItems] = useState(DEFAULT_EXTRA_ITEMS.map(n=>({name:n,price:''})));
    const [dbLoading, setDbLoading] = useState(true);

    const [showForm, setShowForm] = useState(false);
    const [editingId, setEditingId] = useState(null);   // fbKey 문자열로 통일
    const [searchTerm, setSearchTerm] = useState('');
    const [viewMode, setViewMode] = useState('customers');
    const [showAddModal, setShowAddModal] = useState(false);
    const [modalStringName, setModalStringName] = useState('');
    const [modalStringPrice, setModalStringPrice] = useState('');
    const [editingStringKey, setEditingStringKey] = useState(null);
    const [editStringName, setEditStringName] = useState('');
    const [editStringPrice, setEditStringPrice] = useState('');
    const [couponForm, setCouponForm] = useState({code:'',discount:'',expiry:'',note:''});
    const [showCouponForm, setShowCouponForm] = useState(false);
    const [appliedCoupon, setAppliedCoupon] = useState(null);
    const [couponInput, setCouponInput] = useState('');
    const [couponMsg, setCouponMsg] = useState('');
    const [confirmModal, setConfirmModal] = useState(null); // {msg, onOk, okLabel, cancelLabel}
    const [showBulkForm, setShowBulkForm] = useState(false);
    const [bulkForm, setBulkForm] = useState({prefix:'NIJI',count:'5',discount:'',expiry:'',note:''});
    const [bulkResult, setBulkResult] = useState(null);
    const [showStringDropdown, setShowStringDropdown] = useState(false);
    const [showHybridDropdown, setShowHybridDropdown] = useState(false);
    const [showNameDropdown, setShowNameDropdown] = useState(false);
    const [showRacketDropdown, setShowRacketDropdown] = useState(false);
    const [extraWorks, setExtraWorks] = useState([]);
    const [showExtraSection, setShowExtraSection] = useState(false);
    const [showExtraDropdown, setShowExtraDropdown] = useState(null);
    const [showAddExtraItemModal, setShowAddExtraItemModal] = useState(false);
    const [newExtraItemName, setNewExtraItemName] = useState('');
    const [newExtraItemPrice, setNewExtraItemPrice] = useState('');
    const [saveStatus, setSaveStatus] = useState('');
    const [expandedCustomer, setExpandedCustomer] = useState(null); // 드롭다운 열린 고객명

    const stringPrices = {...config.defaultStrings, ...customStrings};

    const makeEmptyForm = () => ({
        date: getTodayKST(), name:'', racket:'',
        pattern: config.patterns[0],
        stringType:'', stringPrice:'',
        labor: config.defaultLabors[0],
        quantity:1, tension:'',
        isHybrid:false, hybridString2:'', hybridPrice2:'',
    });
    const [formData, setFormData] = useState(makeEmptyForm());

    // ── 저장 상태 토스트 ────────────────────────
    const showSaveStatus = (status) => {
        setSaveStatus(status);
        if (status === 'saved') setTimeout(() => setSaveStatus(''), 2000);
    };

    // ── 알림 모달 헬퍼 ──────────────────────────
    const showAlert = (msg) => setConfirmModal({ msg, onOk:()=>setConfirmModal(null), okLabel:'확인', cancelLabel:null });

    // ── Firebase 실시간 구독 ────────────────────
    useEffect(() => {
        setDbLoading(true);
        const recordsRef = db.ref(dbPath(uid, sport, 'records'));
        const stringsRef = db.ref(dbPath(uid, sport, 'strings'));
        const couponsRef = db.ref(dbPath(uid, sport, 'coupons'));
        const extrasRef  = db.ref(dbPath(uid, sport, 'extraItems'));

        let loaded = {records:false, strings:false, coupons:false, extras:false};
        const checkAllLoaded = () => {
            if (Object.values(loaded).every(Boolean)) setDbLoading(false);
        };

        // records 리스너
        const recListener = snap => {
            const val = snap.val();
            if (val) {
                const arr = Object.entries(val).map(([fbKey, v]) => ({...v, fbKey}));
                arr.sort((a,b) => { if(b.date!==a.date) return b.date.localeCompare(a.date); return (b.createdAt||0)-(a.createdAt||0); });
                setRecords(arr);
            } else if (!loaded.records) {
                if (sport === 'tennis' && config.initialData.length > 0) {
                    const batch = {};
                    config.initialData.forEach((r, i) => {
                        const key = recordsRef.push().key;
                        const total = (parseFloat(r.stringPrice)+parseFloat(r.labor))*parseInt(r.quantity);
                        batch[key] = {...r, fbKey:key, id:key, total, createdAt:new Date(r.date).getTime()+i, extraWorks:[], couponCode:'', couponDiscount:0};
                    });
                    recordsRef.update(batch);
                } else {
                    setRecords([]);
                }
            }
            loaded.records = true;
            checkAllLoaded();
        };
        recordsRef.on('value', recListener);

        // strings 리스너
        const strListener = snap => {
            setCustomStrings(snap.val() || {});
            loaded.strings = true;
            checkAllLoaded();
        };
        stringsRef.on('value', strListener);

        // coupons 리스너
        const couListener = snap => {
            const val = snap.val();
            if (val) {
                const arr = Object.entries(val).map(([fbKey, v]) => ({...v, fbKey}));
                setCoupons(arr);
            } else { setCoupons([]); }
            loaded.coupons = true;
            checkAllLoaded();
        };
        couponsRef.on('value', couListener);

        // extraItems 리스너
        const extListener = snap => {
            const val = snap.val();
            if (val) {
                // Firebase는 배열을 객체로 저장할 수 있으므로 변환
                const items = Array.isArray(val) ? val : Object.values(val);
                setSavedExtraItems(items.filter(Boolean));
            } else {
                setSavedExtraItems(DEFAULT_EXTRA_ITEMS.map(n=>({name:n,price:''})));
            }
            loaded.extras = true;
            checkAllLoaded();
        };
        extrasRef.on('value', extListener);

        // 폼 초기화
        setFormData(makeEmptyForm());
        setAppliedCoupon(null);
        setCouponInput('');
        setCouponMsg('');
        setExtraWorks([]);
        setShowExtraSection(false);
        setShowForm(false);
        setEditingId(null);
        setViewMode('customers');
        setSearchTerm('');

        // 구독 해제 (리스너 함수를 정확히 넘겨야 중복 방지)
        return () => {
            recordsRef.off('value', recListener);
            stringsRef.off('value', strListener);
            couponsRef.off('value', couListener);
            extrasRef.off('value', extListener);
        };
    }, [uid, sport]);

    // ── Firebase 저장/삭제 함수 ─────────────────
    const saveRecord = async (rec) => {
        showSaveStatus('saving');
        try {
            const ref = db.ref(dbPath(uid, sport, 'records'));
            if (rec.fbKey) {
                await ref.child(rec.fbKey).set(rec);
            } else {
                const newKey = ref.push().key;
                await ref.child(newKey).set({...rec, fbKey:newKey, id:newKey});
            }
            showSaveStatus('saved');
        } catch(e) { showSaveStatus('error'); showAlert('저장 실패: ' + e.message); }
    };

    const deleteRecord = async (fbKey) => {
        showSaveStatus('saving');
        try {
            await db.ref(dbPath(uid, sport, 'records')).child(fbKey).remove();
            showSaveStatus('saved');
        } catch(e) { showSaveStatus('error'); showAlert('삭제 실패: ' + e.message); }
    };

    const saveCustomStrings = async (newStrings) => {
        setCustomStrings(newStrings);
        try { await db.ref(dbPath(uid, sport, 'strings')).set(newStrings); } catch(e) { showAlert('스트링 저장 실패: ' + e.message); }
    };

    const saveCoupon = async (coupon) => {
        try {
            const ref = db.ref(dbPath(uid, sport, 'coupons'));
            if (coupon.fbKey) {
                await ref.child(coupon.fbKey).set(coupon);
            } else {
                const newKey = ref.push().key;
                await ref.child(newKey).set({...coupon, fbKey:newKey});
            }
        } catch(e) { showAlert('쿠폰 저장 실패: ' + e.message); }
    };

    const saveCouponsMany = async (arr) => {
        try {
            const ref = db.ref(dbPath(uid, sport, 'coupons'));
            const batch = {};
            arr.forEach(c => {
                const k = c.fbKey || ref.push().key;
                batch[k] = {...c, fbKey:k};
            });
            await ref.set(batch);
        } catch(e) { showAlert('쿠폰 저장 실패: ' + e.message); }
    };

    const deleteCoupon = async (fbKey) => {
        try { await db.ref(dbPath(uid, sport, 'coupons')).child(fbKey).remove(); } catch(e) { showAlert('쿠폰 삭제 실패: ' + e.message); }
    };

    const saveExtraItems = async (items) => {
        setSavedExtraItems(items);
        try {
            // 배열을 객체로 변환해서 저장 (Firebase 배열 처리 안정화)
            const obj = {};
            items.forEach((item, i) => { obj[i] = item; });
            await db.ref(dbPath(uid, sport, 'extraItems')).set(obj);
        } catch(e) {}
    };

    // ── 계산 ───────────────────────────────────
    const calcExtraTotal = (works) => (works||[]).reduce((s,w)=>s+(parseFloat(w.price)||0), 0);

    const calcTotal = (fd, works) => {
        let sp = parseFloat(fd.stringPrice) || 0;
        const labor = parseFloat(fd.labor) || 0;
        const qty = parseInt(fd.quantity) || 1;
        const hybrid = fd.isHybrid ? 2000 : 0;
        if (fd.isHybrid && fd.hybridPrice2) sp = (sp+(parseFloat(fd.hybridPrice2)||0))/2;
        return (sp+labor+hybrid)*qty + calcExtraTotal(works);
    };

    const calcTotalWithCoupon = () => {
        const base = calcTotal(formData, extraWorks);
        if (!appliedCoupon) return base;
        return Math.max(0, base - parseFloat(appliedCoupon.discount));
    };

    // ── CRUD ───────────────────────────────────
    const handleSubmit = async (e) => {
        e.preventDefault();
        const finalTotal = calcTotalWithCoupon();
        const existingRec = editingId ? records.find(r=>r.fbKey===editingId) : null;
        const rec = {
            ...formData,
            fbKey: existingRec?.fbKey || null,
            id: existingRec?.id || null,
            extraWorks: extraWorks.filter(w=>w.name.trim()),
            total: finalTotal,
            couponCode: appliedCoupon ? appliedCoupon.code : (existingRec?.couponCode || ''),
            couponDiscount: appliedCoupon ? appliedCoupon.discount : (existingRec?.couponDiscount || 0),
            createdAt: existingRec?.createdAt || Date.now(),
        };
        await saveRecord(rec);

        // 쿠폰 사용 처리 (신규 등록일 때만)
        if (appliedCoupon && !editingId) {
            const updated = {...appliedCoupon, used:true, usedDate:getTodayKST(), usedFor:formData.name};
            await saveCoupon(updated);
        }
        setAppliedCoupon(null);
        setCouponInput('');
        setCouponMsg('');
        resetForm();
    };

    const resetForm = () => {
        const name = formData.name;
        setFormData({...makeEmptyForm(), name});
        setShowForm(false);
        setEditingId(null);
        setExtraWorks([]);
        setShowExtraSection(false);
    };

    // ── 수정: fbKey 기준으로 통일 ───────────────
    const handleEdit = (rec) => {
        setFormData({
            date: rec.date, name: rec.name, racket: rec.racket,
            pattern: rec.pattern, stringType: rec.stringType,
            stringPrice: rec.stringPrice, labor: rec.labor,
            quantity: rec.quantity, tension: rec.tension||'',
            isHybrid: rec.isHybrid||false,
            hybridString2: rec.hybridString2||'',
            hybridPrice2: rec.hybridPrice2||'',
        });
        const ew = rec.extraWorks || [];
        setExtraWorks(ew);
        setShowExtraSection(ew.length>0);
        setEditingId(rec.fbKey);   // ← fbKey(문자열)로 통일
        setAppliedCoupon(null);
        setCouponInput('');
        setCouponMsg('');
        setShowForm(true);
        setViewMode('customers');
        window.scrollTo({top:0, behavior:'smooth'});
    };

    const handleDelete = (rec) => {
        setConfirmModal({
            msg: `'${rec.name}' 기록을 정말 삭제할까요?`,
            onOk: async () => { await deleteRecord(rec.fbKey); setConfirmModal(null); },
            okLabel: '삭제',
            cancelLabel: '취소',
        });
    };

    // ── 드롭다운 핸들러 ─────────────────────────
    const handleStringSelect = (name, isSecond=false) => {
        const price = (stringPrices[name]||0).toString();
        if (isSecond) { setFormData(prev=>({...prev, hybridString2:name, hybridPrice2:price})); setShowHybridDropdown(false); }
        else { setFormData(prev=>({...prev, stringType:name, stringPrice:price})); setShowStringDropdown(false); }
    };

    const handleNameSelect = (name) => {
        const last = [...records].filter(r=>r.name===name).sort((a,b)=>b.date.localeCompare(a.date))[0];
        if (last) {
            setFormData({
                date: getTodayKST(), name,
                racket: last.racket, pattern: last.pattern,
                stringType: last.stringType, stringPrice: last.stringPrice,
                labor: last.labor, quantity: last.quantity,
                tension: '',
                isHybrid: last.isHybrid||false,
                hybridString2: last.hybridString2||'',
                hybridPrice2: last.hybridPrice2||'',
            });
        } else {
            setFormData(prev=>({...prev, name}));
        }
        setShowNameDropdown(false);
    };

    const handleNameChange = (name) => {
        setFormData(prev=>({...prev, name}));
        const matches = getUniqueNames(name);
        if (name.length>0 && matches.length===1 && /^[ㄱ-ㅎ]+$/.test(name)) { handleNameSelect(matches[0]); return; }
        setShowNameDropdown(name.length>0 && matches.length>0);
    };

    const handleStringChange = (val, isSecond=false) => {
        if (isSecond) { setFormData(prev=>({...prev, hybridString2:val})); setShowHybridDropdown(val.length>0); }
        else { setFormData(prev=>({...prev, stringType:val})); setShowStringDropdown(val.length>0); }
    };

    const handleAddModal = async () => {
        if (modalStringName.trim() && modalStringPrice !== '') {
            await saveCustomStrings({...customStrings, [modalStringName.trim()]: parseFloat(modalStringPrice)||0});
            setModalStringName(''); setModalStringPrice(''); setShowAddModal(false);
        }
    };

    const handleSaveEditString = async () => {
        if (!editStringName.trim() || editStringPrice==='') return;
        const updated = {...customStrings};
        if (editStringName.trim() !== editingStringKey) delete updated[editingStringKey];
        updated[editStringName.trim()] = parseFloat(editStringPrice)||0;
        await saveCustomStrings(updated);
        setEditingStringKey(null);
    };

    const handleDeleteString = (key) => {
        setConfirmModal({
            msg: `'${key}' 스트링을 삭제할까요?`,
            onOk: async () => { const u={...customStrings}; delete u[key]; await saveCustomStrings(u); setConfirmModal(null); },
            okLabel: '삭제', cancelLabel: '취소',
        });
    };

    // ── 쿠폰 적용 ──────────────────────────────
    const handleApplyCoupon = () => {
        const code = couponInput.trim().toUpperCase();
        const today = getTodayKST();
        const found = coupons.find(c=>c.code.toUpperCase()===code);
        if (!found) { setCouponMsg('❌ 쿠폰번호를 찾을 수 없습니다.'); setAppliedCoupon(null); return; }
        if (found.used) { setCouponMsg('❌ 이미 사용된 쿠폰입니다.'); setAppliedCoupon(null); return; }
        if (found.expiry && found.expiry<today) { setCouponMsg('❌ 만료된 쿠폰입니다.'); setAppliedCoupon(null); return; }
        setAppliedCoupon(found);
        setCouponMsg('✅ 쿠폰 적용! '+parseInt(found.discount).toLocaleString()+'원 할인');
    };

    // ── 일괄 쿠폰 발행 ─────────────────────────
    const handleBulkIssue = async () => {
        if (!bulkForm.discount || !bulkForm.count) return;
        const count = Math.min(parseInt(bulkForm.count)||1, 50);
        const today = getTodayKST();
        const dateTag = today.replace(/-/g,'').slice(4);
        const prefix = (bulkForm.prefix||'NIJI').toUpperCase().trim();
        const existing = new Set(coupons.map(c=>c.code));
        const newCoupons = [];
        let seq = 1;
        while (newCoupons.length < count) {
            const code = `${prefix}-${dateTag}-${String(seq).padStart(3,'0')}`;
            if (!existing.has(code)) {
                newCoupons.push({ code, discount:parseFloat(bulkForm.discount), expiry:bulkForm.expiry, note:bulkForm.note, used:false, usedDate:'', usedFor:'', createdAt:today });
            }
            seq++;
            if (seq>9999) break;
        }
        await saveCouponsMany([...coupons, ...newCoupons]);
        setBulkResult(newCoupons.map(c=>c.code));
    };

    // ── 엑셀 내보내기 ──────────────────────────
    const handleExportExcel = () => {
        if (records.length === 0) { showAlert('내보낼 데이터가 없습니다.'); return; }
        const rows = [...records]
            .sort((a,b) => a.date.localeCompare(b.date))
            .map(r => ({
                '날짜': r.date,
                '고객명': r.name,
                '라켓명': r.racket,
                '패턴': r.pattern,
                '스트링': r.stringType,
                '스트링가격': parseInt(r.stringPrice)||0,
                '하이브리드': r.isHybrid ? r.hybridString2 : '',
                '하이브리드가격': r.isHybrid ? (parseInt(r.hybridPrice2)||0) : '',
                '공임비': parseInt(r.labor)||0,
                '수량': parseInt(r.quantity)||1,
                '텐션': r.tension||'',
                '추가작업': (r.extraWorks||[]).map(w=>w.name).join(', '),
                '추가작업금액': (r.extraWorks||[]).reduce((s,w)=>s+(parseFloat(w.price)||0),0),
                '쿠폰코드': r.couponCode||'',
                '쿠폰할인': parseInt(r.couponDiscount)||0,
                '최종금액': parseInt(r.total)||0,
            }));
        const ws = XLSX.utils.json_to_sheet(rows);
        const colWidths = Object.keys(rows[0]||{}).map(k => ({ wch: Math.max(k.length*2, 12) }));
        ws['!cols'] = colWidths;
        const wb = XLSX.utils.book_new();
        const sheetName = sport === 'tennis' ? '테니스작업' : '배드민턴작업';
        XLSX.utils.book_append_sheet(wb, ws, sheetName);
        const today = getTodayKST().replace(/-/g,'');
        XLSX.writeFile(wb, `니지스트링_${sheetName}_${today}.xlsx`);
    };

    // ── 엑셀 날짜 변환 헬퍼 (숫자 일련번호 → YYYY-MM-DD) ──
    const parseExcelDate = (val) => {
        if (!val) return getTodayKST();
        if (typeof val === 'number') {
            const excelEpoch = new Date(1899, 11, 30);
            const d = new Date(excelEpoch.getTime() + val * 86400000);
            const y = d.getFullYear();
            const m = String(d.getMonth()+1).padStart(2,'0');
            const dd = String(d.getDate()).padStart(2,'0');
            return `${y}-${m}-${dd}`;
        }
        const s = String(val).trim();
        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
        if (/^\d{4}\/\d{2}\/\d{2}$/.test(s)) return s.replace(/\//g, '-');
        return s;
    };

    // ── 엑셀 불러오기 (모바일 호환 모달 사용) ──
    const handleImportExcel = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, { type: 'array', cellDates: false });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws, { raw: true });
                if (rows.length === 0) { showAlert('엑셀 파일에 데이터가 없습니다.'); return; }
                const firstRow = rows[0];
                if (!firstRow['날짜'] || !firstRow['고객명']) {
                    showAlert('엑셀 파일 형식이 맞지 않습니다.\n먼저 내보내기로 양식을 받아서 사용해 주세요.');
                    return;
                }
                // 중복 체크
                const existingKeys = new Set(
                    records.map(r => `${r.date}|${r.name}|${r.racket}|${r.stringType}|${r.labor}`)
                );
                const uniqueRows = rows.filter(row => {
                    const dateStr = parseExcelDate(row['날짜']);
                    const key = `${dateStr}|${String(row['고객명']||'').trim()}|${String(row['라켓명']||'').trim()}|${String(row['스트링']||'').trim()}|${String(parseFloat(row['공임비'])||0)}`;
                    return !existingKeys.has(key);
                });
                const dupCount = rows.length - uniqueRows.length;
                setConfirmModal({
                    msg: dupCount > 0
                        ? `총 ${rows.length}건 중 중복 ${dupCount}건 제외\n${uniqueRows.length}건을 불러올까요?\n(기존 데이터에 추가됩니다)`
                        : `${rows.length}건을 불러올까요?\n(기존 데이터에 추가됩니다)`,
                    okLabel: '불러오기',
                    cancelLabel: '취소',
                    onOk: async () => {
                        setConfirmModal(null);
                        if (uniqueRows.length === 0) { showAlert('중복 데이터만 있어서 추가할 내용이 없습니다.'); return; }
                        try {
                            const ref = db.ref(dbPath(uid, sport, 'records'));
                            const batch = {};
                            uniqueRows.forEach((row, i) => {
                                const key = ref.push().key;
                                const sp = parseFloat(row['스트링가격'])||0;
                                const labor = parseFloat(row['공임비'])||0;
                                const qty = parseInt(row['수량'])||1;
                                const extra = parseFloat(row['추가작업금액'])||0;
                                const couponDiscount = parseFloat(row['쿠폰할인'])||0;
                                const total = row['최종금액'] ? (parseFloat(row['최종금액'])||0) : (sp+labor)*qty+extra-couponDiscount;
                                const extraNames = row['추가작업'] ? String(row['추가작업']).split(',').map(n=>n.trim()).filter(Boolean) : [];
                                const extraPrice = extraNames.length > 0 ? Math.round(extra/extraNames.length) : 0;
                                batch[key] = {
                                    fbKey:key, id:key,
                                    createdAt: Date.now()+i,
                                    date: parseExcelDate(row['날짜']),
                                    name: String(row['고객명']||'').trim(),
                                    racket: String(row['라켓명']||'').trim(),
                                    pattern: String(row['패턴']||config.patterns[0]).trim(),
                                    stringType: String(row['스트링']||'').trim(),
                                    stringPrice: String(sp),
                                    isHybrid: !!(row['하이브리드']),
                                    hybridString2: String(row['하이브리드']||'').trim(),
                                    hybridPrice2: String(row['하이브리드가격']||'').trim(),
                                    labor: String(labor),
                                    quantity: qty,
                                    tension: String(row['텐션']||'').trim(),
                                    extraWorks: extraNames.map(n=>({name:n, price:String(extraPrice)})),
                                    couponCode: String(row['쿠폰코드']||'').trim(),
                                    couponDiscount, total,
                                };
                            });
                            await ref.update(batch);
                            showAlert(`✅ ${uniqueRows.length}건을 성공적으로 불러왔습니다!${dupCount>0?' (중복 '+dupCount+'건 제외)':''}`);
                        } catch(err) {
                            showAlert('저장 오류: ' + err.message);
                        }
                    },
                });
            } catch(err) {
                showAlert('파일 읽기 오류: ' + err.message);
            }
        };
        reader.readAsArrayBuffer(file);
        e.target.value = '';
    };

    // ── 필터 헬퍼 ──────────────────────────────
    const getUniqueNames = (term) => {
        const t = (term !== undefined && term !== null) ? term : formData.name;
        return [...new Set(records.map(r=>r.name))].filter(n => matchChosung(n, t));
    };
    const getUniqueRackets = () => [...new Set(records.map(r=>r.racket))].filter(r=>r && matchChosung(r, formData.racket));
    const getFilteredStrings = (term) => Object.keys(stringPrices).filter(s=>matchChosung(s,term||'')).sort();

    // ── 통계 ───────────────────────────────────
    const getCustomerStats = () => {
        const map = {};
        records.forEach(r => {
            if (!map[r.name]) map[r.name] = {name:r.name, visits:[], totalAmount:0};
            map[r.name].visits.push(r);
            map[r.name].totalAmount += (r.total||0);
        });
        return Object.values(map).map(c => ({
            ...c, visitCount: c.visits.length,
            lastVisit: [...c.visits].sort((a,b)=>b.date.localeCompare(a.date))[0],
            yearlyVisits: c.visits.filter(v=>new Date(v.date)>=new Date(new Date().setFullYear(new Date().getFullYear()-1))).length,
        })).sort((a,b)=>b.lastVisit.date.localeCompare(a.lastVisit.date));
    };

    const getMonthlyStats = () => {
        const map = {};
        records.forEach(r => {
            const m = r.date.substring(0,7);
            if (!map[m]) map[m]={month:m, total:0, stringTotal:0, laborTotal:0, extraTotal:0, count:0};
            map[m].total += (r.total||0); map[m].count++;
            const qty = parseInt(r.quantity)||1;
            let sp = parseFloat(r.stringPrice)||0;
            if (r.isHybrid && r.hybridPrice2) sp=(sp+(parseFloat(r.hybridPrice2)||0))/2;
            const hybrid = r.isHybrid?2000:0;
            map[m].stringTotal += (sp+hybrid)*qty;
            map[m].laborTotal += (parseFloat(r.labor)||0)*qty;
            map[m].extraTotal += (r.extraWorks||[]).reduce((s,w)=>s+(parseFloat(w.price)||0),0);
        });
        return Object.values(map).sort((a,b)=>b.month.localeCompare(a.month));
    };

    const getYearlyStats = () => {
        const map = {};
        records.forEach(r => {
            const y = r.date.substring(0,4);
            if (!map[y]) map[y]={year:y, total:0, stringTotal:0, laborTotal:0, extraTotal:0, count:0};
            map[y].total += (r.total||0); map[y].count++;
            const qty = parseInt(r.quantity)||1;
            let sp = parseFloat(r.stringPrice)||0;
            if (r.isHybrid && r.hybridPrice2) sp=(sp+(parseFloat(r.hybridPrice2)||0))/2;
            const hybrid = r.isHybrid?2000:0;
            map[y].stringTotal += (sp+hybrid)*qty;
            map[y].laborTotal += (parseFloat(r.labor)||0)*qty;
            map[y].extraTotal += (r.extraWorks||[]).reduce((s,w)=>s+(parseFloat(w.price)||0),0);
        });
        return Object.values(map).sort((a,b)=>b.year.localeCompare(a.year));
    };

    const sortedRecords = [...records].sort((a,b)=>{ if(b.date!==a.date) return b.date.localeCompare(a.date); return (b.createdAt||0)-(a.createdAt||0); });
    const displayRecords = searchTerm ? sortedRecords.filter(r=>matchChosung(r.name, searchTerm)) : sortedRecords;

    // ── 색상 클래스 ─────────────────────────────
    const activeBtnClass = color==='green'?'bg-green-500 text-white':'bg-blue-500 text-white';
    const ringClass = color==='green'?'focus:ring-green-500':'focus:ring-blue-500';
    const hoverBgClass = color==='green'?'hover:bg-green-50':'hover:bg-blue-50';
    const statColor = color==='green'?'text-green-600':'text-blue-600';

    // ── 스트링 드롭다운 컴포넌트 ────────────────
    const StringDropdown = ({ strings, onSelect }) => (
        <div className="absolute z-20 w-full mt-1 bg-white border border-gray-300 rounded-lg shadow-xl max-h-64 overflow-y-auto" onMouseDown={e=>e.preventDefault()}>
            {strings.map(s=>(
                <button key={s} type="button" onClick={()=>onSelect(s)}
                    className={`w-full text-left px-4 py-3 ${hoverBgClass} flex justify-between items-center border-b border-gray-100 last:border-0`}>
                    <span className="text-sm">{s}</span>
                    <span className="text-xs text-gray-500">{(stringPrices[s]||0).toLocaleString()}원</span>
                </button>
            ))}
            <div className="p-2 border-t border-gray-200">
                <button type="button" onMouseDown={e=>e.preventDefault()}
                    onClick={()=>{ setShowStringDropdown(false); setShowHybridDropdown(false); setShowAddModal(true); }}
                    className="w-full px-3 py-2 bg-yellow-500 text-white rounded-lg text-sm font-medium">➕ 새 스트링 추가</button>
            </div>
        </div>
    );

    // ── 로딩 화면 ───────────────────────────────
    if (dbLoading) return (
        <div className="flex flex-col items-center justify-center py-20">
            <div className="spinner mb-4"></div>
            <p className="text-gray-400 text-sm">데이터 불러오는 중...</p>
        </div>
    );

    return (
        <div>
            {/* ── 확인/알림 모달 (window.confirm 대체) ── */}
            {confirmModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{backgroundColor:'rgba(0,0,0,0.5)'}}>
                    <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-xs">
                        <p className="text-base font-medium text-gray-800 mb-5 text-center whitespace-pre-line">{confirmModal.msg}</p>
                        <div className="flex gap-2">
                            {confirmModal.cancelLabel !== null && confirmModal.cancelLabel !== undefined && (
                                <button onClick={()=>setConfirmModal(null)} className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-medium">{confirmModal.cancelLabel||'취소'}</button>
                            )}
                            <button onClick={confirmModal.onOk}
                                className={`flex-1 py-3 rounded-xl font-medium text-white ${(confirmModal.cancelLabel===null||confirmModal.cancelLabel===undefined)?'bg-green-500':(confirmModal.okLabel==='삭제'?'bg-red-500':'bg-green-500')}`}>
                                {confirmModal.okLabel||'확인'}
                            </button>
                        </div>
                    </div>
                </div>
            )}

            {/* ── 추가작업 항목 모달 ── */}
            {showAddExtraItemModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{backgroundColor:'rgba(0,0,0,0.5)'}}>
                    <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm">
                        <h3 className="text-lg font-bold text-gray-800 mb-4">🛠️ 새 항목 저장</h3>
                        <div className="space-y-3">
                            <input type="text" value={newExtraItemName} onChange={e=>setNewExtraItemName(e.target.value)} placeholder="예) 스텐실 작업" className="w-full px-3 py-3 border border-gray-300 rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-indigo-400" autoFocus/>
                            <input type="number" value={newExtraItemPrice} onChange={e=>setNewExtraItemPrice(e.target.value)} placeholder="기본 가격 (선택)" className="w-full px-3 py-3 border border-gray-300 rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
                            <div className="flex gap-2">
                                <button onClick={()=>{setShowAddExtraItemModal(false);setNewExtraItemName('');setNewExtraItemPrice('');}} className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-medium">취소</button>
                                <button onClick={async ()=>{
                                    if(!newExtraItemName.trim()) return;
                                    await saveExtraItems([...savedExtraItems, {name:newExtraItemName.trim(), price:newExtraItemPrice}]);
                                    setShowAddExtraItemModal(false); setNewExtraItemName(''); setNewExtraItemPrice('');
                                }} className="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium">저장</button>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {/* ── 스트링 추가 모달 ── */}
            {showAddModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{backgroundColor:'rgba(0,0,0,0.5)'}}>
                    <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm">
                        <h3 className="text-lg font-bold text-gray-800 mb-4">➕ 새 스트링 추가</h3>
                        <div className="space-y-3">
                            <input type="text" value={modalStringName} onChange={e=>setModalStringName(e.target.value)} placeholder="예) 요넥스 폴리투어스핀" className="w-full px-3 py-3 border border-gray-300 rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-yellow-400" autoFocus/>
                            <input type="number" value={modalStringPrice} onChange={e=>setModalStringPrice(e.target.value)} placeholder="예) 13000" className="w-full px-3 py-3 border border-gray-300 rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-yellow-400"/>
                            <div className="flex gap-2">
                                <button onClick={()=>{setShowAddModal(false);setModalStringName('');setModalStringPrice('');}} className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-medium">취소</button>
                                <button onClick={handleAddModal} className="flex-1 py-3 bg-yellow-500 text-white rounded-xl font-medium">추가</button>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {/* ── 저장 상태 토스트 ── */}
            {saveStatus && (
                <div className={`fixed top-4 right-4 z-50 px-4 py-2 rounded-xl shadow-lg text-sm font-medium transition-all ${saveStatus==='saving'?'bg-yellow-100 text-yellow-700':saveStatus==='saved'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>
                    {saveStatus==='saving'?'⏳ 저장 중...':saveStatus==='saved'?'✅ 저장 완료':'❌ 저장 실패'}
                </div>
            )}

            {/* ── 상단 탭 바 ── */}
            <div className="grid grid-cols-5 gap-1 mb-3">
                {[['customers','👥 고객',activeBtnClass],['coupons','🎫 쿠폰','bg-pink-500 text-white'],['strings','🎯 스트링','bg-yellow-500 text-white'],['monthly','📅 월별','bg-orange-500 text-white'],['yearly','📈 연도별','bg-purple-500 text-white']].map(([mode, label, cls])=>(
                    <button key={mode} onClick={()=>setViewMode(mode)} className={`py-2 rounded-lg font-medium text-xs transition-colors ${viewMode===mode?cls:'bg-gray-200 text-gray-700'}`}>{label}</button>
                ))}
            </div>

            {/* ── 검색 + 등록 ── */}
            {viewMode==='customers' && (
                <div className="space-y-2">
                    <div className="flex gap-2">
                        <input type="text" placeholder="고객 검색..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}
                            className={`flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 ${ringClass} focus:outline-none`}/>
                        <button onClick={()=>{if(showForm&&editingId){resetForm();}else{setShowForm(!showForm);}if(!showForm){setEditingId(null);setFormData(makeEmptyForm());setExtraWorks([]);setShowExtraSection(false);setAppliedCoupon(null);setCouponInput('');setCouponMsg('');} }}
                            className={`px-4 py-2 rounded-lg font-medium text-sm whitespace-nowrap ${showForm?'bg-gray-400 text-white':(color==='green'?'bg-green-500 text-white':'bg-blue-500 text-white')}`}>
                            {showForm?'✕ 취소':'➕ 등록'}
                        </button>
                    </div>
                    <div className="flex gap-2">
                        <button onClick={handleExportExcel} className="flex-1 py-2 bg-emerald-600 text-white rounded-lg font-medium text-xs flex items-center justify-center gap-1">📤 엑셀 내보내기</button>
                        <label className="flex-1 py-2 bg-teal-600 text-white rounded-lg font-medium text-xs flex items-center justify-center gap-1 cursor-pointer">
                            📥 엑셀 불러오기
                            <input type="file" accept=".xlsx,.xls" onChange={handleImportExcel} className="hidden"/>
                        </label>
                    </div>
                </div>
            )}

            {/* ── 등록/수정 폼 ── */}
            {showForm && viewMode==='customers' && (
                <div className="bg-white rounded-xl shadow-lg p-4 mt-3">
                    <h2 className="text-base font-bold text-gray-800 mb-3">{editingId?'✏️ 작업 수정':'➕ 새 작업 등록'}</h2>
                    <form onSubmit={handleSubmit} className="space-y-3">
                        {/* 날짜 / 고객명 */}
                        <div className="grid grid-cols-2 gap-3">
                            <div>
                                <label className="block text-xs font-medium text-gray-600 mb-1">날짜</label>
                                <input type="date" value={formData.date} onChange={e=>setFormData(prev=>({...prev,date:e.target.value}))}
                                    className={`w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 ${ringClass} focus:outline-none`} required/>
                            </div>
                            <div className="relative">
                                <label className="block text-xs font-medium text-gray-600 mb-1">고객명</label>
                                <input type="text" value={formData.name} onChange={e=>handleNameChange(e.target.value)}
                                    onFocus={()=>{ if(formData.name.length>0) setShowNameDropdown(getUniqueNames(formData.name).length>0); }}
                                    onBlur={()=>setTimeout(()=>setShowNameDropdown(false),200)}
                                    placeholder="홍길동"
                                    className={`w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 ${ringClass} focus:outline-none`} required/>
                                {showNameDropdown && getUniqueNames(formData.name).length>0 && (
                                    <div className="absolute z-20 w-full mt-1 bg-white border border-gray-300 rounded-lg shadow-xl max-h-40 overflow-y-auto">
                                        {getUniqueNames(formData.name).map(n=>(
                                            <button key={n} type="button" onClick={()=>handleNameSelect(n)}
                                                className={`w-full text-left px-4 py-3 text-sm ${hoverBgClass} border-b border-gray-100 last:border-0`}>{n}</button>
                                        ))}
                                    </div>
                                )}
                                {formData.name && records.filter(r=>r.name===formData.name).length>0 && !editingId && (
                                    <p className="text-xs text-green-600 mt-1">✓ 이전 기록 자동 입력</p>
                                )}
                            </div>
                        </div>

                        {/* 라켓명 / 패턴 */}
                        <div className="grid grid-cols-2 gap-3">
                            <div className="relative">
                                <label className="block text-xs font-medium text-gray-600 mb-1">{config.racketLabel}</label>
                                <input type="text" value={formData.racket}
                                    onChange={e=>{setFormData(prev=>({...prev,racket:e.target.value}));setShowRacketDropdown(e.target.value.length>0);}}
                                    onFocus={()=>setShowRacketDropdown(formData.racket.length>0)}
                                    onBlur={()=>setTimeout(()=>setShowRacketDropdown(false),200)}
                                    placeholder={config.racketPlaceholder}
                                    className={`w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 ${ringClass} focus:outline-none`} required/>
                                {showRacketDropdown && getUniqueRackets().length>0 && (
                                    <div className="absolute z-20 w-full mt-1 bg-white border border-gray-300 rounded-lg shadow-xl max-h-40 overflow-y-auto">
                                        {getUniqueRackets().map(r=>(
                                            <button key={r} type="button" onClick={()=>{setFormData(prev=>({...prev,racket:r}));setShowRacketDropdown(false);}}
                                                className={`w-full text-left px-4 py-3 text-sm ${hoverBgClass} border-b border-gray-100 last:border-0`}>{r}</button>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-gray-600 mb-1">패턴</label>
                                <select value={formData.pattern} onChange={e=>setFormData(prev=>({...prev,pattern:e.target.value}))}
                                    className={`w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 ${ringClass} focus:outline-none`}>
                                    {config.patterns.map(p=><option key={p}>{p}</option>)}
                                </select>
                            </div>
                        </div>

                        {/* 스트링 / 가격 */}
                        <div className="grid grid-cols-2 gap-3">
                            <div className="relative">
                                <label className="block text-xs font-medium text-gray-600 mb-1">스트링 종류</label>
                                <input type="text" value={formData.stringType}
                                    onChange={e=>handleStringChange(e.target.value)}
                                    onFocus={()=>setShowStringDropdown(true)}
                                    onBlur={()=>setTimeout(()=>setShowStringDropdown(false),300)}
                                    placeholder="스트링 선택"
                                    className={`w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 ${ringClass} focus:outline-none`} required/>
                                {showStringDropdown && <StringDropdown strings={getFilteredStrings(formData.stringType)} onSelect={handleStringSelect}/>}
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-gray-600 mb-1">스트링 가격 (원)</label>
                                <input type="number" value={formData.stringPrice} onChange={e=>setFormData(prev=>({...prev,stringPrice:e.target.value}))}
                                    placeholder="0" className={`w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 ${ringClass} focus:outline-none`} required/>
                            </div>
                        </div>

                        {/* 하이브리드 */}
                        <div className="border-2 border-dashed border-gray-200 rounded-lg p-3">
                            <label className="flex items-center gap-2 mb-2 cursor-pointer">
                                <input type="checkbox" checked={formData.isHybrid}
                                    onChange={e=>setFormData(prev=>({...prev,isHybrid:e.target.checked,hybridString2:e.target.checked?prev.hybridString2:'',hybridPrice2:e.target.checked?prev.hybridPrice2:''}))}
                                    className="w-4 h-4 rounded"/>
                                <span className="text-sm font-medium text-gray-700">하이브리드 (+2,000원)</span>
                            </label>
                            {formData.isHybrid && (
                                <div className="grid grid-cols-2 gap-3 mt-2">
                                    <div className="relative">
                                        <label className="block text-xs font-medium text-gray-600 mb-1">두번째 스트링</label>
                                        <input type="text" value={formData.hybridString2}
                                            onChange={e=>handleStringChange(e.target.value,true)}
                                            onFocus={()=>setShowHybridDropdown(true)}
                                            onBlur={()=>setTimeout(()=>setShowHybridDropdown(false),300)}
                                            placeholder="스트링 선택"
                                            className={`w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 ${ringClass} focus:outline-none`} required={formData.isHybrid}/>
                                        {showHybridDropdown && <StringDropdown strings={getFilteredStrings(formData.hybridString2)} onSelect={s=>handleStringSelect(s,true)}/>}
                                    </div>
                                    <div>
                                        <label className="block text-xs font-medium text-gray-600 mb-1">두번째 가격 (원)</label>
                                        <input type="number" value={formData.hybridPrice2} onChange={e=>setFormData(prev=>({...prev,hybridPrice2:e.target.value}))}
                                            placeholder="0" className={`w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 ${ringClass} focus:outline-none`} required={formData.isHybrid}/>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 텐션 */}
                        <div className="border-2 border-dashed border-yellow-200 rounded-lg p-3">
                            <div className="flex items-center justify-between mb-2">
                                <p className="text-xs font-medium text-yellow-700">⚡ 텐션 (lbs)</p>
                                <p className="text-xs text-gray-400">예) 50 또는 50/48</p>
                            </div>
                            <input type="text" value={formData.tension} onChange={e=>setFormData(prev=>({...prev,tension:e.target.value}))}
                                placeholder="예) 50 또는 50/48"
                                className={`w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 ${ringClass} focus:outline-none`}/>
                        </div>

                        {/* 공임 / 수량 */}
                        <div className="grid grid-cols-2 gap-3">
                            <div>
                                <label className="block text-xs font-medium text-gray-600 mb-1">공임 (원)</label>
                                <select value={formData.labor} onChange={e=>setFormData(prev=>({...prev,labor:e.target.value}))}
                                    className={`w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 ${ringClass} focus:outline-none`}>
                                    {config.defaultLabors.map(l=><option key={l} value={l}>{parseInt(l).toLocaleString()}원</option>)}
                                    <option value="0">0원</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-gray-600 mb-1">수량</label>
                                <input type="number" value={formData.quantity} min="1" onChange={e=>setFormData(prev=>({...prev,quantity:e.target.value}))}
                                    className={`w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 ${ringClass} focus:outline-none`} required/>
                            </div>
                        </div>

                        {/* 쿠폰 (신규 등록 시에만) */}
                        {!editingId && (
                            <div className="border border-pink-200 bg-pink-50 rounded-lg p-3 space-y-2">
                                <p className="text-xs font-medium text-pink-700">🎫 쿠폰 적용</p>
                                {coupons.filter(c=>!c.used).length===0 ? (
                                    <p className="text-xs text-gray-400">등록된 미사용 쿠폰이 없습니다.</p>
                                ) : (
                                    <div className="flex gap-2">
                                        <input type="text" value={couponInput}
                                            onChange={e=>{setCouponInput(e.target.value.toUpperCase());setCouponMsg('');setAppliedCoupon(null);}}
                                            placeholder="쿠폰번호 입력"
                                            className="flex-1 px-3 py-2 border border-pink-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-pink-400 uppercase"/>
                                        <button type="button" onClick={handleApplyCoupon} className="px-4 py-2 bg-pink-500 text-white rounded-lg text-sm font-medium">적용</button>
                                    </div>
                                )}
                                {couponMsg && <p className="text-xs font-medium text-pink-700">{couponMsg}</p>}
                            </div>
                        )}

                        {/* 추가 작업/용품 */}
                        <div className="border-2 border-dashed border-indigo-200 rounded-lg p-3">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-sm font-medium text-indigo-700">🛠️ 추가 작업/용품</span>
                                {!showExtraSection ? (
                                    <button type="button" onClick={()=>{setShowExtraSection(true);if(extraWorks.length===0)setExtraWorks([{name:'',price:''}]);}} className="text-xs px-3 py-1 bg-indigo-500 text-white rounded-full">+ 추가</button>
                                ) : (
                                    <button type="button" onClick={()=>{setShowExtraSection(false);setExtraWorks([]);}} className="text-xs px-3 py-1 bg-gray-300 text-gray-600 rounded-full">✕ 취소</button>
                                )}
                            </div>
                            {showExtraSection && (
                                <div className="space-y-2">
                                    {extraWorks.map((w,idx)=>(
                                        <div key={idx} className="flex gap-2 items-start">
                                            <div className="relative flex-1">
                                                <input type="text" value={w.name}
                                                    onChange={e=>{const u=[...extraWorks];u[idx]={...u[idx],name:e.target.value};setExtraWorks(u);setShowExtraDropdown(idx);}}
                                                    onFocus={()=>setShowExtraDropdown(idx)}
                                                    onBlur={()=>setTimeout(()=>setShowExtraDropdown(null),300)}
                                                    placeholder="항목 선택 또는 입력"
                                                    className="w-full px-2 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-400 focus:outline-none"/>
                                                {showExtraDropdown===idx && (
                                                    <div className="absolute z-30 w-full mt-1 bg-white border border-gray-300 rounded-lg shadow-xl max-h-48 overflow-y-auto" onMouseDown={e=>e.preventDefault()}>
                                                        {savedExtraItems.filter(it=>it && it.name && it.name.toLowerCase().includes(w.name.toLowerCase())).map((it,i)=>(
                                                            <button key={i} type="button" onClick={()=>{const u=[...extraWorks];u[idx]={name:it.name,price:it.price||''};setExtraWorks(u);setShowExtraDropdown(null);}}
                                                                className="w-full text-left px-3 py-2.5 hover:bg-indigo-50 flex justify-between items-center border-b border-gray-100 last:border-0 text-sm">
                                                                <span>{it.name}</span>
                                                                {it.price?<span className="text-xs text-gray-400">{parseInt(it.price).toLocaleString()}원</span>:null}
                                                            </button>
                                                        ))}
                                                        <div className="p-2 border-t border-gray-200">
                                                            <button type="button" onMouseDown={e=>e.preventDefault()} onClick={()=>{setShowExtraDropdown(null);setShowAddExtraItemModal(true);}}
                                                                className="w-full px-3 py-2 bg-indigo-100 text-indigo-700 rounded-lg text-sm font-medium">➕ 새 항목 저장</button>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                            <input type="number" value={w.price} onChange={e=>{const u=[...extraWorks];u[idx]={...u[idx],price:e.target.value};setExtraWorks(u);}} placeholder="가격" className="w-24 px-2 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-400 focus:outline-none"/>
                                            <button type="button" onClick={()=>setExtraWorks(extraWorks.filter((_,i)=>i!==idx))} className="px-2 py-2 text-red-400 hover:bg-red-50 rounded-lg text-sm">✕</button>
                                        </div>
                                    ))}
                                    <button type="button" onClick={()=>setExtraWorks([...extraWorks,{name:'',price:''}])} className="text-xs px-3 py-1.5 border border-indigo-300 text-indigo-600 rounded-full hover:bg-indigo-50">+ 항목 추가</button>
                                </div>
                            )}
                        </div>

                        {/* 합계 */}
                        <div className={`border border-gray-200 rounded-lg p-3 ${color==='green'?'bg-green-50':'bg-blue-50'}`}>
                            <div className="flex justify-between items-center">
                                <span className="text-sm font-medium text-gray-600">예상 금액</span>
                                <span className={`text-xl font-bold ${statColor}`}>{calcTotalWithCoupon().toLocaleString()}원</span>
                            </div>
                            {appliedCoupon && (
                                <p className="text-xs text-pink-600 mt-1 text-right">🎫 쿠폰 -{parseInt(appliedCoupon.discount).toLocaleString()}원 적용</p>
                            )}
                        </div>

                        <div className="flex gap-2">
                            <button type="button" onClick={resetForm} className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-medium">취소</button>
                            <button type="submit" className={`flex-1 py-3 rounded-xl font-medium text-white ${color==='green'?'bg-green-500':'bg-blue-500'}`}>{editingId?'수정 완료':'등록 완료'}</button>
                        </div>
                    </form>
                </div>
            )}

            {/* ── 고객 목록 (드롭다운) ── */}
            {viewMode==='customers' && (()=>{
                // 고객별로 묶기
                const statsMap = {};
                records.forEach(r => {
                    if (!statsMap[r.name]) statsMap[r.name] = {name:r.name, visits:[], totalAmount:0};
                    statsMap[r.name].visits.push(r);
                    statsMap[r.name].totalAmount += (r.total||0);
                });
                let customerList = Object.values(statsMap).map(c => ({
                    ...c,
                    visitCount: c.visits.length,
                    lastVisit: [...c.visits].sort((a,b)=>b.date.localeCompare(a.date))[0],
                    sortedVisits: [...c.visits].sort((a,b)=>{ if(b.date!==a.date) return b.date.localeCompare(a.date); return (b.createdAt||0)-(a.createdAt||0); }),
                })).sort((a,b)=>b.lastVisit.date.localeCompare(a.lastVisit.date));

                // 검색어 필터
                if (searchTerm) customerList = customerList.filter(c=>matchChosung(c.name, searchTerm));

                return (
                    <div className="space-y-2 mt-3">
                        {customerList.length===0 && (
                            <div className="bg-white rounded-xl shadow-lg p-10 text-center">

                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex items-center px-4 py-3">
                                        <div className="flex-1">
                                            <p className="text-sm font-medium text-gray-800">{name}</p>
                                            <p className="text-xs text-gray-500">{price.toLocaleString()}원</p>
                                        </div>
                                        <div className="flex gap-1">
                                            <button onClick={()=>{setEditingStringKey(name);setEditStringName(name);setEditStringPrice(price.toString());}} className="p-2 text-blue-500 hover:bg-blue-50 rounded-lg">✏️</button>
                                            <button onClick={()=>handleDeleteString(name)} className="p-2 text-red-400 hover:bg-red-50 rounded-lg">🗑️</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            )}
        </div>
    );
};

// ══════════════════════════════════════════════
// 🏆 최상위 앱
// ══════════════════════════════════════════════
const App = () => {
    const [user, setUser] = useState(null);
    const [authLoading, setAuthLoading] = useState(true);
    const [sport, setSport] = useState('tennis');

    useEffect(() => {
        const unsub = auth.onAuthStateChanged(u => {
            setUser(u);
            setAuthLoading(false);
        });
        return () => unsub();
    }, []);

    const handleLogout = async () => {
        await auth.signOut();
    };

    if (authLoading) return (
        <div className="min-h-screen bg-gray-100 flex items-center justify-center">
            <div className="text-center">
                <div className="spinner mx-auto mb-4"></div>
                <p className="text-gray-400 text-sm">로딩 중...</p>
            </div>
        </div>
    );

    if (!user) return <LoginScreen />;

    return (
        <div className="min-h-screen bg-gray-100">
            <div className={`${sport==='tennis'?'bg-green-600':'bg-blue-600'} text-white px-4 pt-4 pb-0 shadow-md`}>
                <div className="flex justify-between items-center mb-2">
                    <h1 className="text-lg font-bold">🏆 니지스트링 관리</h1>
                    <div className="flex items-center gap-2">
                        <span className="text-xs text-white opacity-70 hidden sm:block">{user.email}</span>
                        <button onClick={handleLogout} className="text-xs bg-white bg-opacity-20 hover:bg-opacity-30 px-3 py-1.5 rounded-full transition-colors">로그아웃</button>
                    </div>
                </div>
                <div className="flex">
                    <button onClick={()=>setSport('tennis')} className={`flex-1 py-2 text-sm font-bold rounded-t-xl transition-colors ${sport==='tennis'?'bg-white text-green-600':'bg-green-700 text-green-100'}`}>🎾 테니스</button>
                    <button onClick={()=>setSport('badminton')} className={`flex-1 py-2 text-sm font-bold rounded-t-xl transition-colors ${sport==='badminton'?'bg-white text-blue-600':'bg-blue-700 text-blue-100'}`}>🏸 배드민턴</button>
                </div>
            </div>
            <div className="p-3 max-w-2xl mx-auto">
                <StringingApp key={`${user.uid}-${sport}`} sport={sport} uid={user.uid} />
            </div>
        </div>
    );
};

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
