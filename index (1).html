<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Niji String - 작업 관리</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background-color: #f3f4f6; }
        input, select, textarea { font-size: 16px !important; }
        .safe-area { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ── 데이터베이스 관리 (IndexedDB) ──
        const dbName = "NijiStringDB";
        const initDB = () => {
            return new Promise((resolve) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains("records")) db.createObjectStore("records", { keyPath: "id" });
                    if (!db.objectStoreNames.contains("settings")) db.createObjectStore("settings", { keyPath: "key" });
                };
                request.onsuccess = (e) => resolve(e.target.result);
            });
        };

        const saveData = async (storeName, data) => {
            const db = await initDB();
            const tx = db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).put(data);
        };

        const getAllData = async (storeName) => {
            const db = await initDB();
            return new Promise((resolve) => {
                const tx = db.transaction(storeName, "readonly");
                const request = tx.objectStore(storeName).getAll();
                request.onsuccess = () => resolve(request.result);
            });
        };

        const deleteData = async (storeName, id) => {
            const db = await initDB();
            const tx = db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).delete(id);
        };

        // ── 초성 검색 유틸 ──
        const getChosung = (str) => {
            const list = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
            return [...str].map(c => { 
                const code = c.charCodeAt(0) - 44032; 
                return (code > -1 && code < 11172) ? list[Math.floor(code/588)] : c; 
            }).join('');
        };

        const matchChosung = (str, search) => {
            if (!search) return true;
            const target = str.toLowerCase();
            const query = search.toLowerCase();
            return target.includes(query) || getChosung(target).includes(query);
        };

        const StringingApp = ({ sport }) => {
            const [records, setRecords] = useState([]);
            const [customStrings, setCustomStrings] = useState({});
            const [viewMode, setViewMode] = useState('customers');
            const [searchTerm, setSearchTerm] = useState('');
            const [showForm, setShowForm] = useState(false);
            const [formData, setFormData] = useState({ date: new Date().toISOString().split('T')[0], name: '', racket: '', stringType: '', stringPrice: '', labor: '12000', quantity: 1 });

            // 데이터 불러오기
            useEffect(() => {
                const load = async () => {
                    const allRecs = await getAllData("records");
                    setRecords(allRecs.filter(r => r.sport === sport));
                    const settings = await getAllData("settings");
                    const savedStrings = settings.find(s => s.key === `strings_${sport}`);
                    if (savedStrings) setCustomStrings(savedStrings.value);
                };
                load();
            }, [sport]);

            const handleSave = async (e) => {
                e.preventDefault();
                const newRecord = { ...formData, id: Date.now(), sport, total: (Number(formData.stringPrice) + Number(formData.labor)) * formData.quantity };
                await saveData("records", newRecord);
                setRecords([newRecord, ...records]);
                setShowForm(false);
                setFormData({ ...formData, name: '', racket: '' }); // 입력 초기화
            };

            const exportCSV = () => {
                let csv = "\uFEFF날짜,고객명,라켓,스트링,금액\n";
                records.forEach(r => {
                    csv += `${r.date},${r.name},${r.racket},${r.stringType},${r.total}\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `niji_string_${sport}_backup.csv`;
                link.click();
            };

            return (
                <div className="safe-area">
                    {/* 상단 버튼 바 */}
                    <div className="flex gap-2 mb-4 overflow-x-auto pb-2">
                        <button onClick={() => setViewMode('customers')} className={`px-4 py-2 rounded-full whitespace-nowrap ${viewMode === 'customers' ? 'bg-black text-white' : 'bg-white border'}`}>작업기록</button>
                        <button onClick={exportCSV} className="px-4 py-2 rounded-full bg-green-500 text-white whitespace-nowrap">📥 백업하기</button>
                    </div>

                    {/* 검색 및 등록 */}
                    <div className="flex gap-2 mb-4">
                        <input 
                            type="text" 
                            placeholder="이름이나 초성 검색 (예: ㄱㅎ)" 
                            className="flex-1 p-3 border rounded-xl"
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                        />
                        <button onClick={() => setShowForm(true)} className="px-4 py-3 bg-blue-600 text-white rounded-xl font-bold">➕ 등록</button>
                    </div>

                    {/* 등록 폼 모달 */}
                    {showForm && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-end">
                            <div className="bg-white w-full rounded-t-3xl p-6 space-y-4">
                                <h2 className="text-xl font-bold">새 작업 등록</h2>
                                <input type="date" className="w-full p-3 border rounded-lg" value={formData.date} onChange={e=>setFormData({...formData, date:e.target.value})} />
                                <input type="text" placeholder="고객명" className="w-full p-3 border rounded-lg" value={formData.name} onChange={e=>setFormData({...formData, name:e.target.value})} />
                                <input type="text" placeholder="라켓명" className="w-full p-3 border rounded-lg" value={formData.racket} onChange={e=>setFormData({...formData, racket:e.target.value})} />
                                <div className="flex gap-2">
                                    <button onClick={handleSave} className="flex-1 py-4 bg-blue-600 text-white rounded-xl font-bold">저장하기</button>
                                    <button onClick={() => setShowForm(false)} className="flex-1 py-4 bg-gray-200 rounded-xl">취소</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 리스트 출력 */}
                    <div className="space-y-3">
                        {records.filter(r => matchChosung(r.name, searchTerm)).map(r => (
                            <div key={r.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <p className="text-xs text-gray-400">{r.date}</p>
                                        <h3 className="text-lg font-bold">{r.name}</h3>
                                        <p className="text-sm text-gray-600">{r.racket}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-blue-600 font-bold">{r.total?.toLocaleString()}원</p>
                                        <button onClick={async () => { if(confirm('삭제할까요?')) { await deleteData("records", r.id); setRecords(records.filter(x => x.id !== r.id)); }}} className="text-xs text-red-400 mt-2">삭제</button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [sport, setSport] = useState('tennis');
            return (
                <div className="min-h-screen">
                    <div className={`${sport === 'tennis' ? 'bg-green-600' : 'bg-blue-600'} p-6 text-white`}>
                        <h1 className="text-2xl font-bold mb-4 italic">Niji String</h1>
                        <div className="flex bg-black/20 rounded-xl p-1">
                            <button onClick={() => setSport('tennis')} className={`flex-1 py-2 rounded-lg font-bold ${sport === 'tennis' ? 'bg-white text-green-600' : ''}`}>테니스</button>
                            <button onClick={() => setSport('badminton')} className={`flex-1 py-2 rounded-lg font-bold ${sport === 'badminton' ? 'bg-white text-blue-600' : ''}`}>배드민턴</button>
                        </div>
                    </div>
                    <div className="p-4"><StringingApp sport={sport} /></div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
