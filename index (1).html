      const getChosung = (str) => {
        const chosungList = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
        let result = '';
        for (let i = 0; i < str.length; i++) {
          const code = str.charCodeAt(i) - 44032;
          if (code > -1 && code < 11172) result += chosungList[Math.floor(code / 588)];
          else result += str.charAt(i);
        }
        return result;
      };

      const matchChosung = (str, search) => {
        if (!search) return true;
        const chosung = getChosung(str.toLowerCase());
        const searchLower = search.toLowerCase();
        return str.toLowerCase().includes(searchLower) || chosung.includes(searchLower);

        const uploadInitialData = async () => {
          const db = window._firebaseDB;
          const ref = window._firebaseRef;
          const push = window._firebasePush;
          const set = window._firebaseSet;
          for (let i = 0; i < initialData.length; i++) {
            const r = initialData[i];
            const total = calcTotalFromRecord(r);
            const newRef = push(ref(db, 'records'));
            await set(newRef, { ...r, total, createdAt: Date.now() + i });
          }
        };

        const calcTotalFromRecord = (r) => {
          let sp = parseFloat(r.stringPrice) || 0;
          const lab = parseFloat(r.labor) || 0;
          const qty = parseInt(r.quantity) || 1;
          const hybridCost = r.isHybrid ? 2000 : 0;
          if (r.isHybrid && r.hybridPrice2) {
            const p2 = parseFloat(r.hybridPrice2) || 0;
            sp = (sp + p2) / 2;
          }
          return (sp + lab + hybridCost) * qty;
        };

        const calculateTotal = () => {
          let sp = parseFloat(formData.stringPrice) || 0;
          const lab = parseFloat(formData.labor) || 0;
          const qty = parseInt(formData.quantity) || 1;
          const hybridCost = formData.isHybrid ? 2000 : 0;
          if (formData.isHybrid && formData.hybridPrice2) {
            const p2 = parseFloat(formData.hybridPrice2) || 0;
            sp = (sp + p2) / 2;
          }
          return (sp + lab + hybridCost) * qty;
        };

        const handleLogin = async (email, password) => {
          await window._firebaseSignIn(window._firebaseAuth, email, password);
        };

        const handleLogout = async () => {
          await window._firebaseSignOut(window._firebaseAuth);
          setRecords([]);
        };

        const handleSubmit = async (e) => {
          e.preventDefault();
          const db = window._firebaseDB;
          const ref = window._firebaseRef;
          const set = window._firebaseSet;
          const push = window._firebasePush;

          const record = { ...formData, total: calculateTotal(), updatedAt: Date.now() };

          try {
            if (editingId) {
              await set(ref(db, `records/${editingId}`), {
                ...record,
                createdAt: records.find(r => r.id === editingId)?.createdAt || Date.now()
              });
              showToast('수정되었습니다!');
            } else {
              const newRef = push(ref(db, 'records'));
              await set(newRef, { ...record, createdAt: Date.now() });
              showToast('등록되었습니다!');
            }
            resetForm();
          } catch (err) {
            showToast('저장 실패: ' + err.message, 'error');
          }
        };

        const handleDelete = (id) => {
          setConfirmModal({
            message: '이 작업 내역을 삭제하시겠습니까?',
            onConfirm: async () => {
              try {
                const db = window._firebaseDB;
                const ref = window._firebaseRef;
                const remove = window._firebaseRemove;
                await remove(ref(db, `records/${id}`));
                showToast('삭제되었습니다.');
              } catch (err) {
                showToast('삭제 실패: ' + err.message, 'error');
              }
              setConfirmModal(null);
            }
          });
        };

        const handleEdit = (record) => {
          setFormData({
            date: record.date, name: record.name, racket: record.racket,
            pattern: record.pattern, stringType: record.stringType,
            stringPrice: record.stringPrice, labor: record.labor,
            quantity: record.quantity, isHybrid: record.isHybrid || false,
            hybridString2: record.hybridString2 || '', hybridPrice2: record.hybridPrice2 || ''
          });
          setEditingId(record.id);
          setShowForm(true);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const resetForm = () => {
          setFormData({ ...defaultForm, name: formData.name });
          setShowForm(false);
          setEditingId(null);
        };

        const handleAddCustomString = async () => {
          if (!newStringName.trim() || !newStringPrice) return;
          const newStrings = { ...customStrings, [newStringName.trim()]: parseFloat(newStringPrice) };
          try {
            const db = window._firebaseDB;
            const ref = window._firebaseRef;
            const set = window._firebaseSet;
            await set(ref(db, 'customStrings'), newStrings);
            setNewStringName(''); setNewStringPrice(''); setShowAddString(false);
            showToast('스트링이 추가되었습니다!');
          } catch (err) {
            showToast('추가 실패', 'error');
          }
        };

        const handleStringSelect = (stringName, isSecond = false) => {
          const price = stringPrices[stringName]?.toString() || '';
          if (isSecond) {
            setFormData(f => ({ ...f, hybridString2: stringName, hybridPrice2: price }));
            setShowHybridDropdown(false);
          } else {
            setFormData(f => ({ ...f, stringType: stringName, stringPrice: price }));
            setShowStringDropdown(false);
          }
        };

        const getUniqueNames = () => [...new Set(records.map(r => r.name))].filter(n => matchChosung(n, formData.name));
        const getUniqueRackets = () => [...new Set(records.map(r => r.racket))].filter(r => matchChosung(r, formData.racket));
        const getFilteredStrings = (search) => Object.keys(stringPrices).filter(s => matchChosung(s, search)).sort();

        const handleNameSelect = (name) => {
          const recs = records.filter(r => r.name === name).sort((a, b) => new Date(b.date) - new Date(a.date));
          if (recs.length > 0) {
            const last = recs[0];
            setFormData(f => ({
              ...f, name, racket: last.racket, pattern: last.pattern,
              stringType: last.stringType, stringPrice: last.stringPrice,
              labor: last.labor, quantity: last.quantity,
              isHybrid: last.isHybrid || false,
              hybridString2: last.hybridString2 || '', hybridPrice2: last.hybridPrice2 || ''
            }));
          } else {
            setFormData(f => ({ ...f, name }));
          }
          setShowNameDropdown(false);
        };

        const getCustomerStats = () => {
          const map = {};
          records.forEach(r => {
            if (!map[r.name]) map[r.name] = { name: r.name, visits: [], totalAmount: 0 };
            map[r.name].visits.push(r);
            map[r.name].totalAmount += r.total;
          });
          return Object.values(map).map(c => ({
            ...c,
            visitCount: c.visits.length,
            lastVisit: c.visits.sort((a, b) => new Date(b.date) - new Date(a.date))[0],
            yearlyVisits: c.visits.filter(v => new Date(v.date) >= new Date(new Date().setFullYear(new Date().getFullYear() - 1))).length
          })).sort((a, b) => new Date(b.lastVisit.date) - new Date(a.lastVisit.date));
        };

        const getMonthlyStats = () => {
          const m = {};
          records.forEach(r => {
            const mo = r.date.substring(0, 7);
            if (!m[mo]) m[mo] = { month: mo, total: 0, count: 0 };
            m[mo].total += r.total; m[mo].count += 1;
          });
          return Object.values(m).sort((a, b) => b.month.localeCompare(a.month));
        };

        const getYearlyStats = () => {
          const y = {};
          records.forEach(r => {
            const yr = r.date.substring(0, 4);
            if (!y[yr]) y[yr] = { year: yr, total: 0, count: 0 };
            y[yr].total += r.total; y[yr].count += 1;
          });
          return Object.values(y).sort((a, b) => b.year.localeCompare(a.year));
        };

        const filteredCustomers = getCustomerStats().filter(c =>
          matchChosung(c.name, searchTerm)
        );

        // ── 로딩 화면 ──
        if (!firebaseReady || authLoading) {
          return (
            <div className="loading-screen">
              <div className="spinner"></div>
              <p style={{color:'#6b7280', fontSize:15}}>앱 준비 중...</p>
            </div>
          );
        }

        // ── Firebase 설정 안내 ──
        if (window._firebaseAuth?.app?.options?.apiKey === 'YOUR_API_KEY') {
          return (
            <div className="loading-screen" style={{padding: 24}}>
              <div style={{fontSize:48}}>⚙️</div>
              <h2 style={{color:'#1a1a1a', textAlign:'center'}}>Firebase 설정이 필요합니다</h2>
              <div style={{background:'white', borderRadius:16, padding:24, maxWidth:500, boxShadow:'0 4px 20px rgba(0,0,0,0.1)'}}>
                <p style={{color:'#374151', lineHeight:1.7, marginBottom:16}}>
                  <strong>1단계:</strong> <a href="https://console.firebase.google.com" target="_blank" style={{color:'#22c55e'}}>Firebase 콘솔</a>에서 프로젝트를 만드세요
                </p>
                <p style={{color:'#374151', lineHeight:1.7, marginBottom:16}}>
                  <strong>2단계:</strong> Authentication → 이메일/비밀번호 활성화
                </p>
                <p style={{color:'#374151', lineHeight:1.7, marginBottom:16}}>
                  <strong>3단계:</strong> Realtime Database 만들기 (테스트 모드)
                </p>
                <p style={{color:'#374151', lineHeight:1.7, marginBottom:16}}>
                  <strong>4단계:</strong> 프로젝트 설정 → firebaseConfig를 이 파일의 상단에 붙여넣기
                </p>
                <p style={{color:'#374151', lineHeight:1.7}}>
                  <strong>5단계:</strong> Authentication → 사용자 추가에서 본인 계정 만들기
                </p>
              </div>
            </div>
          );
        }

        // ── 로그인 화면 ──
        if (!user) {
          return <LoginScreen onLogin={handleLogin} />;
        }

        // ── 메인 앱 ──
        return (
          <div style={{minHeight:'100vh', background:'#f0f4f8', paddingBottom: 40}}>
            {/* 헤더 */}
            <div style={{background:'white', boxShadow:'0 2px 8px rgba(0,0,0,0.08)', padding:'16px 20px', marginBottom:20}}>
              <div style={{maxWidth:900, margin:'0 auto', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <h1 style={{fontSize:22, fontWeight:800, color:'#1a1a1a', margin:0}}>🎾 니지스트링</h1>
                <div style={{display:'flex', alignItems:'center', gap:12}}>
                  <span style={{fontSize:13, color:'#6b7280', display:'none'}} className="user-email">{user.email}</span>
                  <button onClick={handleLogout} style={{
                    background:'none', border:'1.5px solid #e5e7eb', borderRadius:8, padding:'6px 14px',
                    fontSize:13, color:'#6b7280', cursor:'pointer', fontWeight:500
                  }}>로그아웃</button>
                </div>
              </div>
            </div>

            <div style={{maxWidth:900, margin:'0 auto', padding:'0 16px'}}>
              {/* 탭 메뉴 */}
              <div className="card" style={{padding:'16px 20px', marginBottom:16}}>
                <div style={{display:'flex', gap:8, flexWrap:'wrap', marginBottom:16}}>
                  <button className={`tab-btn ${viewMode==='customers'?'tab-active-green':'tab-inactive'}`} onClick={()=>setViewMode('customers')}>👤 고객 관리</button>
                  <button className={`tab-btn ${viewMode==='monthly'?'tab-active-blue':'tab-inactive'}`} onClick={()=>setViewMode('monthly')}>📅 월별 매출</button>
                  <button className={`tab-btn ${viewMode==='yearly'?'tab-active-purple':'tab-inactive'}`} onClick={()=>setViewMode('yearly')}>📈 연도별 매출</button>
                </div>
                {viewMode === 'customers' && (
                  <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
                    <div style={{flex:1, minWidth:160, position:'relative'}}>
                      <input
                        type="text"
                        className="input-field"
                        placeholder="고객 이름 검색..."
                        value={searchTerm}
                        onChange={e => setSearchTerm(e.target.value)}
                        style={{paddingLeft:14}}
                      />
                    </div>
                    <button
                      className="btn-green"
                      onClick={() => { setShowForm(!showForm); if(showForm) resetForm(); }}
                    >
                      {showForm ? '✕ 취소' : '+ 새 작업 등록'}
                    </button>
                  </div>
                )}
              </div>

              {/* 등록/수정 폼 */}
              {showForm && viewMode === 'customers' && (
                <div className="card" style={{marginBottom:16}}>
                  <h2 style={{fontSize:18, fontWeight:700, color:'#1a1a1a', marginBottom:20}}>
                    {editingId ? '✏️ 작업 수정' : '📝 새 작업 등록'}
                  </h2>
                  <form onSubmit={handleSubmit}>
                    {/* 날짜 + 고객명 + 라켓 + 패턴 */}
                    <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))', gap:14, marginBottom:14}}>
                      <div>
                        <label style={{display:'block', fontSize:13, fontWeight:600, color:'#374151', marginBottom:6}}>날짜</label>
                        <input type="date" className="input-field" value={formData.date} onChange={e=>setFormData(f=>({...f,date:e.target.value}))} required />
                      </div>
                      <div style={{position:'relative'}}>
                        <label style={{display:'block', fontSize:13, fontWeight:600, color:'#374151', marginBottom:6}}>고객명</label>
                        <input
                          type="text" className="input-field"
                          value={formData.name}
                          onChange={e=>{ setFormData(f=>({...f,name:e.target.value})); setShowNameDropdown(e.target.value.length>0); }}
                          onFocus={()=>setShowNameDropdown(formData.name.length>0)}
                          onBlur={()=>setTimeout(()=>setShowNameDropdown(false),200)}
                          placeholder="홍길동 (초성: ㅎㄱㄷ)" required
                        />
                        {showNameDropdown && getUniqueNames().length>0 && (
                          <div className="dropdown-list">
                            {getUniqueNames().map(n=>(
                              <button key={n} type="button" className="dropdown-item" onClick={()=>handleNameSelect(n)}>{n}</button>
                            ))}
                          </div>
                        )}
                        {formData.name && records.filter(r=>r.name===formData.name).length>0 && !editingId && (
                          <p style={{fontSize:12, color:'#16a34a', marginTop:4}}>✓ 이전 작업 내역이 자동 입력되었습니다</p>
                        )}
                      </div>
                      <div style={{position:'relative'}}>
                        <label style={{display:'block', fontSize:13, fontWeight:600, color:'#374151', marginBottom:6}}>라켓명</label>
                        <input
                          type="text" className="input-field"
                          value={formData.racket}
                          onChange={e=>{ setFormData(f=>({...f,racket:e.target.value})); setShowRacketDropdown(e.target.value.length>0); }}
                          onFocus={()=>setShowRacketDropdown(formData.racket.length>0)}
                          onBlur={()=>setTimeout(()=>setShowRacketDropdown(false),200)}
                          placeholder="Wilson Pro Staff" required
                        />
                        {showRacketDropdown && getUniqueRackets().length>0 && (
                          <div className="dropdown-list">
                            {getUniqueRackets().map(r=>(
                              <button key={r} type="button" className="dropdown-item" onClick={()=>{ setFormData(f=>({...f,racket:r})); setShowRacketDropdown(false); }}>{r}</button>
                            ))}
                          </div>
                        )}
                      </div>
                      <div>
                        <label style={{display:'block', fontSize:13, fontWeight:600, color:'#374151', marginBottom:6}}>패턴</label>
                        <select className="input-field" value={formData.pattern} onChange={e=>setFormData(f=>({...f,pattern:e.target.value}))}>
                          <option>오픈</option>
                          <option>덴스</option>
                        </select>
                      </div>
                    </div>

                    {/* 스트링 + 가격 */}
                    <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))', gap:14, marginBottom:14}}>
                      <div style={{position:'relative'}}>
                        <label style={{display:'block', fontSize:13, fontWeight:600, color:'#374151', marginBottom:6}}>스트링 종류</label>
                        <input
                          type="text" className="input-field"
                          value={formData.stringType}
                          onChange={e=>{ setFormData(f=>({...f,stringType:e.target.value})); setShowStringDropdown(e.target.value.length>0); }}
                          onFocus={()=>setShowStringDropdown(true)}
                          onBlur={()=>setTimeout(()=>setShowStringDropdown(false),200)}
                          placeholder="스트링 선택 (초성 검색)" required
                        />
                        {showStringDropdown && (
                          <div className="dropdown-list">
                            {getFilteredStrings(formData.stringType).map(s=>(
                              <button key={s} type="button" className="dropdown-item" onClick={()=>handleStringSelect(s)}
                                style={{display:'flex', justifyContent:'space-between'}}>
                                <span>{s}</span>
                                <span style={{color:'#6b7280', fontSize:13}}>{stringPrices[s].toLocaleString()}원</span>
                              </button>
                            ))}
                            <div style={{borderTop:'1px solid #e5e7eb', padding:8}}>
                              {!showAddString ? (
                                <button type="button" onClick={()=>setShowAddString(true)}
                                  style={{width:'100%', padding:'8px', background:'#3b82f6', color:'white', border:'none', borderRadius:8, fontSize:13, cursor:'pointer'}}>
                                  + 새 스트링 추가
                                </button>
                              ) : (
                                <div style={{display:'flex', flexDirection:'column', gap:6}}>
                                  <input type="text" className="input-field" value={newStringName} onChange={e=>setNewStringName(e.target.value)} placeholder="스트링 이름" style={{fontSize:13}} />
                                  <input type="number" className="input-field" value={newStringPrice} onChange={e=>setNewStringPrice(e.target.value)} placeholder="가격 (원)" style={{fontSize:13}} />
                                  <div style={{display:'flex', gap:6}}>
                                    <button type="button" onClick={handleAddCustomString} style={{flex:1, padding:'6px', background:'#22c55e', color:'white', border:'none', borderRadius:6, fontSize:13, cursor:'pointer'}}>추가</button>
                                    <button type="button" onClick={()=>{ setShowAddString(false); setNewStringName(''); setNewStringPrice(''); }} style={{flex:1, padding:'6px', background:'#e5e7eb', color:'#374151', border:'none', borderRadius:6, fontSize:13, cursor:'pointer'}}>취소</button>
                                  </div>
                                </div>
                              )}
                            </div>
                          </div>
                        )}
                      </div>
                      <div>
                        <label style={{display:'block', fontSize:13, fontWeight:600, color:'#374151', marginBottom:6}}>스트링 가격 (원)</label>
                        <input type="number" className="input-field" value={formData.stringPrice} onChange={e=>setFormData(f=>({...f,stringPrice:e.target.value}))} placeholder="13000" required />
                      </div>
                    </div>

                    {/* 하이브리드 */}
                    <div style={{border:'2px dashed #d1d5db', borderRadius:12, padding:16, marginBottom:14}}>
                      <label style={{display:'flex', alignItems:'center', gap:8, cursor:'pointer', marginBottom: formData.isHybrid ? 14 : 0}}>
                        <input type="checkbox" checked={formData.isHybrid}
                          onChange={e=>setFormData(f=>({...f, isHybrid:e.target.checked, hybridString2: e.target.checked ? f.hybridString2 : '', hybridPrice2: e.target.checked ? f.hybridPrice2 : ''}))}
                          style={{width:18, height:18}} />
                        <span style={{fontWeight:600, color:'#374151'}}>하이브리드 (+2,000원)</span>
                      </label>
                      {formData.isHybrid && (
                        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))', gap:14}}>
                          <div style={{position:'relative'}}>
                            <label style={{display:'block', fontSize:13, fontWeight:600, color:'#374151', marginBottom:6}}>두번째 스트링</label>
                            <input
                              type="text" className="input-field"
                              value={formData.hybridString2}
                              onChange={e=>{ setFormData(f=>({...f,hybridString2:e.target.value})); setShowHybridDropdown(e.target.value.length>0); }}
                              onFocus={()=>setShowHybridDropdown(true)}
                              onBlur={()=>setTimeout(()=>setShowHybridDropdown(false),200)}
                              placeholder="두번째 스트링" required={formData.isHybrid}
                            />
                            {showHybridDropdown && (
                              <div className="dropdown-list">
                                {getFilteredStrings(formData.hybridString2).map(s=>(
                                  <button key={s} type="button" className="dropdown-item" onClick={()=>handleStringSelect(s, true)}
                                    style={{display:'flex', justifyContent:'space-between'}}>
                                    <span>{s}</span>
                                    <span style={{color:'#6b7280', fontSize:13}}>{stringPrices[s].toLocaleString()}원</span>
                                  </button>
                                ))}
                              </div>
                            )}
                          </div>
                          <div>
                            <label style={{display:'block', fontSize:13, fontWeight:600, color:'#374151', marginBottom:6}}>두번째 스트링 가격 (원)</label>
                            <input type="number" className="input-field" value={formData.hybridPrice2} onChange={e=>setFormData(f=>({...f,hybridPrice2:e.target.value}))} placeholder="13000" required={formData.isHybrid} />
                          </div>
                        </div>
                      )}
                    </div>

                    {/* 공임 + 수량 */}
                    <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))', gap:14, marginBottom:14}}>
                      <div>
                        <label style={{display:'block', fontSize:13, fontWeight:600, color:'#374151', marginBottom:6}}>공임</label>
                        <select className="input-field" value={formData.labor} onChange={e=>setFormData(f=>({...f,labor:e.target.value}))} required>
                          <option value="0">0원</option>
                          <option value="5000">5,000원</option>
                          <option value="12000">12,000원</option>
                          <option value="15000">15,000원</option>
                        </select>
                      </div>
                      <div>
                        <label style={{display:'block', fontSize:13, fontWeight:600, color:'#374151', marginBottom:6}}>수량</label>
                        <input type="number" className="input-field" value={formData.quantity} onChange={e=>setFormData(f=>({...f,quantity:e.target.value}))} min="1" required />
                      </div>
                    </div>

                    {/* 합계 */}
                    <div style={{background:'#f0fdf4', border:'1.5px solid #86efac', borderRadius:12, padding:16, marginBottom:16}}>
                      {formData.isHybrid && formData.stringPrice && formData.hybridPrice2 && (
                        <p style={{fontSize:13, color:'#6b7280', margin:'0 0 4px'}}>
                          스트링 평균: {(((parseFloat(formData.stringPrice)||0) + (parseFloat(formData.hybridPrice2)||0)) / 2).toLocaleString()}원 + 하이브리드 +2,000원
                        </p>
                      )}
                      <p style={{fontSize:20, fontWeight:800, color:'#15803d', margin:0}}>
                        합계: {calculateTotal().toLocaleString()}원
                      </p>
                    </div>

                    <div style={{display:'flex', gap:12}}>
                      <button type="submit" className="btn-green" style={{flex:1}}>
                        {editingId ? '✔ 수정 완료' : '✚ 등록하기'}
                      </button>
                      <button type="button" className="btn-gray" onClick={resetForm} style={{minWidth:80}}>취소</button>
                    </div>
                  </form>
                </div>
              )}

              {/* 데이터 로딩 중 */}
              {dbLoading && (
                <div style={{textAlign:'center', padding:40}}>
                  <div className="spinner" style={{margin:'0 auto'}}></div>
                  <p style={{color:'#6b7280', marginTop:12}}>데이터 불러오는 중...</p>
                </div>
              )}

              {/* 고객 관리 목록 */}
              {!dbLoading && viewMode === 'customers' && (
                <div>
                  {filteredCustomers.length === 0 ? (
                    <div className="card" style={{textAlign:'center', padding:48}}>
                      <p style={{color:'#9ca3af', fontSize:16, margin:0}}>등록된 고객이 없습니다.</p>
                      <p style={{color:'#9ca3af', fontSize:14, marginTop:8}}>새 작업 등록 버튼을 눌러 시작하세요.</p>
                    </div>
                  ) : (
                    filteredCustomers.map(customer => (
                      <div key={customer.name} className="card">
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14, flexWrap:'wrap', gap:10}}>
                          <div>
                            <h3 style={{fontSize:22, fontWeight:800, color:'#1a1a1a', margin:'0 0 8px'}}>{customer.name}</h3>
                            <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                              <span className="badge badge-green">연간 방문 {customer.yearlyVisits}회</span>
                              <span className="badge badge-blue">총 방문 {customer.visitCount}회</span>
                              <span className="badge badge-purple">누적 {customer.totalAmount.toLocaleString()}원</span>
                            </div>
                          </div>
                        </div>
                        <div>
                          {customer.visits.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(visit => (
                            <div key={visit.id} className="record-item">
                              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:10}}>
                                <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(130px, 1fr))', gap:10, flex:1}}>
                                  <div>
                                    <p style={{fontSize:11, color:'#9ca3af', margin:'0 0 2px'}}>날짜</p>
                                    <p style={{fontWeight:600, margin:0, fontSize:14}}>{visit.date}</p>
                                  </div>
                                  <div>
                                    <p style={{fontSize:11, color:'#9ca3af', margin:'0 0 2px'}}>라켓</p>
                                    <p style={{fontWeight:500, margin:0, fontSize:13}}>{visit.racket} ({visit.pattern})</p>
                                  </div>
                                  <div>
                                    <p style={{fontSize:11, color:'#9ca3af', margin:'0 0 2px'}}>스트링</p>
                                    <p style={{fontWeight:500, margin:0, fontSize:13}}>
                                      {visit.stringType}
                                      {visit.isHybrid && visit.hybridString2 && (
                                        <span style={{fontSize:12, color:'#7c3aed'}}> + {visit.hybridString2} (하이브리드)</span>
                                      )}
                                    </p>
                                  </div>
                                  <div>
                                    <p style={{fontSize:11, color:'#9ca3af', margin:'0 0 2px'}}>금액</p>
                                    <p style={{fontWeight:800, color:'#16a34a', margin:0, fontSize:16}}>{visit.total.toLocaleString()}원</p>
                                  </div>
                                </div>
                                <div style={{display:'flex', gap:6}}>
                                  <button onClick={()=>handleEdit(visit)} style={{background:'#eff6ff', border:'none', borderRadius:8, padding:'8px 12px', cursor:'pointer', fontSize:16}}>✏️</button>
                                  <button onClick={()=>handleDelete(visit.id)} style={{background:'#fef2f2', border:'none', borderRadius:8, padding:'8px 12px', cursor:'pointer', fontSize:16}}>🗑️</button>
                                </div>
                              </div>
                              <div style={{marginTop:8, fontSize:13, color:'#6b7280'}}>
                                스트링 {parseInt(visit.stringPrice).toLocaleString()}원
                                {visit.isHybrid && visit.hybridPrice2 && (
                                  <> + {parseInt(visit.hybridPrice2).toLocaleString()}원 <span style={{color:'#7c3aed'}}>(하이브리드 +2,000원)</span></>
                                )}
                                &nbsp;| 공임 {parseInt(visit.labor).toLocaleString()}원
                                &nbsp;| 수량 {visit.quantity}개
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))
                  )}
                </div>
              )}

              {/* 월별 매출 */}
              {!dbLoading && viewMode === 'monthly' && (
                <div className="card">
                  <h2 style={{fontSize:20, fontWeight:800, color:'#1a1a1a', marginBottom:20}}>📅 월별 매출 현황</h2>
                  {getMonthlyStats().length === 0 ? (
                    <p style={{color:'#9ca3af', textAlign:'center', padding:32}}>데이터가 없습니다.</p>
                  ) : (
                    getMonthlyStats().map(stat => (
                      <div key={stat.month} style={{border:'1.5px solid #e5e7eb', borderRadius:12, padding:16, marginBottom:10}}>
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:10}}>
                          <div>
                            <p style={{fontSize:17, fontWeight:700, color:'#1a1a1a', margin:'0 0 4px'}}>{stat.month}</p>
                            <p style={{fontSize:13, color:'#6b7280', margin:0}}>작업 {stat.count}건</p>
                          </div>
                          <div style={{textAlign:'right'}}>
                            <p style={{fontSize:22, fontWeight:800, color:'#2563eb', margin:'0 0 4px'}}>{stat.total.toLocaleString()}원</p>
                            <p style={{fontSize:13, color:'#6b7280', margin:0}}>평균 {Math.round(stat.total/stat.count).toLocaleString()}원</p>
                          </div>
                        </div>
                      </div>
                    ))
                  )}
                </div>
              )}

              {/* 연도별 매출 */}
              {!dbLoading && viewMode === 'yearly' && (
                <div className="card">
                  <h2 style={{fontSize:20, fontWeight:800, color:'#1a1a1a', marginBottom:20}}>📈 연도별 매출 현황</h2>
                  {getYearlyStats().length === 0 ? (
                    <p style={{color:'#9ca3af', textAlign:'center', padding:32}}>데이터가 없습니다.</p>
                  ) : (
                    getYearlyStats().map(stat => (
                      <div key={stat.year} style={{border:'1.5px solid #e5e7eb', borderRadius:12, padding:20, marginBottom:10}}>
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:10}}>
                          <div>
                            <p style={{fontSize:22, fontWeight:800, color:'#1a1a1a', margin:'0 0 4px'}}>{stat.year}년</p>
                            <p style={{fontSize:13, color:'#6b7280', margin:0}}>총 작업 {stat.count}건</p>
                          </div>
                          <div style={{textAlign:'right'}}>
                            <p style={{fontSize:26, fontWeight:800, color:'#7c3aed', margin:'0 0 4px'}}>{stat.total.toLocaleString()}원</p>
                            <p style={{fontSize:13, color:'#6b7280', margin:0}}>월평균 {Math.round(stat.total/12).toLocaleString()}원</p>
                          </div>
                        </div>
                      </div>
                    ))
                  )}
                </div>
              )}
            </div>

            {/* 삭제 확인 모달 */}
            {confirmModal && (
              <ConfirmModal
                message={confirmModal.message}
                onConfirm={confirmModal.onConfirm}
                onCancel={()=>setConfirmModal(null)}
              />
            )}

            {/* 토스트 알림 */}
            {toast && <Toast message={toast.message} type={toast.type} />}
          </div>
        );
      };

      ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
