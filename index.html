    <title>니지스트링 작업 관리</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
    <style>
        :root {
            --black: #0A0A0A;
            --black2: #111111;
            --green: #22C55E;
            --green-dark: #16A34A;
            --green-glow: rgba(34,197,94,0.4);
            --green-light: #DCFCE7;
            --white: #FFFFFF;
            --gray-bg: #F2F3F7;
            --gray-100: #F0F0F0;
            --gray-200: #E2E2E2;
            --gray-400: #9E9E9E;
            --gray-600: #616161;
            --blue: #3B82F6;
            --blue-dark: #2563EB;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
            --card-shadow-hover: 0 8px 32px rgba(0,0,0,0.12);
        }
        * { box-sizing: border-box; -webkit-overflow-scrolling: touch; }
        body {
            margin: 0; padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: var(--gray-bg);
            color: var(--black);
        }
        input, select, textarea { font-size: 16px !important; font-family: 'Pretendard', sans-serif; }
        button { min-height: 40px; touch-action: manipulation; font-family: 'Pretendard', sans-serif; }

        /* ══ 애니메이션 ══ */
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes fadeSlideUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
        @keyframes cardPop {
            from { opacity:0; transform:scale(0.97) translateY(8px); }
            to   { opacity:1; transform:scale(1) translateY(0); }
        }
        @keyframes shimmer {
            0%   { background-position: -200% 0; }
            100% { background-position:  200% 0; }
        }
        @keyframes pulse-green {
            0%,100% { box-shadow: 0 0 0 0 var(--green-glow); }
            50%      { box-shadow: 0 0 0 8px transparent; }
        }

        .spinner { width:40px; height:40px; border:3px solid #E0E0E0; border-top-color: var(--green); border-radius:50%; animation:spin 0.8s linear infinite; }

        /* ══ 헤더 ══ */
        .app-header {
            background: linear-gradient(180deg, #0A0A0A 0%, #111111 100%);
            padding: 0;
            position: sticky; top: 0; z-index: 30;
            box-shadow: 0 2px 20px rgba(0,0,0,0.4);
        }
        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 16px 10px;
        }
        .header-brand { display: flex; align-items: center; gap: 10px; }
        .header-logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #16A34A, #22C55E);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 900; color: #fff;
            box-shadow: 0 4px 12px var(--green-glow);
        }
        .header-title { font-size: 16px; font-weight: 900; color: #fff; letter-spacing: 0.5px; }
        .header-subtitle { font-size: 10px; color: #555; margin-top: 1px; font-weight: 600; letter-spacing: 0.3px; }
        .logout-btn {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            color: #888; font-size: 11px; font-weight: 700;
            padding: 6px 12px; border-radius: 20px; cursor: pointer;
            transition: all 0.2s;
        }
        .logout-btn:active { background: rgba(255,255,255,0.15); }

        /* ══ 스포츠 탭 ══ */
        .sport-tabs { display: flex; gap: 0; border-top: 1px solid #1a1a1a; }
        .sport-tab {
            flex: 1; padding: 11px 0; text-align: center;
            font-size: 13px; font-weight: 700; cursor: pointer;
            border-bottom: 2.5px solid transparent;
            color: #555; background: transparent;
            border-top: none; border-left: none; border-right: none;
            transition: all 0.2s; letter-spacing: 0.2px;
        }
        .sport-tab.active-green { color: var(--green); border-bottom-color: var(--green); }
        .sport-tab.active-blue { color: var(--blue); border-bottom-color: var(--blue); }

        /* ══ 히어로 배너 (오늘 요약) ══ */
        .today-banner {
            background: linear-gradient(180deg, #111111 0%, #0d1a12 100%);
            padding: 16px 16px 20px;
            margin-bottom: 0;
        }
        .today-banner-inner {
            background: linear-gradient(135deg, #0f2318 0%, #162d1e 50%, #0f1f14 100%);
            border: 1px solid rgba(34,197,94,0.18);
            border-radius: 20px;
            padding: 18px 18px 16px;
            position: relative; overflow: hidden;
        }
        .today-banner-inner::before {
            content:''; position:absolute; top:-40px; right:-20px;
            width:120px; height:120px; border-radius:50%;
            background: radial-gradient(circle, rgba(34,197,94,0.12) 0%, transparent 70%);
        }
        .today-banner-inner::after {
            content:'🎾'; position:absolute; right:16px; bottom:12px;
            font-size:44px; opacity:0.08;
        }
        .today-top-row { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
        .today-greeting { font-size:11px; color:#4ade80; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
        .today-date-label { font-size:18px; font-weight:900; color:#fff; letter-spacing:-0.3px; }
        .today-stats { display: flex; gap: 0; background: rgba(0,0,0,0.25); border-radius:14px; overflow:hidden; margin-top:14px; border: 1px solid rgba(255,255,255,0.05); }
        .today-stat-item {
            flex:1; padding:12px 14px; position:relative;
        }
        .today-stat-item:not(:last-child) { border-right:1px solid rgba(255,255,255,0.06); }
        .today-stat-label { font-size:10px; color:#666; margin-bottom:4px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
        .today-stat-val { font-size:22px; font-weight:900; color:#fff; line-height:1; }
        .today-stat-val.green { color: #4ade80; }
        .today-stat-unit { font-size:12px; color:#555; font-weight:700; margin-left:2px; }
        .today-stat-recent { font-size:12px; color:#4ade80; font-weight:800; }
        /* ══ 통계 서브탭 ══ */
        .stat-subtab-row {
            display: flex; gap: 8px;
            padding: 12px 12px 0;
        }
        .stat-subtab {
            flex: 1; padding: 9px 0; border-radius: 12px;
            font-size: 13px; font-weight: 700;
            border: 1.5px solid #E8E8E8; cursor: pointer;
            background: #fff; color: #888;
            transition: all 0.18s; text-align:center;
        }
        .stat-subtab.active-orange { background: linear-gradient(135deg,#C2410C,#EA580C); color:#fff; border-color:transparent; box-shadow:0 4px 12px rgba(234,88,12,0.3); }
        .stat-subtab.active-purple { background: linear-gradient(135deg,#5B21B6,#7C3AED); color:#fff; border-color:transparent; box-shadow:0 4px 12px rgba(124,58,237,0.3); }

        /* ══ 검색 바 ══ */
        .search-row {
            display: flex; gap: 6px; align-items: center;
            padding: 0 12px 8px;
            overflow: hidden;
        }
        .search-input {
            flex: 1; min-width: 0;
            padding: 9px 12px;
            border: 1.5px solid #E8E8E8;
            border-radius: 12px; font-size: 14px; font-weight: 500;
            background: #fff; outline: none;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .search-input:focus { border-color: var(--green); box-shadow: 0 2px 12px var(--green-glow); }
        .add-btn {
            flex-shrink: 0;
            padding: 9px 14px; border-radius: 12px;
            font-size: 12px; font-weight: 800;
            border: none; cursor: pointer; color: #fff;
            transition: all 0.18s; white-space: nowrap;
            min-height: 0;
        }
        .add-btn:active { transform: scale(0.95); }
        .add-btn-green { background: linear-gradient(135deg,#16A34A,#22C55E); box-shadow: 0 4px 14px var(--green-glow); }
        .add-btn-blue { background: linear-gradient(135deg,#1D4ED8,#3B82F6); box-shadow: 0 4px 14px rgba(59,130,246,0.35); }
        .add-btn-cancel { background: #E0E0E0; color: #616161; }

        /* ══ 엑셀 버튼 행 ══ */
        .excel-row {
            display: flex; gap: 6px;
            padding: 0 12px 10px;
        }
        .excel-btn {
            flex: 1; padding: 10px 0;
            border-radius: 12px; font-size: 12px; font-weight: 700;
            border: none; cursor: pointer; color: #fff;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            transition: all 0.18s;
        }
        .excel-btn:active { transform: scale(0.96); }

        /* ══ 통계 카드 ══ */
        .stat-card {

        /* ══ 내용 패딩 ══ */

        /* ══ 하단 고정 메뉴바 ══ */
        .bottom-nav {

            -webkit-backdrop-filter: blur(12px) saturate(180%);

        .nav-item {

            gap: 3px; padding: 6px 0;

        .nav-item.active-pink .nav-label { color: #be185d; }

        /* ══ 로그인 화면 ══ */

        .login-input::placeholder { color: #333; }
        .login-label { font-size: 11px; font-weight: 800; color: #555; margin-bottom: 6px; display: block; text-transform:uppercase; letter-spacing:0.5px; }
        .login-btn {

            background: linear-gradient(135deg,#15803D,#22C55E); color: #fff;

const LoginScreen = () => {
    const [email, setEmail] = useState('');
    const [password, setPassword] = useState('');
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');
    const [mode, setMode] = useState('login');
    const [resetSent, setResetSent] = useState(false);

    const handleSubmit = async () => {
        if (!email.trim() || (!password && mode !== 'reset')) { setError('이메일과 비밀번호를 입력하세요.'); return; }
        setLoading(true); setError('');
        try {
            if (mode === 'login') {
                await auth.signInWithEmailAndPassword(email.trim(), password);
            } else if (mode === 'register') {
                if (password.length < 6) { setError('비밀번호는 6자리 이상이어야 합니다.'); setLoading(false); return; }
                await auth.createUserWithEmailAndPassword(email.trim(), password);
            } else {
                await auth.sendPasswordResetEmail(email.trim());
                setResetSent(true);
            }
        } catch(e) {
            const msg = {
                'auth/user-not-found': '등록되지 않은 이메일입니다.',
                'auth/wrong-password': '비밀번호가 틀렸습니다.',
                'auth/email-already-in-use': '이미 사용 중인 이메일입니다.',
                'auth/invalid-email': '이메일 형식이 올바르지 않습니다.',
                'auth/too-many-requests': '요청이 너무 많습니다. 잠시 후 다시 시도하세요.',
                'auth/invalid-credential': '이메일 또는 비밀번호가 올바르지 않습니다.',
            }[e.code] || '오류: ' + e.message;
            setError(msg);
        }
        setLoading(false);
    };

    if (resetSent) return (
        <div className="login-screen">
            <div className="login-card" style={{textAlign:'center'}}>
                <div style={{fontSize:'48px',marginBottom:'12px'}}>📧</div>
                <h2 style={{fontSize:'18px',fontWeight:800,color:'#fff',marginBottom:'8px'}}>이메일을 확인하세요</h2>
                <p style={{fontSize:'13px',color:'#616161',marginBottom:'24px'}}>{email}로 비밀번호 재설정 링크를 보냈습니다.</p>
                <button onClick={()=>{setMode('login');setResetSent(false);}} className="login-btn">로그인으로 돌아가기</button>
            </div>
        </div>
    );

    return (
        <div className="login-screen">
            <div className="login-card">
                <div className="login-logo-area">
                    <div className="login-logo">🎾</div>
                    <h1 className="login-title">NIJI STRING</h1>
                    <p className="login-subtitle">프로 스트링 작업 관리</p>
                </div>
                <div className="login-tab-row">
                    <button onClick={()=>{setMode('login');setError('');}} className={`login-tab ${mode==='login'?'active':''}`}>로그인</button>
                    <button onClick={()=>{setMode('register');setError('');}} className={`login-tab ${mode==='register'?'active':''}`}>회원가입</button>
                </div>
                <div>
                    <label className="login-label">이메일</label>
                    <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
                        onKeyDown={e=>e.key==='Enter'&&handleSubmit()}
                        placeholder="이메일 입력"
                        className="login-input"/>
                    {mode !== 'reset' && (
                        <>
                            <label className="login-label">비밀번호</label>
                            <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
                                onKeyDown={e=>e.key==='Enter'&&handleSubmit()}
                                placeholder={mode==='register'?'6자리 이상':'비밀번호 입력'}
                                className="login-input"/>
                        </>
                    )}
                    {error && <div className="login-error">{error}</div>}
                    <button onClick={handleSubmit} disabled={loading} className="login-btn" style={loading?{opacity:0.5}:{}}>
                        {loading ? '처리 중...' : mode==='login'?'🔐 로그인':mode==='register'?'✅ 회원가입':'📧 재설정 메일 발송'}
                    </button>
                    {mode === 'login' && (
                        <button onClick={()=>{setMode('reset');setError('');}} className="login-link">비밀번호를 잊으셨나요?</button>
                    )}
                    {mode === 'reset' && (
                        <button onClick={()=>{setMode('login');setError('');}} className="login-link">← 로그인으로 돌아가기</button>
                    )}
                </div>
            </div>
        </div>
    );
};

    const [bulkForm, setBulkForm] = useState({prefix:'NIJI',count:'5',discount:'',expiry:'',note:''});

    const [showNameDropdown, setShowNameDropdown] = useState(false);
    const [showRacketDropdown, setShowRacketDropdown] = useState(false);
    const [extraWorks, setExtraWorks] = useState([]);
    const [showExtraSection, setShowExtraSection] = useState(false);
    const [showExtraDropdown, setShowExtraDropdown] = useState(null);
    const [expandedCustomers, setExpandedCustomers] = useState({});
    const toggleCustomerHistory = (name) => setExpandedCustomers(prev=>({...prev,[name]:!prev[name]}));
    const [showAddExtraItemModal, setShowAddExtraItemModal] = useState(false);
    const [newExtraItemName, setNewExtraItemName] = useState('');
    const [newExtraItemPrice, setNewExtraItemPrice] = useState('');
    const [saveStatus, setSaveStatus] = useState('');
    const [dmSentList, setDmSentList] = useState({}); // { 고객명: 'YYYY-MM-DD' }
    const [customerCycles, setCustomerCycles] = useState({}); // { 고객명: 일수 }

    // ── 용품 판매 관련 State ─────────────────────
    const [productSales, setProductSales] = useState([]); // 용품 판매 기록
    const [productItems, setProductItems] = useState([]); // 용품 카탈로그 (이름, 원가, 판매가)
    const [showProductSaleForm, setShowProductSaleForm] = useState(false);
    const [productSaleForm, setProductSaleForm] = useState({date:'', productName:'', salePrice:'', costPrice:'', qty:1, memo:''});
    const [showProductItemForm, setShowProductItemForm] = useState(false);
    const [productItemForm, setProductItemForm] = useState({name:'', salePrice:'', costPrice:''});
    const [editingProductSaleKey, setEditingProductSaleKey] = useState(null);
    const [showProductDropdown, setShowProductDropdown] = useState(false);
    const [showCycleModal, setShowCycleModal] = useState(null); // null 또는 고객명
    const [cycleInput, setCycleInput] = useState('');

    // ── 원가 관리 (관리자 전용) ─────────────────
    const [stringCosts, setStringCosts] = useState({}); // { 스트링이름: 원가 }
    const [adminUnlocked, setAdminUnlocked] = useState(false);
    const [showAdminModal, setShowAdminModal] = useState(false);
    const [adminPinInput, setAdminPinInput] = useState('');
    const [adminPinError, setAdminPinError] = useState('');
    const ADMIN_PIN = '1234'; // ← 원하는 번호로 바꾸세요

    const stringPrices = {...config.defaultStrings, ...customStrings};

    const makeEmptyForm = () => ({
        date: getTodayKST(), name:'', racket:'',
        pattern: config.patterns[0],
        stringType:'', stringPrice:'',
        labor: config.defaultLabors[0],
        quantity:1, tension:'',
        isHybrid:false, hybridString2:'', hybridPrice2:'',
        phone:'',
        serviceType: 'none', // 'grip900' | 'grip1400' | 'parking' | 'custom' | 'none'
        serviceCustomAmount: '',
        serviceCustomName: '',
    });
    const [formData, setFormData] = useState(makeEmptyForm());

    // ── 저장 상태 토스트 ────────────────────────
    const showSaveStatus = (status) => {
        setSaveStatus(status);
        if (status === 'saved') setTimeout(() => setSaveStatus(''), 2000);
    };

    // ── 알림 모달 헬퍼 ──────────────────────────
    const showAlert = (msg) => setConfirmModal({ msg, onOk:()=>setConfirmModal(null), okLabel:'확인', cancelLabel:null });

    // ── Firebase 실시간 구독 ────────────────────
    useEffect(() => {
        setDbLoading(true);
        const recordsRef = db.ref(dbPath(uid, sport, 'records'));
        const stringsRef = db.ref(dbPath(uid, sport, 'strings'));
        const couponsRef = db.ref(dbPath(uid, sport, 'coupons'));
        const extrasRef  = db.ref(dbPath(uid, sport, 'extraItems'));

        let loaded = {records:false, strings:false, coupons:false, extras:false, dmSent:false, cycles:false, costs:false, productSales:false, productItems:false};
        const checkAllLoaded = () => {
            if (Object.values(loaded).every(Boolean)) setDbLoading(false);
        };

        // records 리스너
        const recListener = snap => {
            const val = snap.val();
            if (val) {
                const arr = Object.entries(val).map(([fbKey, v]) => ({...v, fbKey}));
                arr.sort((a,b) => { if(b.date!==a.date) return b.date.localeCompare(a.date); return (b.createdAt||0)-(a.createdAt||0); });
                setRecords(arr);
            } else if (!loaded.records) {
                if (sport === 'tennis' && config.initialData.length > 0) {
                    const batch = {};
                    config.initialData.forEach((r, i) => {
                        const key = recordsRef.push().key;
                        const total = (parseFloat(r.stringPrice)+parseFloat(r.labor))*parseInt(r.quantity);
                        batch[key] = {...r, fbKey:key, id:key, total, createdAt:new Date(r.date).getTime()+i, extraWorks:[], couponCode:'', couponDiscount:0};
                    });
                    recordsRef.update(batch);
                } else {
                    setRecords([]);
                }
            }
            loaded.records = true;
            checkAllLoaded();
        };
        recordsRef.on('value', recListener);

        // strings 리스너
        const strListener = snap => {
            const raw = snap.val() || {};
            // 안전 키를 원래 이름으로 복원
            const restored = {};
            Object.entries(raw).forEach(([key, price]) => {
                restored[fromSafeKey(key)] = price;
            });
            setCustomStrings(restored);
            loaded.strings = true;
            checkAllLoaded();
        };
        stringsRef.on('value', strListener);

        // coupons 리스너
        const couListener = snap => {
            const val = snap.val();
            if (val) {
                const arr = Object.entries(val).map(([fbKey, v]) => ({...v, fbKey}));
                setCoupons(arr);
            } else { setCoupons([]); }
            loaded.coupons = true;
            checkAllLoaded();
        };
        couponsRef.on('value', couListener);

        // extraItems 리스너
        const extListener = snap => {
            const val = snap.val();
            if (val) {
                // Firebase는 배열을 객체로 저장할 수 있으므로 변환
                const items = Array.isArray(val) ? val : Object.values(val);
                setSavedExtraItems(items.filter(Boolean));
            } else {
                setSavedExtraItems(DEFAULT_EXTRA_ITEMS);
            }
            loaded.extras = true;
            checkAllLoaded();
        };
        extrasRef.on('value', extListener);

        // dmSent 리스너
        const dmRef = db.ref(dbPath(uid, sport, 'dmSent'));
        const dmListener = snap => {
            setDmSentList(snap.val() || {});
            loaded.dmSent = true;
            checkAllLoaded();
        };
        dmRef.on('value', dmListener);

        // customerCycles 리스너 (고객별 교체주기)
        const cyclesRef = db.ref(dbPath(uid, sport, 'customerCycles'));
        const cyclesListener = snap => {
            const val = snap.val() || {};
            const restored = {};
            Object.entries(val).forEach(([key, days]) => { restored[fromSafeKey(key)] = days; });
            setCustomerCycles(restored);
            loaded.cycles = true;
            checkAllLoaded();
        };
        cyclesRef.on('value', cyclesListener);

        // stringCosts 구독
        const costsRef = db.ref(dbPath(uid, sport, 'stringCosts'));
        const costsListener = snap => {
            const val = snap.val() || {};
            const restored = {};
            Object.entries(val).forEach(([key, cost]) => { restored[fromSafeKey(key)] = cost; });
            setStringCosts(restored);
            loaded.costs = true;
            checkAllLoaded();
        };
        costsRef.on('value', costsListener);

        // productSales 리스너
        const productSalesRef = db.ref(dbPath(uid, sport, 'productSales'));
        const productSalesListener = snap => {
            const val = snap.val();
            if (val) {
                const arr = Object.entries(val).map(([fbKey, v]) => ({...v, fbKey}));
                arr.sort((a,b) => { if(b.date!==a.date) return b.date.localeCompare(a.date); return (b.createdAt||0)-(a.createdAt||0); });
                setProductSales(arr);
            } else { setProductSales([]); }
            loaded.productSales = true;
            checkAllLoaded();
        };
        productSalesRef.on('value', productSalesListener);

        // productItems 리스너 (용품 카탈로그)
        const productItemsRef = db.ref(dbPath(uid, sport, 'productItems'));
        const productItemsListener = snap => {
            const val = snap.val();
            if (val) {
                const arr = Array.isArray(val) ? val : Object.values(val);
                setProductItems(arr.filter(Boolean));
            } else { setProductItems([]); }
            loaded.productItems = true;
            checkAllLoaded();
        };
        productItemsRef.on('value', productItemsListener);

        // 폼 초기화
        setFormData(makeEmptyForm());
        setAppliedCoupon(null);
        setCouponInput('');
        setCouponMsg('');
        setExtraWorks([]);
        setShowExtraSection(false);
        setShowForm(false);
        setEditingId(null);
        setViewMode('customers');
        setSearchTerm('');

        // 구독 해제 (리스너 함수를 정확히 넘겨야 중복 방지)
        return () => {
            recordsRef.off('value', recListener);
            stringsRef.off('value', strListener);
            couponsRef.off('value', couListener);
            extrasRef.off('value', extListener);
            dmRef.off('value', dmListener);
            cyclesRef.off('value', cyclesListener);
            costsRef.off('value', costsListener);
            productSalesRef.off('value', productSalesListener);
            productItemsRef.off('value', productItemsListener);
        };
    }, [uid, sport]);

    // ── Firebase 저장/삭제 함수 ─────────────────
    const saveRecord = async (rec) => {
        showSaveStatus('saving');
        try {
            const ref = db.ref(dbPath(uid, sport, 'records'));
            if (rec.fbKey) {
                await ref.child(rec.fbKey).set(rec);
            } else {
                const newKey = ref.push().key;
                await ref.child(newKey).set({...rec, fbKey:newKey, id:newKey});
            }
            showSaveStatus('saved');
        } catch(e) { showSaveStatus('error'); showAlert('저장 실패: ' + e.message); }
    };

    const deleteRecord = async (fbKey) => {
        showSaveStatus('saving');
        try {
            await db.ref(dbPath(uid, sport, 'records')).child(fbKey).remove();
            showSaveStatus('saved');
        } catch(e) { showSaveStatus('error'); showAlert('삭제 실패: ' + e.message); }
    };

    // DM 발송 기록 저장 (고객명을 안전 키로 변환)
    const saveDmSent = async (customerName) => {
        const safeKey = toSafeKey(customerName);
        try {
            await db.ref(dbPath(uid, sport, 'dmSent')).child(safeKey).set(getTodayKST());
        } catch(e) { console.error('DM 저장 실패', e); }
    };

    const isDmSent = (customerName) => {
        const safeKey = toSafeKey(customerName);
        return dmSentList[safeKey] || null; // null 또는 날짜 문자열
    };

    // 고객별 교체주기 저장/삭제
    const saveCustomerCycle = async (customerName, days) => {
        const safeKey = toSafeKey(customerName);
        try {
            if (days === null || days === '') {
                await db.ref(dbPath(uid, sport, 'customerCycles')).child(safeKey).remove();
            } else {
                await db.ref(dbPath(uid, sport, 'customerCycles')).child(safeKey).set(parseInt(days));
            }
        } catch(e) { console.error('교체주기 저장 실패', e); }
    };

    // 해당 고객의 교체주기 반환 (설정 없으면 기본 60일)
    const getCustomerCycle = (customerName) => {
        return customerCycles[customerName] || 60;
    };

    // Firebase 키로 사용할 수 없는 특수문자(. # $ / [ ]) → 안전 문자로 변환
    const toSafeKey = (name) => name.replace(/\./g,'_DOT_').replace(/#/g,'_HASH_').replace(/\$/g,'_DOLLAR_').replace(/\//g,'_SLASH_').replace(/\[/g,'_LB_').replace(/\]/g,'_RB_');
    const fromSafeKey = (key) => key.replace(/_DOT_/g,'.').replace(/_HASH_/g,'#').replace(/_DOLLAR_/g,'$').replace(/_SLASH_/g,'/').replace(/_LB_/g,'[').replace(/_RB_/g,']');

    const saveCustomStrings = async (newStrings) => {

    // ── 엑셀 날짜 변환 헬퍼 (숫자 일련번호 → YYYY-MM-DD) ──
    const parseExcelDate = (val) => {
        if (!val) return getTodayKST();
        // 숫자인 경우 (엑셀 일련번호: 복사·붙여넣기 시 발생)
        if (typeof val === 'number') {
            // 엑셀 날짜 기준: 1900-01-01 = 1 (윈도우 기준)
            const excelEpoch = new Date(1899, 11, 30); // 1899-12-30
            const d = new Date(excelEpoch.getTime() + val * 86400000);
            const y = d.getFullYear();
            const m = String(d.getMonth()+1).padStart(2,'0');
            const dd = String(d.getDate()).padStart(2,'0');
            return `${y}-${m}-${dd}`;
        }
        // 문자인 경우 그대로 사용
        const s = String(val).trim();
        // YYYY-MM-DD 형식이면 그대로
        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
        // YYYY/MM/DD 형식이면 변환
        if (/^\d{4}\/\d{2}\/\d{2}$/.test(s)) return s.replace(/\//g, '-');
        return s;
    };

    // ── 엑셀 불러오기 (모바일 호환 모달 사용) ──
    const handleImportExcel = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                const data = new Uint8Array(ev.target.result);
                // cellDates:false → 날짜를 숫자로 읽어서 직접 변환 (복사·붙여넣기 데이터 포함 처리)
                const wb = XLSX.read(data, { type: 'array', cellDates: false });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws, { raw: true });
                if (rows.length === 0) { showAlert('엑셀 파일에 데이터가 없습니다.'); return; }
                const firstRow = rows[0];
                if (!firstRow['날짜'] || !firstRow['고객명']) {
                    showAlert('엑셀 파일 형식이 맞지 않습니다.\n먼저 내보내기로 양식을 받아서 사용해 주세요.');
                    return;
                }

                // ── 중복 체크: 기존 데이터와 비교해서 중복 제거 ──
                const existingKeys = new Set(
                    records.map(r => `${r.date}|${r.name}|${r.racket}|${r.stringType}|${r.labor}`)
                );
                const uniqueRows = rows.filter(row => {
                    const dateStr = parseExcelDate(row['날짜']);
                    const key = `${dateStr}|${String(row['고객명']||'').trim()}|${String(row['라켓명']||'').trim()}|${String(row['스트링']||'').trim()}|${String(parseFloat(row['공임비'])||0)}`;
                    return !existingKeys.has(key);
                });
                const dupCount = rows.length - uniqueRows.length;

                setConfirmModal({
                    msg: dupCount > 0
                        ? `총 ${rows.length}건 중 중복 ${dupCount}건 제외\n${uniqueRows.length}건을 불러올까요?\n(기존 데이터에 추가됩니다)`
                        : `${rows.length}건을 불러올까요?\n(기존 데이터에 추가됩니다)`,
                    okLabel: '불러오기',
                    cancelLabel: '취소',
                    onOk: async () => {
                        setConfirmModal(null);
                        if (uniqueRows.length === 0) { showAlert('중복 데이터만 있어서 추가할 내용이 없습니다.'); return; }
                        try {
                            const ref = db.ref(dbPath(uid, sport, 'records'));
                            const batch = {};
                            uniqueRows.forEach((row, i) => {
                                const key = ref.push().key;
                                const sp = parseFloat(row['스트링가격'])||0;
                                const labor = parseFloat(row['공임비'])||0;
                                const qty = parseInt(row['수량'])||1;
                                const extra = parseFloat(row['추가작업금액'])||0;
                                const couponDiscount = parseFloat(row['쿠폰할인'])||0;
                                const total = row['최종금액'] ? (parseFloat(row['최종금액'])||0) : (sp+labor)*qty+extra-couponDiscount;
                                const extraNames = row['추가작업'] ? String(row['추가작업']).split(',').map(n=>n.trim()).filter(Boolean) : [];
                                const extraPrice = extraNames.length > 0 ? Math.round(extra/extraNames.length) : 0;
                                batch[key] = {
                                    fbKey:key, id:key,
                                    createdAt: Date.now()+i,
                                    date: parseExcelDate(row['날짜']),
                                    name: String(row['고객명']||'').trim(),
                                    phone: String(row['연락처']||'').trim(),
                                    racket: String(row['라켓명']||'').trim(),
                                    pattern: String(row['패턴']||config.patterns[0]).trim(),
                                    stringType: String(row['스트링']||'').trim(),
                                    stringPrice: String(sp),
                                    isHybrid: !!(row['하이브리드']),
                                    hybridString2: String(row['하이브리드']||'').trim(),
                                    hybridPrice2: String(row['하이브리드가격']||'').trim(),
                                    labor: String(labor),
                                    quantity: qty,
                                    tension: String(row['텐션']||'').trim(),
                                    extraWorks: extraNames.map(n=>({name:n, price:String(extraPrice)})),
                                    couponCode: String(row['쿠폰코드']||'').trim(),
                                    couponDiscount, total,
                                };
                            });
                            await ref.update(batch);
                            showAlert(`✅ ${uniqueRows.length}건을 성공적으로 불러왔습니다!${dupCount>0?' (중복 '+dupCount+'건 제외)':''}`);
                        } catch(err) {
                            showAlert('저장 오류: ' + err.message);
                        }
                    },
                });
            } catch(err) {
                showAlert('파일 읽기 오류: ' + err.message);
            }
        };
        reader.readAsArrayBuffer(file);
        e.target.value = '';
    };

    // ── 필터 헬퍼 ──────────────────────────────
    const getUniqueNames = (term) => {
        const t = (term !== undefined && term !== null) ? term : formData.name;
        return [...new Set(records.map(r=>r.name))].filter(n => matchChosung(n, t));
    };
    const getUniqueRackets = () => [...new Set(records.map(r=>r.racket))].filter(r=>r && matchChosung(r, formData.racket));
    const getFilteredStrings = (term) => Object.keys(stringPrices).filter(s=>matchChosung(s,term||'')).sort();

    // ── 통계 ───────────────────────────────────
    const getCustomerStats = () => {
        const map = {};
        records.forEach(r => {
            if (!map[r.name]) map[r.name] = {name:r.name, visits:[], totalAmount:0};
            map[r.name].visits.push(r);
            map[r.name].totalAmount += (r.total||0);
        });
        return Object.values(map).map(c => ({
            ...c, visitCount: c.visits.length,
            lastVisit: [...c.visits].sort((a,b)=>b.date.localeCompare(a.date))[0],
            yearlyVisits: c.visits.filter(v=>new Date(v.date)>=new Date(new Date().setFullYear(new Date().getFullYear()-1))).length,
        })).sort((a,b)=>b.lastVisit.date.localeCompare(a.lastVisit.date));
    };

    const getMonthlyStats = () => {
        const map = {};
        records.forEach(r => {
            const m = r.date.substring(0,7);
            if (!map[m]) map[m]={month:m, total:0, stringTotal:0, laborTotal:0, extraTotal:0, count:0, costTotal:0, productTotal:0, productCostTotal:0, productCount:0};
            map[m].total += (r.total||0); map[m].count++;
            const qty = parseInt(r.quantity)||1;
            let sp = parseFloat(r.stringPrice)||0;
            if (r.isHybrid && r.hybridPrice2) sp=(sp+(parseFloat(r.hybridPrice2)||0))/2;
            const hybrid = r.isHybrid?2000:0;
            map[m].stringTotal += (sp+hybrid)*qty;
            map[m].laborTotal += (parseFloat(r.labor)||0)*qty;
            map[m].extraTotal += (r.extraWorks||[]).reduce((s,w)=>s+(parseFloat(w.price)||0),0);
            const cost1 = stringCosts[r.stringType] || 0;
            const cost2 = r.isHybrid && r.hybridString2 ? (stringCosts[r.hybridString2] || 0) : 0;
            const isShopString = (parseFloat(r.stringPrice)||0) > 0;
            const svcCost = r.serviceType === 'grip900' ? 900
                          : r.serviceType === 'grip1400' ? 1400
                          : r.serviceType === 'grip' ? (isShopString ? 1400 : 900)
                          : r.serviceType === 'parking' ? 1000
                          : r.serviceType === 'custom' ? (parseFloat(r.serviceCustomAmount)||0) : 0;
            map[m].costTotal += (cost1 + cost2) * qty + svcCost;
        });
        // 용품 판매 통계 합산
        productSales.forEach(p => {
            const m = p.date.substring(0,7);
            if (!map[m]) map[m]={month:m, total:0, stringTotal:0, laborTotal:0, extraTotal:0, count:0, costTotal:0, productTotal:0, productCostTotal:0, productCount:0};
            map[m].productTotal += (p.total||0);
            map[m].productCostTotal += (p.totalCost||0);
            map[m].productCount += (parseInt(p.qty)||1);
        });
        return Object.values(map).map(s=>({...s,
            grandTotal: s.total + s.productTotal,
            profit: (s.total + s.productTotal) - (s.costTotal + s.productCostTotal)
        })).sort((a,b)=>b.month.localeCompare(a.month));
    };

    const getYearlyStats = () => {
        const map = {};
        records.forEach(r => {
            const y = r.date.substring(0,4);
            if (!map[y]) map[y]={year:y, total:0, stringTotal:0, laborTotal:0, extraTotal:0, count:0, months:new Set(), costTotal:0, productTotal:0, productCostTotal:0};
            map[y].total += (r.total||0); map[y].count++;
            map[y].months.add(r.date.substring(0,7));
            const qty = parseInt(r.quantity)||1;
            let sp = parseFloat(r.stringPrice)||0;
            if (r.isHybrid && r.hybridPrice2) sp=(sp+(parseFloat(r.hybridPrice2)||0))/2;
            const hybrid = r.isHybrid?2000:0;
            map[y].stringTotal += (sp+hybrid)*qty;
            map[y].laborTotal += (parseFloat(r.labor)||0)*qty;
            map[y].extraTotal += (r.extraWorks||[]).reduce((s,w)=>s+(parseFloat(w.price)||0),0);
            const cost1 = stringCosts[r.stringType] || 0;
            const cost2 = r.isHybrid && r.hybridString2 ? (stringCosts[r.hybridString2] || 0) : 0;
            const isShopStringY = (parseFloat(r.stringPrice)||0) > 0;
            const svcCostY = r.serviceType === 'grip900' ? 900
                           : r.serviceType === 'grip1400' ? 1400
                           : r.serviceType === 'grip' ? (isShopStringY ? 1400 : 900)
                           : r.serviceType === 'parking' ? 1000
                           : r.serviceType === 'custom' ? (parseFloat(r.serviceCustomAmount)||0) : 0;
            map[y].costTotal += (cost1 + cost2) * qty + svcCostY;
        });
        productSales.forEach(p => {
            const y = p.date.substring(0,4);
            if (!map[y]) map[y]={year:y, total:0, stringTotal:0, laborTotal:0, extraTotal:0, count:0, months:new Set(), costTotal:0, productTotal:0, productCostTotal:0};
            map[y].productTotal += (p.total||0);
            map[y].productCostTotal += (p.totalCost||0);
        });
        return Object.values(map).map(s=>({...s,
            monthCount:s.months.size,
            grandTotal: s.total + s.productTotal,
            profit: (s.total + s.productTotal) - (s.costTotal + s.productCostTotal)
        })).sort((a,b)=>b.year.localeCompare(a.year));
    };

    const sortedRecords = [...records].sort((a,b)=>{ if(b.date!==a.date) return b.date.localeCompare(a.date); return (b.createdAt||0)-(a.createdAt||0); });
    const displayRecords = searchTerm ? sortedRecords.filter(r=>matchChosung(r.name, searchTerm)) : sortedRecords;

    // ── 색상 클래스 ─────────────────────────────
    const activeBtnClass = color==='green'?'bg-green-500 text-white':'bg-blue-500 text-white';
    const ringClass = color==='green'?'focus:ring-green-500':'focus:ring-blue-500';
    const hoverBgClass = color==='green'?'hover:bg-green-50':'hover:bg-blue-50';
    const statColor = color==='green'?'text-green-600':'text-blue-600';

    // ── 스트링 드롭다운 컴포넌트 ────────────────
    const StringDropdown = ({ strings, onSelect }) => (
        <div className="dropdown-list" onMouseDown={e=>e.preventDefault()}>
            {strings.map(s=>(
                <button key={s} type="button" onClick={()=>onSelect(s)} className="dropdown-item"
                    style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span>{s}</span>
                    <span style={{fontSize:'11px',color:'#9E9E9E',fontWeight:600}}>{(stringPrices[s]||0).toLocaleString()}원</span>
                </button>
            ))}
            <div style={{padding:'6px',borderTop:'1px solid #F0F0F0'}}>
                <button type="button" onMouseDown={e=>e.preventDefault()}
                    onClick={()=>{ setShowStringDropdown(false); setShowHybridDropdown(false); setShowAddModal(true); }}
                    style={{width:'100%',padding:'9px',background:'#FFFBEB',color:'#B45309',borderRadius:'8px',border:'none',fontSize:'12px',fontWeight:700,cursor:'pointer'}}>
                    ➕ 새 스트링 추가
                </button>
            </div>
        </div>
    );

    // ── 로딩 화면 ───────────────────────────────
    if (dbLoading) return (
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'80px 20px'}}>
            <div className="spinner" style={{marginBottom:'16px'}}></div>
            <p style={{color:'#9E9E9E',fontSize:'13px',fontWeight:600}}>데이터 불러오는 중...</p>
        </div>
    );

    return (
        <div style={{maxWidth:'640px',margin:'0 auto'}}>
            {/* ── 확인/알림 모달 ── */}
            {/* ── 관리자 PIN 모달 ── */}
            {showAdminModal && (
                <div className="modal-overlay">
                    <div className="modal-card">
                        <div className="modal-title">🔐 관리자 확인</div>
                        <p style={{fontSize:'13px',color:'#9E9E9E',textAlign:'center',marginBottom:'14px'}}>원가 정보는 관리자만 볼 수 있어요<br/>PIN 번호를 입력해주세요</p>
                        <input
                            type="password"
                            inputMode="numeric"
                            maxLength={8}
                            value={adminPinInput}
                            onChange={e=>setAdminPinInput(e.target.value)}
                            onKeyDown={e=>{if(e.key==='Enter') handleAdminUnlock();}}
                            placeholder="PIN 번호 입력"
                            autoFocus
                            className="form-input"
                            style={{textAlign:'center',fontSize:'20px',letterSpacing:'6px',marginBottom:'8px'}}
                        />
                        {adminPinError && <p style={{color:'#DC2626',fontSize:'12px',textAlign:'center',marginBottom:'8px',fontWeight:700}}>{adminPinError}</p>}
                        <div className="modal-btn-row">
                            <button onClick={()=>{setShowAdminModal(false);setAdminPinInput('');setAdminPinError('');}} className="modal-btn-cancel">취소</button>
                            <button onClick={handleAdminUnlock} style={{flex:1,padding:'13px',background:'#111',color:'#fff',border:'none',borderRadius:'13px',fontWeight:800,fontSize:'14px',cursor:'pointer'}}>✅ 확인</button>
                        </div>
                    </div>
                </div>
            )}

            {confirmModal && (
                <div className="modal-overlay">
                    <div className="modal-card">
                        <p style={{fontSize:'15px',fontWeight:700,color:'#111',textAlign:'center',marginBottom:'20px',whiteSpace:'pre-line'}}>{confirmModal.msg}</p>
                        <div className="modal-btn-row">
                            {confirmModal.cancelLabel !== null && confirmModal.cancelLabel !== undefined && (
                                <button onClick={()=>setConfirmModal(null)} className="modal-btn-cancel">{confirmModal.cancelLabel||'취소'}</button>
                            )}
                            <button onClick={confirmModal.onOk}
                                className={`modal-btn-ok ${confirmModal.okLabel==='삭제'?'modal-btn-ok-red':''} ${(confirmModal.cancelLabel===null||confirmModal.cancelLabel===undefined)?'modal-btn-ok-only':''}`}>
                                {confirmModal.okLabel||'확인'}
                            </button>
                        </div>
                    </div>
                </div>
            )}

            {/* ── 교체주기 설정 모달 ── */}
            {showCycleModal && (
                <div className="modal-overlay">
                    <div className="modal-card">
                        <div className="modal-title">⏱️ 교체주기 설정</div>
                        <p style={{fontSize:'13px',color:'#616161',marginBottom:'12px',fontWeight:600}}>
                            <span style={{fontWeight:800,color:'#111'}}>{showCycleModal}</span>님의 개별 교체주기를 입력하세요.<br/>
                            <span style={{fontSize:'11px',color:'#9E9E9E'}}>비워두면 기본값(60일)이 사용돼요.</span>
                        </p>
                        <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'10px'}}>
                            <input type="number" value={cycleInput} onChange={e=>setCycleInput(e.target.value)}
                                placeholder="예) 45"
                                className="modal-input" style={{marginBottom:0,flex:1}}
                                autoFocus/>
                            <span style={{fontSize:'14px',fontWeight:700,color:'#555',flexShrink:0}}>일</span>
                        </div>
                        <div style={{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'12px'}}>
                            {[30,45,60,90].map(d=>(
                                <button key={d} type="button" onClick={()=>setCycleInput(String(d))}
                                    style={{padding:'5px 14px',background:cycleInput===String(d)?'#22C55E':'#F0F0F0',color:cycleInput===String(d)?'#fff':'#555',borderRadius:'20px',border:'none',fontSize:'12px',fontWeight:700,cursor:'pointer'}}>
                                    {d}일
                                </button>
                            ))}
                        </div>
                        <div className="modal-btn-row">
                            <button onClick={()=>setShowCycleModal(null)} className="modal-btn-cancel">취소</button>
                            {customerCycles[showCycleModal] && (
                                <button onClick={async()=>{await saveCustomerCycle(showCycleModal,null);setShowCycleModal(null);}}
                                    style={{flex:1,padding:'13px',borderRadius:'13px',background:'#FEE2E2',color:'#DC2626',fontSize:'14px',fontWeight:700,border:'none',cursor:'pointer'}}>기본값</button>
                            )}
                            <button onClick={async()=>{
                                if(!cycleInput||isNaN(parseInt(cycleInput))||parseInt(cycleInput)<1){showAlert('1 이상의 숫자를 입력하세요.');return;}
                                await saveCustomerCycle(showCycleModal, cycleInput);
                                setShowCycleModal(null);
                            }} className="modal-btn-ok">저장</button>
                        </div>
                    </div>
                </div>
            )}

            {/* ── 추가작업 항목 모달 ── */}
            {showAddExtraItemModal && (
                <div className="modal-overlay">
                    <div className="modal-card">
                        <div className="modal-title">🛠️ 새 항목 저장</div>
                        <input type="text" value={newExtraItemName} onChange={e=>setNewExtraItemName(e.target.value)} placeholder="예) 스텐실 작업" className="modal-input" autoFocus/>
                        <input type="number" value={newExtraItemPrice} onChange={e=>setNewExtraItemPrice(e.target.value)} placeholder="기본 가격 (선택)" className="modal-input"/>
                        <div className="modal-btn-row">
                            <button onClick={()=>{setShowAddExtraItemModal(false);setNewExtraItemName('');setNewExtraItemPrice('');}} className="modal-btn-cancel">취소</button>
                            <button onClick={async ()=>{
                                if(!newExtraItemName.trim()) return;
                                await saveExtraItems([...savedExtraItems, {name:newExtraItemName.trim(), price:newExtraItemPrice}]);
                                setShowAddExtraItemModal(false); setNewExtraItemName(''); setNewExtraItemPrice('');
                            }} className="modal-btn-ok">저장</button>
                        </div>
                    </div>
                </div>
            )}

            {/* ── 스트링 추가 모달 ── */}
            {showAddModal && (
                <div className="modal-overlay">
                    <div className="modal-card">
                        <div className="modal-title">➕ 새 스트링 추가</div>
                        <input type="text" value={modalStringName} onChange={e=>setModalStringName(e.target.value)} placeholder="예) 요넥스 폴리투어스핀" className="modal-input" autoFocus/>
                        <input type="number" value={modalStringPrice} onChange={e=>setModalStringPrice(e.target.value)} placeholder="예) 13000" className="modal-input"/>
                        <div className="modal-btn-row">
                            <button onClick={()=>{setShowAddModal(false);setModalStringName('');setModalStringPrice('');}} className="modal-btn-cancel">취소</button>
                            <button onClick={handleAddModal} className="modal-btn-ok">추가</button>
                        </div>
                    </div>
                </div>
            )}

            {/* ── 저장 상태 토스트 ── */}
            {saveStatus && (
                <div className={`toast ${saveStatus==='saving'?'toast-saving':saveStatus==='saved'?'toast-saved':'toast-error'}`}>
                    {saveStatus==='saving'?'⏳ 저장 중...':saveStatus==='saved'?'✅ 저장 완료':'❌ 저장 실패'}
                </div>
            )}

            {/* ── 오늘 요약 배너 (프리미엄) ── */}
            {viewMode==='customers' && (
                <div className="today-banner">
                    <div className="today-banner-inner">
                        <div className="today-top-row">
                            <div>
                                <div className="today-greeting">✦ NIJI STRING PRO</div>
                                <div className="today-date-label">{(()=>{const d=new Date();const days=['일','월','화','수','목','금','토'];return `${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;})()}</div>
                            </div>
                        </div>
                        <div className="today-stats">
                            <div className="today-stat-item">
                                <div className="today-stat-label">오늘 작업</div>
                                <div className="today-stat-val">{records.filter(r=>r.date===getTodayKST()).length}<span className="today-stat-unit">건</span></div>
                            </div>
                            <div className="today-stat-item">
                                <div className="today-stat-label">오늘 매출</div>
                                <div className="today-stat-val green">{records.filter(r=>r.date===getTodayKST()).reduce((s,r)=>s+(r.total||0),0).toLocaleString()}<span className="today-stat-unit">원</span></div>
                            </div>
                            <div className="today-stat-item">
                                <div className="today-stat-label">최근 방문</div>
                                <div className="today-stat-recent">{(()=>{ const s=[...records].sort((a,b)=>b.date.localeCompare(a.date)); return s.length>0?s[0].name:'—'; })()}</div>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {/* ── 통계 서브탭 (월별/연도별) ── */}
            {(viewMode==='monthly'||viewMode==='yearly') && (
                <div className="stat-subtab-row">
                    <button onClick={()=>setViewMode('monthly')} className={`stat-subtab ${viewMode==='monthly'?'active-orange':''}`}>📅 월별 매출</button>
                    <button onClick={()=>setViewMode('yearly')} className={`stat-subtab ${viewMode==='yearly'?'active-purple':''}`}>📈 연도별 매출</button>
                </div>
            )}

            {/* ── 검색 + 버튼 ── */}
            {viewMode==='customers' && (
                <div style={{padding:'0 12px 4px'}}>
                    {/* 교체알림 고객 DM 배너 */}
                    {(()=>{
                        // DM 아직 안 보낸 교체알림 고객만 필터
                        const alertCustomers = getCustomerStats().filter(c => {
                            const daysSince = c.lastVisit ? Math.floor((new Date()-new Date(c.lastVisit.date))/(1000*60*60*24)) : 0;
                            const cycle = getCustomerCycle(c.name);
                            return daysSince >= cycle && c.lastVisit?.phone && !isDmSent(c.name);
                        });
                        // DM 발송 완료 고객 (오늘 발송)
                        const sentToday = getCustomerStats().filter(c => {
                            const daysSince = c.lastVisit ? Math.floor((new Date()-new Date(c.lastVisit.date))/(1000*60*60*24)) : 0;
                            const cycle = getCustomerCycle(c.name);
                            return daysSince >= cycle && c.lastVisit?.phone && isDmSent(c.name) === getTodayKST();
                        });

                        if (alertCustomers.length === 0 && sentToday.length === 0) return null;

                        const dmMsgFor = (name) => `안녕하세요 ${name}님 😊\n니지스트링입니다!\n\n스트링 교체 시기가 지나셨어요 🎾\n오래된 스트링은 컨트롤이 떨어지고 부상 위험이 있어요!\n\n교체 예약 편하게 연락주세요 😊\n감사합니다!`;

                        return (
                            <div style={{background:'linear-gradient(135deg,#FFF7ED,#FEF3C7)',border:'1.5px solid #FCD34D',borderRadius:'14px',padding:'12px 14px',marginBottom:'10px'}}>
                                {/* 헤더 */}
                                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}}>
                                    <div>
                                        <span style={{fontSize:'13px',fontWeight:800,color:'#92400E'}}>🔔 교체알림</span>
                                        {alertCustomers.length > 0 && <span style={{fontSize:'12px',fontWeight:800,color:'#DC2626',marginLeft:'6px',background:'#FEE2E2',padding:'1px 8px',borderRadius:'20px'}}>{alertCustomers.length}명 미발송</span>}
                                        {sentToday.length > 0 && <span style={{fontSize:'12px',fontWeight:800,color:'#16A34A',marginLeft:'4px',background:'#DCFCE7',padding:'1px 8px',borderRadius:'20px'}}>오늘 {sentToday.length}명 발송 ✅</span>}
                                    </div>
                                    {alertCustomers.length > 0 && (
                                        <button onClick={async ()=>{
                                            const lines = alertCustomers.map(c=>`  • ${c.name} (${c.lastVisit?.phone})`).join('\n');
                                            const msg = `안녕하세요 😊 니지스트링입니다!\n\n스트링 교체 시기가 지나셨어요 🎾\n오래된 스트링은 컨트롤이 떨어지고 부상 위험이 있어요!\n\n빠른 예약 받고 있으니 편하게 연락주세요 😊\n감사합니다!\n\n[대상고객]\n${lines}`;
                                            try {
                                                await navigator.clipboard.writeText(msg);
                                                // 전체 발송 처리
                                                for (const c of alertCustomers) { await saveDmSent(c.name); }
                                                showAlert(`✅ ${alertCustomers.length}명 메시지 복사 완료!\n카카오톡에 붙여넣기 하세요 😊\n배너에서 제거됩니다.`);
                                            } catch(e) { showAlert('복사 실패'); }
                                        }} style={{padding:'6px 12px',background:'#F59E0B',color:'#fff',border:'none',borderRadius:'10px',fontSize:'11px',fontWeight:800,cursor:'pointer',whiteSpace:'nowrap'}}>
                                            📋 전체복사
                                        </button>
                                    )}
                                </div>

                                {/* 미발송 고객 */}
                                {alertCustomers.length > 0 && (
                                    <div style={{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom: sentToday.length>0 ? '8px' : '0'}}>
                                        {alertCustomers.map(c=>(
                                            <div key={c.name} style={{background:'#fff',borderRadius:'8px',padding:'5px 10px',border:'1px solid #FDE68A',display:'flex',alignItems:'center',gap:'5px'}}>
                                                <span style={{fontSize:'12px',fontWeight:700,color:'#92400E'}}>{c.name}</span>
                                                <a href={`sms:${c.lastVisit.phone}?body=${encodeURIComponent(dmMsgFor(c.name))}`}
                                                    onClick={()=>setTimeout(()=>saveDmSent(c.name), 1500)}
                                                    style={{fontSize:'10px',background:'#16A34A',color:'#fff',padding:'2px 8px',borderRadius:'6px',textDecoration:'none',fontWeight:800}}>💬 문자</a>
                                                <button onClick={async ()=>{
                                                    try {
                                                        await navigator.clipboard.writeText(dmMsgFor(c.name));
                                                        await saveDmSent(c.name);
                                                        showAlert(`✅ ${c.name}님 카톡 메시지 복사!\n카카오톡에 붙여넣기 하세요 😊`);
                                                    } catch(e) { showAlert('복사 실패'); }
                                                }} style={{fontSize:'10px',background:'#FEE500',color:'#111',padding:'2px 8px',borderRadius:'6px',border:'none',fontWeight:800,cursor:'pointer'}}>💛 카톡</button>
                                            </div>
                                        ))}

                                    <div style={{flex:1,padding:'10px 12px',borderRight:'1px solid rgba(255,255,255,0.06)'}}>
                                        <div style={{fontSize:'10px',color:'#666',marginBottom:'3px',fontWeight:700}}>판매건수</div>
                                        <div style={{fontSize:'20px',fontWeight:900,color:'#fff'}}>{thisMonthSales.length}<span style={{fontSize:'11px',color:'#555',marginLeft:'2px'}}>건</span></div>
                                    </div>
                                    <div style={{flex:1,padding:'10px 12px',borderRight:adminUnlocked?'1px solid rgba(255,255,255,0.06)':'none'}}>
                                        <div style={{fontSize:'10px',color:'#666',marginBottom:'3px',fontWeight:700}}>매출</div>
                                        <div style={{fontSize:'18px',fontWeight:900,color:'#4ade80'}}>{thisMonthTotal.toLocaleString()}<span style={{fontSize:'11px',color:'#555',marginLeft:'2px'}}>원</span></div>
                                    </div>
                                    {adminUnlocked && (
                                        <div style={{flex:1,padding:'10px 12px'}}>
                                            <div style={{fontSize:'10px',color:'#666',marginBottom:'3px',fontWeight:700}}>🔒 마진</div>
                                            <div style={{fontSize:'18px',fontWeight:900,color:'#34d399'}}>{thisMonthProfit.toLocaleString()}<span style={{fontSize:'11px',color:'#555',marginLeft:'2px'}}>원</span></div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        );
                    })()}

                    {/* 판매 기록 목록 */}
                    <div className="stat-card" style={{marginBottom:'12px'}}>
                        <div className="section-header">
                            <span className="section-title">🛒 판매 기록</span>
                            <span className="section-count">{productSales.length}건</span>
                        </div>
                        {productSales.length===0 && <div className="empty-state"><div className="empty-state-icon">🛒</div>판매 기록이 없습니다.<br/>위 버튼으로 판매를 등록해주세요!</div>}
                        {productSales.map(p=>(
                            <div key={p.fbKey} style={{padding:'12px 16px',borderBottom:'1px solid #F5F5F5',display:'flex',alignItems:'center',gap:'10px'}}>
                                <div style={{flex:1}}>
                                    <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'3px'}}>
                                        <span style={{fontSize:'14px',fontWeight:800,color:'#111'}}>{p.productName}</span>
                                        {p.qty>1 && <span style={{fontSize:'11px',background:'#F3F4F6',color:'#6B7280',padding:'1px 7px',borderRadius:'20px',fontWeight:700}}>×{p.qty}</span>}
                                    </div>
                                    <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                                        <span style={{fontSize:'11px',color:'#9E9E9E',fontWeight:600}}>{p.date}</span>
                                        {p.memo && <span style={{fontSize:'11px',color:'#6B7280'}}>{p.memo}</span>}
                                    </div>
                                    <div style={{display:'flex',gap:'10px',marginTop:'4px',alignItems:'center'}}>
                                        <span style={{fontSize:'13px',fontWeight:800,color:'#0F766E'}}>{(p.total||0).toLocaleString()}원</span>
                                        {adminUnlocked && (p.totalCost||0)>0 && <span style={{fontSize:'11px',color:'#9E9E9E',fontWeight:600}}>🔒 원가 {(p.totalCost||0).toLocaleString()}원</span>}
                                        {adminUnlocked && (p.totalCost||0)>0 && <span style={{fontSize:'11px',fontWeight:700,color:'#16A34A'}}>마진 {((p.total||0)-(p.totalCost||0)).toLocaleString()}원</span>}
                                    </div>
                                </div>
                                <div style={{display:'flex',gap:'4px'}}>
                                    <button onClick={()=>{setEditingProductSaleKey(p.fbKey);setProductSaleForm({date:p.date,productName:p.productName,salePrice:String(p.salePrice||''),costPrice:String(p.costPrice||''),qty:p.qty||1,memo:p.memo||'',fbKey:p.fbKey});setShowProductSaleForm(true);}}
                                        style={{width:'34px',height:'34px',borderRadius:'10px',background:'#EFF6FF',color:'#2563EB',border:'none',cursor:'pointer',fontSize:'14px',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>✏️</button>
                                    <button onClick={()=>setConfirmModal({msg:`'${p.productName}' 판매기록을 삭제할까요?`,onOk:async()=>{await deleteProductSale(p.fbKey);setConfirmModal(null);},okLabel:'삭제',cancelLabel:'취소'})}
                                        style={{width:'34px',height:'34px',borderRadius:'10px',background:'#FEF2F2',color:'#DC2626',border:'none',cursor:'pointer',fontSize:'14px',display:'flex',alignItems:'center',justifyContent:'center'}}>🗑️</button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* 용품 카탈로그 */}
                    <div className="stat-card">
                        <div className="section-header">
                            <span className="section-title">📦 용품 카탈로그</span>
                            <button onClick={()=>{setShowProductItemForm(true);setProductItemForm({name:'',salePrice:'',costPrice:'',});}}
                                style={{fontSize:'11px',padding:'4px 12px',background:'#0D9488',color:'#fff',border:'none',borderRadius:'20px',cursor:'pointer',fontWeight:700}}>+ 추가</button>
                        </div>

                        {showProductItemForm && (
                            <div style={{padding:'14px 16px',background:'#F0FDFA',borderBottom:'1px solid #CCFBF1'}}>
                                <input type="text" value={productItemForm.name} onChange={e=>setProductItemForm(prev=>({...prev,name:e.target.value}))} placeholder="용품명 (예: 오버그립)" className="form-input" style={{marginBottom:'8px'}}/>
                                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'8px'}}>
                                    <input type="number" value={productItemForm.salePrice} onChange={e=>setProductItemForm(prev=>({...prev,salePrice:e.target.value}))} placeholder="판매가" className="form-input" style={{marginBottom:0}}/>
                                    <input type="number" value={productItemForm.costPrice} onChange={e=>setProductItemForm(prev=>({...prev,costPrice:e.target.value}))} placeholder="원가" className="form-input" style={{marginBottom:0}}/>
                                </div>
                                <div style={{display:'flex',gap:'8px'}}>
                                    <button onClick={()=>setShowProductItemForm(false)} style={{flex:1,padding:'9px',background:'#E5E7EB',color:'#6B7280',borderRadius:'10px',border:'none',fontWeight:700,fontSize:'13px',cursor:'pointer'}}>취소</button>
                                    <button onClick={handleProductItemAdd} style={{flex:2,padding:'9px',background:'#0D9488',color:'#fff',borderRadius:'10px',border:'none',fontWeight:800,fontSize:'13px',cursor:'pointer'}}>저장</button>
                                </div>
                            </div>
                        )}

                        {productItems.length===0 && !showProductItemForm && <div className="empty-state" style={{padding:'24px 20px'}}><div style={{fontSize:'36px',marginBottom:'8px'}}>📦</div>등록된 용품이 없습니다.<br/>자주 판매하는 용품을 등록하면 빠르게 입력할 수 있어요!</div>}
                        {productItems.map((p,i)=>(
                            <div key={i} style={{display:'flex',alignItems:'center',padding:'11px 16px',borderBottom:'1px solid #F5F5F5',gap:'10px'}}>
                                <div style={{flex:1}}>
                                    <div style={{fontSize:'13px',fontWeight:800,color:'#111',marginBottom:'2px'}}>{p.name}</div>
                                    <div style={{fontSize:'11px',color:'#9E9E9E',fontWeight:600}}>
                                        판매 {(p.salePrice||0).toLocaleString()}원
                                        {adminUnlocked && <span> · 🔒 원가 {(p.costPrice||0).toLocaleString()}원</span>}
                                        {adminUnlocked && (p.salePrice||0)>0 && (p.costPrice||0)>0 && <span style={{color:'#16A34A',marginLeft:'6px',fontWeight:700}}>마진 {((p.salePrice||0)-(p.costPrice||0)).toLocaleString()}원</span>}
                                    </div>
                                </div>
                                <button onClick={()=>handleProductItemDelete(i)} style={{width:'30px',height:'30px',borderRadius:'8px',background:'#FEF2F2',color:'#DC2626',border:'none',cursor:'pointer',fontSize:'14px',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                            </div>
                        ))}
                    </div>
                </div>
            )}

            {/* ══ 하단 고정 메뉴바 ══ */}
            <div className="bottom-nav">
                {/* 고객관리 */}
                <button className={`nav-item ${viewMode==='customers'&&!showForm?'active':''}`}
                    onClick={()=>{setViewMode('customers');setShowForm(false);setSearchTerm('');}}>
                    <div className="nav-icon">🏠</div>
                    <span className="nav-label">고객관리</span>
                </button>
                {/* 매출통계 */}
                <button className="nav-item"
                    onClick={()=>{setViewMode('monthly');setShowForm(false);}}>
                    <div className="nav-icon" style={(viewMode==='monthly'||viewMode==='yearly')?{background:'linear-gradient(135deg,#C2410C,#EA580C)',boxShadow:'0 4px 12px rgba(234,88,12,0.4)'}:{}}>📊</div>
                    <span className="nav-label" style={(viewMode==='monthly'||viewMode==='yearly')?{color:'#EA580C'}:{}}>매출통계</span>
                </button>
                {/* 용품판매 */}
                <button className={`nav-item ${viewMode==='products'?'active-teal':''}`}
                    onClick={()=>{setViewMode('products');setShowForm(false);}}>
                    <div className="nav-icon" style={viewMode==='products'?{background:'linear-gradient(135deg,#0F766E,#0D9488)',boxShadow:'0 4px 12px rgba(13,148,136,0.4)'}:{}}>🛒</div>
                    <span className="nav-label" style={viewMode==='products'?{color:'#0F766E'}:{}}>용품판매</span>
                </button>
                {/* 쿠폰 */}
                <button className={`nav-item ${viewMode==='coupons'?'active-pink':''}`}
                    onClick={()=>{setViewMode('coupons');setShowForm(false);}}>
                    <div className="nav-icon" style={viewMode==='coupons'?{background:'linear-gradient(135deg,#be185d,#EC4899)',boxShadow:'0 4px 12px rgba(236,72,153,0.4)'}:{}}>🎫</div>
                    <span className="nav-label" style={viewMode==='coupons'?{color:'#be185d'}:{}}>쿠폰</span>
                </button>
                {/* 설정 */}
                <button className={`nav-item ${viewMode==='settings'?'active-yellow':''}`}
                    onClick={()=>{setViewMode('settings');setShowForm(false);}}>
                    <div className="nav-icon" style={viewMode==='settings'?{background:'linear-gradient(135deg,#0F766E,#0D9488)',boxShadow:'0 4px 12px rgba(13,148,136,0.4)'}:{}}>⚙️</div>
                    <span className="nav-label" style={viewMode==='settings'?{color:'#0F766E'}:{}}>설정</span>
                </button>
            </div>
        </div>
    );
};

// ══════════════════════════════════════════════
// 🏆 최상위 앱
// ══════════════════════════════════════════════
const App = () => {
    const [user, setUser] = useState(null);
    const [authLoading, setAuthLoading] = useState(true);
    const [sport, setSport] = useState('tennis');

    useEffect(() => {
        const unsub = auth.onAuthStateChanged(u => {
            setUser(u);
            setAuthLoading(false);
        });
        return () => unsub();
    }, []);

    const handleLogout = async () => {
        await auth.signOut();
    };

    if (authLoading) return (
        <div style={{minHeight:'100vh',background:'#111',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{textAlign:'center'}}>
                <div className="spinner" style={{margin:'0 auto 16px'}}></div>
                <p style={{color:'#616161',fontSize:'13px',fontWeight:600}}>로딩 중...</p>
            </div>
        </div>
    );

    if (!user) return <LoginScreen />;

    return (
        <div style={{minHeight:'100vh',background:'#F5F5F5'}}>
            <div className="app-header">
                <div className="header-top">
                    <div className="header-brand">
                        <div className="header-logo">N</div>
                        <div>
                            <div className="header-title">NIJI STRING PRO</div>
                            <div className="header-subtitle">{user.email}</div>
                        </div>
                    </div>
                    <button onClick={handleLogout} className="logout-btn">로그아웃</button>
                </div>
                <div className="sport-tabs">
                    <button onClick={()=>setSport('tennis')} className={`sport-tab ${sport==='tennis'?'active-green':''}`}>🎾 테니스</button>
                    <button onClick={()=>setSport('badminton')} className={`sport-tab ${sport==='badminton'?'active-blue':''}`}>🏸 배드민턴</button>
                </div>
            </div>
            <StringingApp key={`${user.uid}-${sport}`} sport={sport} uid={user.uid} />
        </div>
    );
};

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
