<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>니지스트링 작업 관리</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>

    <script src="firebase.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ── 유틸리티 함수 (검색, 날짜 등) ──
        const getChosung = (str) => {
            const list = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
            return [...str].map(c => {
                const code = c.charCodeAt(0) - 44032;
                return (code > -1 && code < 11172) ? list[Math.floor(code/588)] : c;
            }).join('');
        };

        const matchChosung = (str, search) => {
            if (!search) return true;
            const s = search.toLowerCase();
            return str.toLowerCase().includes(s) || getChosung(str).includes(s);
        };

        const getTodayKST = () => {
            const now = new Date();
            const kst = new Date(now.getTime() + (9 * 60 * 60 * 1000));
            return kst.toISOString().split('T')[0];
        };

        // ── 메인 앱 컴포넌트 ──
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [sport, setSport] = useState('tennis');

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return unsubscribe;
            }, []);

            const handleLogout = () => auth.signOut();

            if (loading) return (
                <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#fff'}}>
                    <div style={{textAlign:'center'}}>
                        <div className="spinner" style={{margin:'0 auto 16px'}}></div>
                        <p style={{color:'#616161',fontSize:'13px',fontWeight:600}}>로딩 중...</p>
                    </div>
                </div>
            );

            if (!user) return <LoginScreen />;

            return (
                <div style={{minHeight:'100vh',background:'#F5F5F5'}}>
                    <div className="app-header">
                        <div className="header-top">
                            <div className="header-brand">
                                <div className="header-logo">N</div>
                                <div>
                                    <div className="header-title">NIJI STRING PRO</div>
                                    <div className="header-subtitle">{user.email}</div>
                                </div>
                            </div>
                            <button onClick={handleLogout} className="logout-btn">로그아웃</button>
                        </div>
                        <div className="sport-tabs">
                            <button onClick={()=>setSport('tennis')} className={`sport-tab ${sport==='tennis'?'active-green':''}`}>🎾 테니스</button>
                            <button onClick={()=>setSport('badminton')} className={`sport-tab ${sport==='badminton'?'active-blue':''}`}>🏸 배드민턴</button>
                        </div>
                    </div>
                    <StringingApp key={`${user.uid}-${sport}`} sport={sport} uid={user.uid} />
                </div>
            );
        };

        // ── 로그인 화면 ──
        const LoginScreen = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                auth.signInWithEmailAndPassword(email, password).catch(err => alert('로그인 실패: ' + err.message));
            };

            return (
                <div className="login-screen">
                    <div className="login-card">
                        <div className="login-logo">N</div>
                        <h1 style={{color:'#fff',textAlign:'center',fontSize:'20px',fontWeight:900,marginBottom:'24px',letterSpacing:'1px'}}>NIJI STRING</h1>
                        <form onSubmit={handleLogin}>
                            <input className="login-input" type="email" placeholder="이메일 주소" value={email} onChange={e=>setEmail(e.target.value)} required />
                            <input className="login-input" type="password" placeholder="비밀번호" value={password} onChange={e=>setPassword(e.target.value)} required />
                            <button type="submit" className="login-btn">로그인</button>
                        </form>
                    </div>
                </div>
            );
        };

        // ── 고객 리스트 및 기능 ──
        const StringingApp = ({ sport, uid }) => {
            const [customers, setCustomers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState('');
            const [view, setView] = useState('list');
            const [currentData, setCurrentData] = useState(null);
            const [toast, setToast] = useState(null);

            const refPath = `users/${uid}/customers/${sport}`;

            useEffect(() => {
                const cRef = db.ref(refPath);
                cRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    const list = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
                    setCustomers(list.sort((a,b) => new Date(b.date) - new Date(a.date)));
                    setLoading(false);
                });
                return () => cRef.off();
            }, [refPath]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 2000);
            };

            const handleSave = (formData) => {
                if (view === 'add') {
                    db.ref(refPath).push({ ...formData, createdAt: Date.now() });
                    showToast('성공적으로 등록되었습니다');
                } else {
                    db.ref(`${refPath}/${currentData.id}`).update(formData);
                    showToast('수정되었습니다');
                }
                setView('list');
            };

            const handleDelete = (id) => {
                if (confirm('정말 삭제하시겠습니까?')) {
                    db.ref(`${refPath}/${id}`).remove();
                    showToast('삭제되었습니다');
                }
            };

            const filtered = customers.filter(c => matchChosung(c.name, search) || matchChosung(c.phone || '', search));
            const todayCount = customers.filter(c => c.date === getTodayKST()).length;

            if (loading) return <div className="p-10 text-center text-gray-400">데이터 불러오는 중...</div>;

            return (
                <div className="max-w-md mx-auto">
                    {toast && <div className="toast toast-saved">{toast}</div>}
                    
                    {view === 'list' && (
                        <>
                            <div className="px-4 py-4">
                                <div className="today-summary-card">
                                    <div className="summary-stat">
                                        <div className="summary-stat-val accent">{todayCount}</div>
                                        <div className="summary-stat-label">TODAY</div>
                                    </div>
                                    <div className="summary-stat">
                                        <div className="summary-stat-val">{customers.length}</div>
                                        <div className="summary-stat-label">TOTAL</div>
                                    </div>
                                    <div className="summary-stat">
                                        <div className="summary-stat-val accent">NEW</div>
                                        <div className="summary-stat-label">STATUS</div>
                                    </div>
                                </div>
                            </div>

                            <div className="search-row">
                                <input className="search-input" placeholder="이름 또는 전화번호 검색..." value={search} onChange={e=>setSearch(e.target.value)} />
                                <button onClick={()=>setView('add')} className={`add-btn ${sport==='tennis'?'add-btn-green':'add-btn-blue'}`}>등록</button>
                            </div>

                            <div className="content-pad">
                                {filtered.map(c => (
                                    <div key={c.id} className="customer-card">
                                        <div className={`customer-card-header ${sport==='tennis'?'green':'blue'}`}>
                                            <span className="customer-name">{c.name} {c.phone && <small style={{fontWeight:400, opacity:0.8}}>( {c.phone} )</small>}</span>
                                            <div style={{display:'flex',gap:'6px'}}>
                                                <button onClick={()=>{setCurrentData(c); setView('edit');}} className="card-action-btn">✏️</button>
                                                <button onClick={()=>handleDelete(c.id)} className="card-action-btn">🗑️</button>
                                            </div>
                                        </div>
                                        <div style={{padding:'14px 16px', fontSize:'13px', lineHeight:'1.6'}}>
                                            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px'}}>
                                                <div>📅 <b>날짜:</b> {c.date}</div>
                                                <div>🏸 <b>라켓:</b> {c.racket}</div>
                                                <div>🧵 <b>스트링:</b> {c.string}</div>
                                                <div>⚡ <b>텐션:</b> {c.tension}</div>
                                            </div>
                                            {c.memo && <div style={{marginTop:'8px', padding:'8px', background:'#f8f8f8', borderRadius:'8px', color:'#666'}}>{c.memo}</div>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </>
                    )}

                    {(view === 'add' || view === 'edit') && (
                        <div className="p-4">
                            <div className="form-card">
                                <h2 style={{fontSize:'18px', fontWeight:900, marginBottom:'20px'}}>{view==='add'?'새 작업 등록':'내역 수정'}</h2>
                                <CustomerForm 
                                    initialData={view==='edit'?currentData:null} 
                                    onSave={handleSave} 
                                    onCancel={()=>setView('list')}
                                    sport={sport}
                                />
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const CustomerForm = ({ initialData, onSave, onCancel, sport }) => {
            const [form, setForm] = useState(initialData || {
                name: '', phone: '', racket: '', string: '', tension: '', date: getTodayKST(), memo: ''
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(form);
            };

            return (
                <form onSubmit={handleSubmit}>
                    <label className="form-label">고객명 *</label>
                    <input className="form-input" value={form.name} onChange={e=>setForm({...form, name:e.target.value})} required />
                    <label className="form-label">연락처</label>
                    <input className="form-input" value={form.phone} onChange={e=>setForm({...form, phone:e.target.value})} placeholder="010-0000-0000" />
                    <label className="form-label">라켓 모델</label>
                    <input className="form-input" value={form.racket} onChange={e=>setForm({...form, racket:e.target.value})} />
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px'}}>
                        <div>
                            <label className="form-label">스트링</label>
                            <input className="form-input" value={form.string} onChange={e=>setForm({...form, string:e.target.value})} />
                        </div>
                        <div>
                            <label className="form-label">텐션</label>
                            <input className="form-input" value={form.tension} onChange={e=>setForm({...form, tension:e.target.value})} />
                        </div>
                    </div>
                    <label className="form-label">작업 날짜</label>
                    <input className="form-input" type="date" value={form.date} onChange={e=>setForm({...form, date:e.target.value})} />
                    <label className="form-label">메모</label>
                    <textarea className="form-input" rows="3" value={form.memo} onChange={e=>setForm({...form, memo:e.target.value})} />
                    <div style={{display:'flex', gap:'10px', marginTop:'10px'}}>
                        <button type="button" onClick={onCancel} style={{flex:1, background:'#eee', borderRadius:'16px', fontWeight:700}}>취소</button>
                        <button type="submit" className={`submit-btn ${sport==='tennis'?'submit-btn-green':'submit-btn-blue'}`} style={{flex:2, marginTop:0}}>저장하기</button>
                    </div>
                </form>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
